<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>踏破マップ — 市区町村コンプリート</title>
<script>
  // Google Maps APIをダイナミックに読み込み
  (function(){
    const s=document.createElement('script');
    s.src='https://maps.googleapis.com/maps/api/js?key=AIzaSyBhYD65c-yfH1faQ_37y9NIe4Ft3Y5ad18&libraries=places,geometry&language=ja&callback=__gmapReady';
    s.async=true;s.defer=true;
    document.head.appendChild(s);
  })();
  let __gmapResolve;
  const __gmapPromise=new Promise(r=>{__gmapResolve=r;});
  function __gmapReady(){__gmapResolve();}
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f5f5f0; --bg-panel:#ffffff; --bg-panel-hover:#f0f2f5;
    --border:#dde1e8; --border-light:#e8ebf0;
    --text:#2c2c2c; --text-dim:#7a8494; --text-bright:#1a1a1a;
    --accent:#2563eb; --accent-light:rgba(37,99,235,0.08);
    --unvisited-fill:transparent; --unvisited-stroke:#c0c5d0;
    --visit-1-fill:#bfdbfe; --visit-1-stroke:#93c5fd;
    --visit-2-fill:#60a5fa; --visit-2-stroke:#3b82f6;
    --visit-3-fill:#2563eb; --visit-3-stroke:#1d4ed8;
    --shadow-sm:0 2px 8px rgba(0,0,0,0.05);
    --shadow-md:0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg:0 4px 16px rgba(0,0,0,0.10);
    --shadow-xl:0 8px 32px rgba(0,0,0,0.15);
    --iw-shadow:0 4px 20px rgba(0,0,0,0.08);
    --legend-border:rgba(0,0,0,0.08);
    --badge-1-bg:#bfdbfe; --badge-1-fg:#1e40af;
    --badge-2-bg:#60a5fa; --badge-2-fg:#1e3a5f;
    --badge-3-bg:#2563eb; --badge-3-fg:#ffffff;
    --success-bg:#EFFBF1; --success-bg-strong:#C1F0C8; --success-border:#86efac; --success-border-strong:#4ade80; --success-fg:#166534;
    --warn-bg:#fef3c7; --warn-fg:#92400e;
    --route-hl-fill:#fcd34d; --route-hl-stroke:#92400e;
    --pick-hint-border:var(--accent);
    --pick-hint-shadow:0 4px 20px rgba(37,99,235,0.15);
    --gmap-link-bg:#ffffff; --gmap-link-border:#dadce0; --gmap-link-fg:#1a73e8; --gmap-link-hover-bg:#f8f9fa;
    --danger-bg-hover:#fff0f0; --danger:#ef4444;
    --track-stroke:#ef4444;
    --water:#dce6f0;
    --unvisited-highlight:#FF904B;
  }
  /* ── ダークモード（OSの設定に自動追随） ── */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0f1319; --bg-panel:#1a1f28; --bg-panel-hover:#242a35;
      --border:#333a47; --border-light:#262c37;
      --text:#d9dde5; --text-dim:#8891a2; --text-bright:#f0f2f7;
      --accent:#60a5fa; --accent-light:rgba(96,165,250,0.15);
      --unvisited-fill:transparent; --unvisited-stroke:#4a5160;
      --visit-1-fill:#1e3a5f; --visit-1-stroke:#3b82f6;
      --visit-2-fill:#2563eb; --visit-2-stroke:#60a5fa;
      --visit-3-fill:#93c5fd; --visit-3-stroke:#bfdbfe;
      --shadow-sm:0 2px 8px rgba(0,0,0,0.35);
      --shadow-md:0 2px 12px rgba(0,0,0,0.45);
      --shadow-lg:0 4px 16px rgba(0,0,0,0.50);
      --shadow-xl:0 8px 32px rgba(0,0,0,0.60);
      --iw-shadow:0 4px 20px rgba(0,0,0,0.55);
      --legend-border:rgba(255,255,255,0.08);
      --badge-1-bg:#1e3a5f; --badge-1-fg:#bfdbfe;
      --badge-2-bg:#2563eb; --badge-2-fg:#dbeafe;
      --badge-3-bg:#93c5fd; --badge-3-fg:#0b1220;
      --success-bg:#14301e; --success-bg-strong:#1a4a2c; --success-border:#2d6b45; --success-border-strong:#4ade80; --success-fg:#86efac;
      --warn-bg:#3a2a10; --warn-fg:#fcd34d;
      --route-hl-fill:#78350f; --route-hl-stroke:#fcd34d;
      --pick-hint-shadow:0 4px 20px rgba(96,165,250,0.25);
      --gmap-link-bg:#1a1f28; --gmap-link-border:#333a47; --gmap-link-fg:#60a5fa; --gmap-link-hover-bg:#242a35;
      --danger-bg-hover:#3a1616; --danger:#f87171;
      --track-stroke:#f87171;
      --water:#0d1b2a;
      --unvisited-highlight:#d97706;
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}

  #header{position:fixed;top:0;left:0;right:0;z-index:1000;height:54px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;}
  #header h1{font-size:16px;font-weight:700;white-space:nowrap;color:var(--text-bright);flex-shrink:0;}
  #header h1 span{color:var(--accent);}
  .stat-chips{display:flex;gap:8px;align-items:center;overflow-x:auto;flex:1;}
  .stat-chip{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;white-space:nowrap;font-family:'DM Mono',monospace;}
  .stat-chip .label{color:var(--text-dim);font-family:'Noto Sans JP',sans-serif;font-size:10px;}
  .stat-chip .value{color:var(--text);font-weight:500;}
  .stat-chip .value.large{font-size:14px;color:var(--accent);font-weight:700;}

  #sidebar{position:fixed;top:54px;left:0;bottom:0;width:320px;background:var(--bg-panel);border-right:1px solid var(--border);z-index:999;display:flex;flex-direction:column;transition:transform 0.3s ease;}
  #sidebar.collapsed{transform:translateX(-320px);}
  #sidebar-toggle{position:fixed;top:64px;left:320px;z-index:1000;width:26px;height:44px;background:var(--bg-panel);border:1px solid var(--border);border-left:none;border-radius:0 6px 6px 0;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:left 0.3s ease;}
  #sidebar-toggle:hover{background:var(--bg-panel-hover);}
  #sidebar.collapsed + #sidebar-toggle{left:0;}

  .sidebar-header{padding:12px 14px;border-bottom:1px solid var(--border-light);}
  .sidebar-header h2{font-size:11px;font-weight:500;color:var(--text-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;}
  #pref-search{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;outline:none;}
  #pref-search:focus{border-color:var(--accent);}
  #pref-search::placeholder{color:var(--text-dim);}

  .control-row{display:flex;gap:3px;margin-top:6px;}
  .ctrl-btn{flex:1;padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;}
  .ctrl-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:500;}
  .sort-select{width:100%;padding:6px 8px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;outline:none;}
  .sort-select:focus{border-color:var(--accent);}
  .filter-chips{display:flex;gap:4px;flex-wrap:wrap;}
  .filter-chip{flex:1;min-width:calc(50% - 2px);padding:4px 6px;background:var(--bg);border:1px solid var(--border);border-radius:12px;color:var(--text-dim);font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;transition:all 0.12s;white-space:nowrap;}
  .filter-chip:hover{border-color:var(--accent);color:var(--accent);}
  .filter-chip.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:500;}

  /* Back button for city detail view */
  .back-btn{display:flex;align-items:center;gap:4px;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;margin-bottom:8px;transition:background 0.15s;}
  .back-btn:hover{background:var(--bg-panel-hover);}

  #sidebar-content{flex:1;overflow-y:auto;padding:4px 6px;-webkit-overflow-scrolling:touch;}
  #sidebar-content::-webkit-scrollbar{width:4px;}
  #sidebar-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .pref-item{padding:8px 10px;border-radius:8px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:8px;}
  .pref-item:hover{background:var(--bg-panel-hover);}
  .pref-rate-ring{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;position:relative;color:var(--text-bright);}
  .pref-rate-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
  .pref-info{flex:1;min-width:0;}
  .pref-name{font-size:13px;font-weight:500;color:var(--text-bright);}
  .pref-rates{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:2px;display:flex;gap:8px;}
  .pref-bar{display:flex;gap:2px;margin-top:3px;}
  .pref-bar-seg{height:4px;border-radius:2px;}

  /* City list items */
  .city-item{padding:7px 10px;border-radius:6px;display:flex;align-items:center;gap:8px;transition:background 0.15s;cursor:default;}
  .city-item:hover{background:var(--bg-panel-hover);}
  .city-lv{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .city-info{flex:1;min-width:0;}
  .city-name{font-size:12px;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .city-meta{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:1px;}
  .city-score{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;min-width:32px;text-align:right;}

  /* Pref detail header */
  .detail-header{padding:8px 10px;margin-bottom:4px;}
  .detail-header .dh-name{font-size:16px;font-weight:700;color:var(--text-bright);}
  .detail-header .dh-stats{font-size:11px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:4px;line-height:1.6;}

  #map-container{position:fixed;top:54px;left:320px;right:0;bottom:0;transition:left 0.3s ease;}
  #sidebar.collapsed ~ #map-container{left:0;}
  #map{width:100%;height:100%;background:var(--bg);}

  /* InfoWindow override */
  .gm-style .gm-style-iw-c{border-radius:10px!important;padding:0!important;box-shadow:var(--iw-shadow)!important;background:var(--bg-panel)!important;color:var(--text)!important;}
  .gm-style .gm-style-iw-tc::after{background:var(--bg-panel)!important;}
  /* .gm-style-iw-d には標準paddingを残す（Googleネイティブスポット表示用）*/
  .gm-style .gm-style-iw-d{overflow:auto!important;padding:14px 14px!important;}
  /* 閉じるボタン(×)のみ非表示。スポット名など他の要素は残す */
  .gm-style .gm-style-iw-chr > button{display:none!important;}
  /* スポット名の左に一文字分の余白 */
  .gm-style .gm-style-iw-chr{padding-left:14px!important;}
  /* アプリ独自のpopup本文。左余白を少し広めに */
  .iw-body{padding:0 6px 4px 6px;text-align:left;font-family:'Noto Sans JP',sans-serif;font-size:13px;}
  .pop-pref{font-size:11px;color:var(--text-dim);text-align:left;}
  .pop-name{font-weight:700;font-size:15px;color:var(--text-bright);margin-top:1px;white-space:nowrap;text-align:left;}
  .pop-badge{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:500;}
  .pop-badge.badge-0{background:var(--unvisited-fill);color:var(--text-dim);}
  .pop-badge.badge-1{background:var(--badge-1-bg);color:var(--badge-1-fg);}
  .pop-badge.badge-2{background:var(--badge-2-bg);color:var(--badge-2-fg);}
  .pop-badge.badge-3{background:var(--badge-3-bg);color:var(--badge-3-fg);}
  .pop-detail{font-size:11px;font-family:'DM Mono',monospace;color:var(--text-dim);margin-top:6px;line-height:1.6;}

  #loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s ease;}
  #loading.hidden{opacity:0;pointer-events:none;}
  #loading h2{font-size:20px;font-weight:700;color:var(--text-bright);}
  #loading h2 span{color:var(--accent);}
  .loader{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #loading-status{font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;}

  .layer-toggles{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-top:8px;box-shadow:var(--shadow-sm);}
  /* スマホ時: レイヤートグルは左上（サイドバータブの下） */
  .layer-toggles-mobile{
    position:fixed;
    top:108px;
    left:0px;
    z-index:999;
    margin-top:0 !important;
    background:var(--bg-panel);
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 10px;
    box-shadow:var(--shadow-md);
  }
  /* ルートパネル開放中もそのまま左上 */
  body.route-panel-open .layer-toggles-mobile{
    top:108px;
  }
  .toggle-item{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px;color:var(--text);cursor:pointer;user-select:none;}
  .toggle-item input{margin:0;accent-color:var(--accent);cursor:pointer;}
  .toggle-line{display:inline-block;width:16px;height:3px;background:var(--track-stroke);border-radius:2px;}
  .toggle-fill{display:inline-block;width:14px;height:10px;background:var(--visit-2-fill);border:1px solid var(--visit-2-stroke);border-radius:2px;}

  .legend{position:fixed;bottom:36px;left:336px;background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:12px 16px;z-index:999;box-shadow:var(--shadow-sm);transition:left 0.3s ease;}
  .legend-title{font-weight:700;color:var(--text-bright);margin-bottom:8px;font-size:11px;}
  .legend-item{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .legend-color{width:18px;height:12px;border-radius:3px;flex-shrink:0;border:1px solid var(--legend-border);}
  .legend-label{color:var(--text);font-size:11px;}

  /* ── 検索・ルートUI ── */
  #search-panel{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:1001;width:420px;max-width:calc(100vw - 32px);}
  #search-box-wrap{display:flex;align-items:center;background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);padding:0 10px;gap:6px;height:42px;}
  #search-input{flex:1;border:none;background:transparent;font-size:14px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;}
  #search-input::placeholder{color:var(--text-dim);}
  #search-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:16px;padding:4px;display:flex;align-items:center;}
  #search-btn:hover{color:var(--accent);}
  #route-toggle-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:15px;padding:4px;display:flex;align-items:center;border-left:1px solid var(--border-light);padding-left:10px;}
  #route-toggle-btn:hover{color:var(--accent);}
  #route-toggle-btn.active{color:var(--accent);}
  #locate-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:15px;padding:4px;display:flex;align-items:center;}
  #locate-btn:hover{color:var(--accent);}

  #search-results{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);margin-top:6px;overflow:hidden;display:none;}
  .search-result-item{padding:10px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid var(--border-light);transition:background 0.12s;}
  .search-result-item:last-child{border-bottom:none;}
  .search-result-item:hover{background:var(--bg-panel-hover);}
  .sri-name{font-weight:500;color:var(--text-bright);}
  .sri-addr{font-size:11px;color:var(--text-dim);margin-top:2px;}

  #route-panel{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-lg);margin-top:6px;display:none;flex-direction:column;max-height:50vh;overflow:hidden;}
  #route-panel .route-type-row{flex-shrink:0;padding:10px 14px 0;margin-bottom:0;}
  #route-panel-inner{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:8px 14px 12px;}
  #route-panel-inner::-webkit-scrollbar{width:3px;}
  #route-panel-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
  .route-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .route-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .route-dot.start{background:#22c55e;}
  .route-dot.end{background:#ef4444;}
  .route-input-wrap{flex:1;position:relative;}
  .route-input{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;}
  .route-input:focus{border-color:var(--accent);}
  .route-input::placeholder{color:var(--text-dim);}
  .route-suggest{position:absolute;top:100%;left:0;right:0;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;box-shadow:var(--shadow-md);z-index:10;display:none;max-height:180px;overflow-y:auto;}
  .route-suggest-item{padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border-light);transition:background 0.1s;}
  .route-suggest-item:last-child{border-bottom:none;}
  .route-suggest-item:hover{background:var(--bg-panel-hover);}
  .rsi-main{font-weight:500;color:var(--text-bright);}
  .rsi-sub{font-size:10px;color:var(--text-dim);}
  .route-type-row{display:flex;gap:4px;margin-bottom:10px;}
  .route-type-btn{flex:1;padding:5px 4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text-dim);text-align:center;}
  .route-type-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600;}
  #route-go-btn{width:100%;padding:8px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
  #route-go-btn:hover{background:#1d4ed8;}
  #route-result{margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:7px;font-size:12px;color:var(--text-dim);font-family:'DM Mono',monospace;display:none;line-height:1.8;}
  #route-clear-btn{width:100%;padding:6px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text-dim);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:6px;display:none;}
  #route-clear-btn:hover{background:var(--bg-panel-hover);}
  .gmap-links{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
  .gmap-link-btn{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--gmap-link-bg);border:1px solid var(--gmap-link-border);border-radius:8px;color:var(--gmap-link-fg);font-size:12px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-decoration:none;transition:background 0.12s,box-shadow 0.12s;}
  .gmap-link-btn:hover{background:var(--gmap-link-hover-bg);box-shadow:var(--shadow-sm);}
  .gmap-link-btn .gmap-icon{font-size:15px;flex-shrink:0;}
  .gmap-link-btn .gmap-label{flex:1;}
  .gmap-link-btn .gmap-sub{font-size:10px;color:var(--text-dim);font-weight:400;}

  .city-select-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;display:flex;align-items:center;justify-content:center;}
  .csm-inner{background:var(--bg-panel);border-radius:12px;width:340px;max-height:70vh;display:flex;flex-direction:column;box-shadow:var(--shadow-xl);}
  .csm-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
  .csm-header h3{font-size:14px;font-weight:700;color:var(--text-bright);}
  .csm-close{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:18px;}
  .csm-search{padding:10px 14px;border-bottom:1px solid var(--border-light);}
  .csm-search input{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'Noto Sans JP',sans-serif;color:var(--text);outline:none;}
  .csm-list{flex:1;overflow-y:auto;padding:4px 8px;}
  .csm-city-item{padding:8px 10px;border-radius:6px;cursor:pointer;transition:background 0.12s;}
  .csm-city-item:hover{background:var(--bg-panel-hover);}
  .csm-city-name{font-size:13px;font-weight:500;color:var(--text-bright);}
  .csm-city-pref{font-size:11px;color:var(--text-dim);}
  .csm-section-label{padding:8px 10px 4px;font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;border-top:1px solid var(--border-light);margin-top:4px;}
  .csm-section-label:first-child{border-top:none;margin-top:0;}
  .csm-city-item .csm-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle;}
  .csm-badge.unvisited{background:var(--warn-bg);color:var(--warn-fg);}
  .csm-badge.visited{background:var(--badge-1-bg);color:var(--badge-1-fg);}

  /* 経由地 */
  .route-waypoints{margin:0 0 4px 0;}
  .route-wp-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;animation:wpFadeIn 0.2s ease;}
  @keyframes wpFadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .route-dot.via{background:#f59e0b;width:8px;height:8px;border:2px solid #d97706;}
  .route-icon-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-dim);padding:2px 3px;flex-shrink:0;}
  .route-icon-btn:hover{color:var(--accent);}
  .wp-remove-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-dim);padding:2px 4px;border-radius:4px;flex-shrink:0;}
  .wp-remove-btn:hover{color:var(--danger);background:var(--danger-bg-hover);}
  #add-waypoint-btn{width:100%;padding:5px;background:var(--bg);border:1px dashed var(--border);border-radius:6px;color:var(--text-dim);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-bottom:8px;transition:all 0.15s;}
  #add-waypoint-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);}

  /* 地図クリック選択モーダル */
  .map-click-modal{position:fixed;z-index:2002;background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-xl);padding:0;width:280px;animation:modalPop 0.2s ease;}
  @keyframes modalPop{from{opacity:0;transform:scale(0.92);}to{opacity:1;transform:scale(1);}}
  .mcm-header{padding:12px 16px 8px;font-size:13px;font-weight:700;color:var(--text-bright);border-bottom:1px solid var(--border-light);}
  .mcm-option{padding:12px 16px;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text);}
  .mcm-option:hover{background:var(--bg-panel-hover);}
  .mcm-option:last-child{border-radius:0 0 12px 12px;}
  .mcm-option .mcm-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .mcm-option .mcm-icon.pin{background:rgba(37,99,235,0.1);color:var(--accent);}
  .mcm-option .mcm-icon.city{background:rgba(245,158,11,0.1);color:#d97706;}
  .mcm-option .mcm-detail{flex:1;min-width:0;}
  .mcm-option .mcm-title{font-weight:500;color:var(--text-bright);}
  .mcm-option .mcm-sub{font-size:11px;color:var(--text-dim);margin-top:2px;white-space:normal;word-break:break-all;}
  .mcm-overlay{position:fixed;inset:0;z-index:2001;background:transparent;}
  .map-pick-active #map{cursor:crosshair!important;}
  .map-pick-hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:2001;background:var(--bg-panel);border:1px solid var(--accent);border-radius:10px;padding:10px 20px;box-shadow:var(--pick-hint-shadow);font-size:13px;color:var(--text);display:flex;align-items:center;gap:10px;animation:hintSlideUp 0.3s ease;}
  @keyframes hintSlideUp{from{opacity:0;transform:translateX(-50%) translateY(16px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  .map-pick-hint .hint-cancel{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:12px;color:var(--text-dim);font-family:'Noto Sans JP',sans-serif;}
  .map-pick-hint .hint-cancel:hover{background:var(--bg-panel-hover);}
  .route-input.picking{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,0.15);}
  .wp-drag-handle{cursor:grab;font-size:11px;color:var(--text-dim);padding:2px 2px;flex-shrink:0;user-select:none;touch-action:none;}
  .wp-drag-handle:active{cursor:grabbing;}
  .route-wp-row.dragging{opacity:0.4;background:var(--accent-light);}
  .route-wp-row.drag-over{border-top:2px solid var(--accent);}

  /* サイドバータブ */
  .sidebar-tabs{display:flex;border-bottom:1px solid var(--border-light);margin-bottom:0;}
  .sidebar-tab{flex:1;padding:8px 4px;font-size:11px;font-weight:500;color:var(--text-dim);background:none;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;text-align:center;border-bottom:2px solid transparent;transition:all 0.15s;}
  .sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .sidebar-tab:hover{color:var(--text);}
  .sidebar-tab-panel{display:none;}
  .sidebar-tab-panel.active{display:flex;flex-direction:column;flex:1;overflow:hidden;}

  /* 保存ルート一覧 */
  .saved-routes-list{flex:1;overflow-y:auto;padding:4px 6px;}
  .saved-route-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;transition:background 0.15s;cursor:default;}
  .saved-route-item:hover{background:var(--bg-panel-hover);}
  .sr-check{margin:0;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .sr-color{width:14px;height:14px;border-radius:3px;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,0.15);}
  .sr-info{flex:1;min-width:0;}
  .sr-name{font-size:12px;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-meta{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:1px;}
  .sr-delete{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-dim);padding:2px 4px;flex-shrink:0;}
  .sr-delete:hover{color:var(--danger);}
  .sr-edit{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-dim);padding:2px 4px;flex-shrink:0;}
  .sr-edit:hover{color:var(--accent);}
  .sr-empty{padding:20px;text-align:center;color:var(--text-dim);font-size:12px;}
  .sr-actions{display:flex;gap:4px;padding:8px 10px;border-top:1px solid var(--border-light);}
  .sr-actions button{flex:1;padding:5px;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text-dim);}
  .sr-actions button:hover{border-color:var(--accent);color:var(--accent);}
  /* ルート保存ボタン */
  #route-save-btn{width:100%;padding:6px;background:var(--accent-light);border:1px solid var(--accent);border-radius:7px;color:var(--accent);font-size:12px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:6px;display:none;}
  #route-save-btn:hover{background:var(--accent);color:#fff;}
  /* 色選択ポップアップ */
  .color-picker-popup{position:absolute;z-index:2000;background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:8px;box-shadow:var(--shadow-lg);display:flex;gap:4px;flex-wrap:wrap;width:120px;}
  .color-picker-swatch{width:20px;height:20px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color 0.1s;}
  .color-picker-swatch:hover{border-color:var(--text);}

  /* #route-inputs-scroll: パネル全体スクロール方式に変更したため独立スクロール無効 */
  #route-inputs-scroll{max-height:none;overflow-y:visible;}

  /* 全クリアボタン */
  #route-reset-btn{
    padding:8px 14px;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:7px;
    color:var(--text-dim);
    font-size:12px;
    font-family:'Noto Sans JP',sans-serif;
    cursor:pointer;
    white-space:nowrap;
    flex-shrink:0;
  }
  #route-reset-btn:hover{background:var(--danger-bg-hover);border-color:var(--danger);color:var(--danger);}

  /* 検索ボタン行 */
  .route-action-row{display:flex;gap:6px;align-items:stretch;margin-top:10px;}
  .route-action-row #route-go-btn{flex:1;margin-top:0;}

  /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
     スマホ縦画面（iPhone標準 390px 想定）
     ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
  @media(max-width:768px){

    /* ── ヘッダー ── */
    #header{padding:0 8px;gap:5px;height:50px;}
    #header h1{display:none;}
    .stat-chips{gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex:1;scrollbar-width:none;}
    .stat-chips::-webkit-scrollbar{display:none;}
    .stat-chip{padding:5px 10px;font-size:11px;flex-shrink:0;border-radius:20px;gap:3px;}
    .stat-chip .label{font-size:10px;display:inline;}
    .stat-chip .value.large{font-size:13px;}

    /* ── サイドバー: 左からスライド（画面幅の92%、右端に地図見える） ── */
    #sidebar{
      width:92%;max-width:360px;
      top:50px;bottom:0;left:0;
      transform:translateX(-100%);
      z-index:1200;
      box-shadow:4px 0 20px rgba(0,0,0,0.15);
    }
    #sidebar.collapsed{transform:translateX(-100%);}
    #sidebar:not(.collapsed){transform:translateX(0);}

    /* サイドバートグルボタン */
    #sidebar-toggle{
      top:60px;left:0 !important;
      width:34px;height:46px;
      font-size:14px;z-index:1300;
      border-radius:0 8px 8px 0;
    }
    #sidebar:not(.collapsed) + #sidebar-toggle{left:0 !important;}

    /* 地図 */
    #map-container{left:0 !important;top:50px;}

    /* ── 検索パネル ── */
    #search-panel{
      top:62px;
      left:38px;
      right:8px;
      width:auto;max-width:none;
      transform:none;
    }
    #search-box-wrap{
      height:42px;
      padding:0 8px;
      gap:2px;
      border-radius:12px;
      box-shadow:0 2px 16px rgba(0,0,0,0.12);
    }
    #search-btn{font-size:17px;padding:4px 5px;flex-shrink:0;}
    #search-input{flex:1;min-width:0;font-size:14px;padding:0 5px;}
    #locate-btn{font-size:16px;padding:4px 5px;flex-shrink:0;}
    #route-toggle-btn{
      font-size:16px;padding:4px 8px;flex-shrink:0;
      border-left:1px solid var(--border-light);margin-left:2px;
    }

    /* ルートパネル */
    .route-input{font-size:13px;padding:8px 10px;}
    #route-go-btn{font-size:13px;padding:9px;}
    .route-type-btn{font-size:11px;padding:6px 4px;}
    #route-reset-btn{font-size:12px;padding:8px 12px;}

    /* ── 凡例: ズーム+-ボタンの左脇 ── */
    .legend{
      bottom:24px;right:54px;left:auto;
      padding:8px 12px;border-radius:10px;
    }
    .legend-title{font-size:10px;font-weight:700;margin-bottom:5px;}
    .legend-label{font-size:10px;}
    .legend-color{width:14px;height:10px;}
    .legend-item{gap:5px;margin-bottom:3px;}

    /* モーダル */
    .csm-inner{width:calc(100vw - 32px);max-width:380px;}
    .map-click-modal{width:calc(100vw - 48px);max-width:320px;}
    .map-pick-hint{bottom:80px;}

    /* 検索結果・ルート入力 */
    .search-result-item{font-size:13px;padding:10px 14px;}
    .route-icon-btn{font-size:15px;padding:5px 6px;}
    .wp-remove-btn{font-size:13px;padding:3px 6px;}

    /* サイドバー内: 少し大きめに */
    .pref-name{font-size:13px;}
    .pref-item{padding:8px 10px;}
    .city-name{font-size:12px;}
  }

  /* サイドバー開放時に地図をタップして閉じられるオーバーレイ */
  #sidebar-overlay{
    display:none;
    position:fixed;
    inset:0;
    top:50px;
    background:rgba(0,0,0,0.35);
    z-index:1100;
  }
  @media(max-width:768px){
    #sidebar:not(.collapsed) ~ #sidebar-overlay{display:block;}
  }

  /* ── スポットコレクション ── */
  .spot-cat-item{padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:10px;}
  .spot-cat-item:hover{background:var(--bg-panel-hover);}
  .spot-cat-icon{font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;flex-shrink:0;}
  .spot-cat-info{flex:1;min-width:0;}
  .spot-cat-name{font-size:13px;font-weight:600;color:var(--text-bright);}
  .spot-cat-desc{font-size:10px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spot-cat-prog{display:flex;align-items:center;gap:6px;margin-top:4px;}
  .spot-cat-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden;}
  .spot-cat-bar-fill{height:100%;background:#4ade80;border-radius:2px;transition:width 0.3s;}
  .spot-cat-count{font-size:10px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text-dim);white-space:nowrap;}
  .spot-cat-complete .spot-cat-count{color:#4ade80;}

  .spot-item{padding:10px 12px;border-radius:8px;transition:background 0.15s;display:flex;align-items:flex-start;gap:10px;}
  .spot-item:hover{background:var(--bg-panel-hover);}
  .spot-status{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all 0.2s;}
  .spot-status.auto{background:#EFFBF1;border-color:#86efac;color:#166534;}
  .spot-status.manual{background:#C1F0C8;border-color:#4ade80;color:#166534;}
  .spot-info{flex:1;min-width:0;}
  .spot-name{font-size:13px;font-weight:500;color:var(--text-bright);}
  .spot-pref{font-size:10px;color:var(--text-dim);}
  .spot-dates{font-size:10px;color:var(--text-dim);font-family:'DM Mono',monospace;margin-top:2px;}
  .spot-actions{display:flex;gap:4px;margin-top:6px;}
  .spot-act-btn{padding:3px 8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text-dim);transition:all 0.15s;}
  .spot-act-btn:hover{border-color:var(--accent);color:var(--accent);}
  .spot-act-btn.checked{background:#EFFBF1;border-color:#4ade80;color:#166534;font-weight:500;}
  .spot-locate-btn{background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:13px;padding:2px;flex-shrink:0;margin-top:2px;}
  .spot-locate-btn:hover{color:var(--accent);}

  /* スポットヘッダー統計 */
  .spot-header-stats{padding:10px 14px;border-bottom:1px solid var(--border-light);display:flex;gap:8px;flex-wrap:wrap;}
  .spot-stat-chip{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:3px 10px;font-size:10px;}
  .spot-stat-chip .sv{font-weight:700;font-family:'DM Mono',monospace;color:var(--accent);}
</style>
</head>
<body>

<div id="loading"><div class="loader"></div><h2>踏破<span>マップ</span></h2><div id="loading-status">データを読み込み中...</div></div>

<div id="header">
  <h1>踏破<span>マップ</span></h1>
  <div class="stat-chips">
    <!-- [変更2] stat-label を動的に切り替えられるよう id を追加 -->
    <div class="stat-chip"><span class="label" id="stat-visit-label">訪問</span><span class="value large" id="stat-visited">-</span><span class="label" id="stat-sep">/</span><span class="value" id="stat-total">-</span></div>
    <div class="stat-chip"><span class="label">踏破率</span><span class="value large" id="stat-rate">-</span></div>
    <div class="stat-chip"><span class="label">制覇率</span><span class="value large" id="stat-complete">-</span></div>
    <div class="stat-chip"><span class="label">期間</span><span class="value" id="stat-range">-</span></div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-tabs">
    <button class="sidebar-tab active" data-tab="pref">都道府県</button>
    <button class="sidebar-tab" data-tab="spots">スポット</button>
    <button class="sidebar-tab" data-tab="routes">保存ルート</button>
  </div>
  <div id="tab-pref" class="sidebar-tab-panel active">
    <div class="sidebar-header">
      <input type="text" id="pref-search" placeholder="都道府県・市区町村を検索...">
      <div class="control-row" style="margin-top:6px;">
        <select id="sort-select" class="sort-select">
          <option value="rate-desc">踏破率 高→低</option>
          <option value="rate-asc">踏破率 低→高</option>
          <option value="code">コード順</option>
          <option value="last-visit-desc">最終訪問 新→古</option>
          <option value="last-visit-asc">最終訪問 古→新</option>
          <option value="visits-desc">訪問回数 多→少</option>
          <option value="visits-asc">訪問回数 少→多</option>
        </select>
      </div>
      <div class="control-row" style="margin-top:4px;">
        <button class="ctrl-btn active" data-mode="visit" id="mode-visit">踏破モード</button>
        <button class="ctrl-btn" data-mode="complete" id="mode-complete">制覇モード</button>
      </div>
      <div class="filter-chips" id="filter-chips" style="margin-top:6px;">
        <button class="filter-chip active" data-filter="all">すべて</button>
        <button class="filter-chip" data-filter="unvisited">未訪問のみ</button>
        <button class="filter-chip" data-filter="visited">訪問済みのみ</button>
        <button class="filter-chip" data-filter="multi">複数回訪問</button>
      </div>
    </div>
    <div id="sidebar-content"></div>
  </div>
  <div id="tab-routes" class="sidebar-tab-panel">
    <div class="saved-routes-list" id="saved-routes-list"></div>
    <div class="sr-actions">
      <button id="sr-show-all">全表示</button>
      <button id="sr-hide-all">全非表示</button>
      <button id="sr-import-btn">読込</button>
    </div>
  </div>
  <div id="tab-spots" class="sidebar-tab-panel">
    <div class="spot-header-stats" id="spot-header-stats"></div>
    <div id="spot-sidebar-content" style="flex:1;overflow-y:auto;padding:4px 6px;-webkit-overflow-scrolling:touch;"></div>
  </div>
</div>
<button id="sidebar-toggle">◀</button>
<div id="sidebar-overlay"></div>

<div id="map-container">
  <div id="map"></div>
  <div id="search-panel">
    <div id="search-box-wrap">
      <button id="search-btn" title="検索">🔍</button>
      <input id="search-input" type="text" placeholder="場所・住所を検索..." autocomplete="off">
      <button id="locate-btn" title="現在地">📍</button>
      <button id="route-toggle-btn" title="ルート検索">↔</button>
    </div>
    <div id="search-results"></div>
    <div id="route-panel">
      <!-- 車/徒歩は常に上部固定表示 -->
      <div class="route-type-row">
        <button class="route-type-btn active" data-mode="driving">🚗 車</button>
        <button class="route-type-btn" data-mode="walking">🚶 徒歩</button>
      </div>
      <!-- 入力欄〜結果〜保存ボタンまで全体をスクロール対象にする -->
      <div id="route-panel-inner">
        <div id="route-inputs-scroll">
          <div class="route-row">
            <div class="route-dot start"></div>
            <div class="route-input-wrap">
              <input class="route-input" id="route-from" type="text" placeholder="出発地（入力 or 地図クリック）" autocomplete="off">
              <div class="route-suggest" id="route-from-suggest"></div>
            </div>
            <button class="route-icon-btn" id="from-city-btn" title="都市から選択">🗺</button>
            <button class="route-icon-btn" id="from-locate-btn" title="現在地">📍</button>
          </div>
          <div class="route-waypoints" id="route-waypoints"></div>
          <button id="add-waypoint-btn">＋ 経由地を追加</button>
          <div class="route-row">
            <div class="route-dot end"></div>
            <div class="route-input-wrap">
              <input class="route-input" id="route-to" type="text" placeholder="目的地（入力 or 地図クリック）" autocomplete="off">
              <div class="route-suggest" id="route-to-suggest"></div>
            </div>
            <button class="route-icon-btn" id="to-city-btn" title="都市から選択">🗺</button>
            <button class="route-icon-btn" id="to-locate-btn" title="現在地">📍</button>
          </div>
        </div>
        <div class="route-action-row">
          <button id="route-go-btn">ルートを検索</button>
          <button id="route-reset-btn" title="入力をすべてクリア">✕ クリア</button>
        </div>
        <div id="route-result"></div>
        <button id="route-clear-btn">ルートをクリア</button>
        <button id="route-save-btn">📥 ルートを保存</button>
      </div>
    </div>
  </div>
</div>

<div class="legend">
  <div class="legend-title">訪問回数</div>
  <div class="legend-item"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="legend-filter" data-lv="0" style="margin:0;accent-color:#f97316;cursor:pointer;"><div class="legend-color" style="background:transparent;border:1.5px solid rgba(37,99,235,0.4);"></div><span class="legend-label">未訪問</span></label></div>
  <div class="legend-item"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="legend-filter" data-lv="1" checked style="margin:0;accent-color:var(--accent);cursor:pointer;"><div class="legend-color" style="background:var(--visit-1-fill);"></div><span class="legend-label">1回</span></label></div>
  <div class="legend-item"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="legend-filter" data-lv="2" checked style="margin:0;accent-color:var(--accent);cursor:pointer;"><div class="legend-color" style="background:var(--visit-2-fill);"></div><span class="legend-label">2回</span></label></div>
  <div class="legend-item"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;"><input type="checkbox" class="legend-filter" data-lv="3" checked style="margin:0;accent-color:var(--accent);cursor:pointer;"><div class="legend-color" style="background:var(--visit-3-fill);"></div><span class="legend-label">3回以上</span></label></div>
</div>

<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function(){
  const $=id=>document.getElementById(id);

  // Google Maps APIの読み込み完了を待つ
  $('loading-status').textContent='Google Maps APIを初期化中...';
  await __gmapPromise;

  // 地図ポリゴン用の色はCSS変数から動的取得（ダークモード追随のため）
  function getCssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function getMapColors(){
    return {
      FILL:[
        'transparent',
        getCssVar('--visit-1-fill')||'#bfdbfe',
        getCssVar('--visit-2-fill')||'#60a5fa',
        getCssVar('--visit-3-fill')||'#2563eb'
      ],
      STROKE:[
        getCssVar('--unvisited-stroke')||'#c0c5d0',
        getCssVar('--visit-1-stroke')||'#93c5fd',
        getCssVar('--visit-2-stroke')||'#3b82f6',
        getCssVar('--visit-3-stroke')||'#1d4ed8'
      ],
      STROKE_COLOR:getCssVar('--accent')||'#2563eb',
      UNVISITED_HIGHLIGHT:getCssVar('--unvisited-highlight')||'#FF904B',
      ROUTE_HL_FILL:getCssVar('--route-hl-fill')||'#fcd34d',
      ROUTE_HL_STROKE:getCssVar('--route-hl-stroke')||'#92400e',
      TRACK_STROKE:getCssVar('--track-stroke')||'#ef4444',
      WATER:getCssVar('--water')||'#dce6f0'
    };
  }
  let mapColors=getMapColors();

  const FILL=['transparent','var(--visit-1-fill)','var(--visit-2-fill)','var(--visit-3-fill)'];
  const STROKE=['var(--unvisited-stroke)','var(--visit-1-stroke)','var(--visit-2-stroke)','var(--visit-3-stroke)'];
  const STROKE_COLOR='var(--accent)'; // 全レベル共通の境界線色（CSSのみで使用）

  function getLevel(d){if(!d||d===0)return 0;if(d===1)return 1;if(d===2)return 2;return 3;}
  function getLevelLabel(l){return['未訪問','1回','2回','3回以上'][l];}

  // ── IndexedDBキャッシュ（重いGeoJSON/TopoJSON用） ──
  const IDB_NAME='tohaMapCache';
  const IDB_VERSION=1;
  const IDB_STORE='files';
  function openCacheDB(){
    return new Promise((resolve,reject)=>{
      if(!('indexedDB' in window)){reject(new Error('no indexedDB'));return;}
      const req=indexedDB.open(IDB_NAME,IDB_VERSION);
      req.onupgradeneeded=()=>{
        const db=req.result;
        if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
      };
      req.onsuccess=()=>resolve(req.result);
      req.onerror=()=>reject(req.error);
    });
  }
  async function idbGet(db,key){
    return new Promise(r=>{
      const tx=db.transaction(IDB_STORE,'readonly');
      const req=tx.objectStore(IDB_STORE).get(key);
      req.onsuccess=()=>r(req.result||null);
      req.onerror=()=>r(null);
    });
  }
  async function idbPut(db,key,value){
    return new Promise(r=>{
      const tx=db.transaction(IDB_STORE,'readwrite');
      tx.objectStore(IDB_STORE).put(value,key);
      tx.oncomplete=()=>r(true);
      tx.onerror=()=>r(false);
    });
  }
  // HEADリクエストでLast-Modified / ETag を取得（失敗時はnull）
  async function fetchVersionTag(url){
    try{
      const res=await fetch(url,{method:'HEAD',cache:'no-cache'});
      if(!res.ok) return null;
      return res.headers.get('ETag')||res.headers.get('Last-Modified')||null;
    }catch(e){return null;}
  }
  // キャッシュ付きfetch（JSON想定）
  // - versionTagが一致すればキャッシュ採用、不一致/取得失敗なら再取得
  // - 初回HEAD失敗時はキャッシュがあればそれを優先（オフライン保険）
  async function cachedFetchJson(url,{label}={}){
    let db=null;
    try{db=await openCacheDB();}catch(e){db=null;}
    const [tag,cached]=await Promise.all([
      fetchVersionTag(url),
      db?idbGet(db,url):Promise.resolve(null)
    ]);
    if(cached&&tag&&cached.versionTag===tag){
      return cached.data;
    }
    // HEAD失敗 + キャッシュあり → キャッシュ採用（オフライン時）
    if(cached&&!tag){
      console.log('[cache] using stale cache (no HEAD):',url);
      return cached.data;
    }
    // 本体取得
    if(label) $('loading-status').textContent=label;
    const res=await fetch(url);
    if(!res.ok) throw new Error('fetch failed: '+url+' '+res.status);
    const data=await res.json();
    if(db){
      const finalTag=tag||res.headers.get('ETag')||res.headers.get('Last-Modified')||String(Date.now());
      idbPut(db,url,{data,versionTag:finalTag,cachedAt:Date.now()});
    }
    return data;
  }

  // ── Data ──
  $('loading-status').textContent='データを読み込み中...';
  // 更新頻度が低く重いファイルはIndexedDBキャッシュ経由
  // visited_cities.jsonは更新頻度が高いため通常fetch
  const [topoData,visitedData,tracksData]=await Promise.all([
    cachedFetchJson('data/municipalities.topojson',{label:'市区町村データを読み込み中...'}),
    fetch('data/visited_cities.json').then(r=>r.json()),
    cachedFetchJson('data/tracks.geojson',{label:'軌跡データを読み込み中...'}).catch(()=>null)
  ]);
  $('loading-status').textContent='データを解析中...';
  const objectName=Object.keys(topoData.objects)[0];
  const geoData=topojson.feature(topoData,topoData.objects[objectName]);

  const meta=visitedData.meta;
  let totalScore=0;
  const maxScore=meta.totalMunicipalities*3;
  for(const c of Object.values(visitedData.cities)) totalScore+=Math.min(c.visitDays,3);
  const completeRate=maxScore>0?(totalScore/maxScore*100).toFixed(2):'0.00';

  // ── [変更1] 政令区判定ヘルパー ──
  // 市区町村コード下3桁が101〜199の範囲が政令区
  function isSeireiKu(code){
    const num=parseInt(code.substring(2),10);
    return num>=101&&num<=199;
  }
  // topojsonのN03_004（市区町村名）とN03_005（政令区名）から表示名を生成
  function buildFullName(code,gun,city,ward){
    if(ward){
      // 政令区: 「市名+区名」（例: 札幌市中央区）
      return (city||'')+ward;
    }
    // 通常の市区町村
    return city||'';
  }

  // ── Build per-prefecture city index ──
  const featureProps={};
  for(const f of geoData.features){
    const code=f.properties.N03_007;
    if(code) featureProps[code]={
      pref:f.properties.N03_001||'',
      gun:f.properties.N03_003||'',
      city:f.properties.N03_004||'',
      ward:f.properties.N03_005||'',
    };
  }
  // All city codes grouped by pref
  const prefCities={};
  const allCodes=new Set();
  for(const f of geoData.features){
    const code=f.properties.N03_007;
    if(!code)continue;
    allCodes.add(code);
  }
  for(const code of allCodes){
    const pc=code.substring(0,2);
    if(!prefCities[pc]) prefCities[pc]=[];
    const fp=featureProps[code]||{};
    const vc=visitedData.cities[code];
    const vd=vc?vc.visitDays:0;
    // [変更1] buildFullName を使用
    const fullName=buildFullName(code,fp.gun,fp.city,fp.ward);
    prefCities[pc].push({
      code, name:fullName||code, gun:fp.gun,
      visitDays:vd, level:getLevel(vd), score:Math.min(vd,3),
      firstVisit:vc?vc.firstVisit:null, lastVisit:vc?vc.lastVisit:null,
    });
  }
  // Sort cities by code
  for(const pc of Object.keys(prefCities)) prefCities[pc].sort((a,b)=>a.code.localeCompare(b.code));

  // Prefecture stats
  const prefs=visitedData.prefectures;
  const prefStats={};
  for(const[pc,p]of Object.entries(prefs)){
    prefStats[pc]={lvCounts:[p.total-p.visited,0,0,0],score:0,maxScore:p.total*3,lastVisit:null,totalVisitDays:0};
  }
  for(const[code,c]of Object.entries(visitedData.cities)){
    const pc=c.prefCode,lv=getLevel(c.visitDays);
    if(prefStats[pc]&&lv>0){prefStats[pc].lvCounts[lv]++;prefStats[pc].score+=Math.min(c.visitDays,3);}
    if(prefStats[pc]){
      prefStats[pc].totalVisitDays+=(c.visitDays||0);
      if(c.lastVisit&&(!prefStats[pc].lastVisit||c.lastVisit>prefStats[pc].lastVisit)){
        prefStats[pc].lastVisit=c.lastVisit;
      }
    }
  }

  // ── Google Mapsスタイル（ライト/ダーク用） ──
  const GMAP_STYLES_LIGHT=[{featureType:'water',stylers:[{color:'#dce6f0'}]}];
  // ダーク用はGoogle公式サンプル準拠のシンプルダーク
  const GMAP_STYLES_DARK=[
    {elementType:'geometry',stylers:[{color:'#242f3e'}]},
    {elementType:'labels.text.stroke',stylers:[{color:'#242f3e'}]},
    {elementType:'labels.text.fill',stylers:[{color:'#9aa4b8'}]},
    {featureType:'administrative.locality',elementType:'labels.text.fill',stylers:[{color:'#d59563'}]},
    {featureType:'poi',elementType:'labels.text.fill',stylers:[{color:'#d59563'}]},
    {featureType:'poi.park',elementType:'geometry',stylers:[{color:'#263c3f'}]},
    {featureType:'poi.park',elementType:'labels.text.fill',stylers:[{color:'#6b9a76'}]},
    {featureType:'road',elementType:'geometry',stylers:[{color:'#38414e'}]},
    {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#212a37'}]},
    {featureType:'road',elementType:'labels.text.fill',stylers:[{color:'#9ca5b3'}]},
    {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#746855'}]},
    {featureType:'road.highway',elementType:'geometry.stroke',stylers:[{color:'#1f2835'}]},
    {featureType:'road.highway',elementType:'labels.text.fill',stylers:[{color:'#f3d19c'}]},
    {featureType:'transit',elementType:'geometry',stylers:[{color:'#2f3948'}]},
    {featureType:'transit.station',elementType:'labels.text.fill',stylers:[{color:'#d59563'}]},
    {featureType:'water',elementType:'geometry',stylers:[{color:'#17263c'}]},
    {featureType:'water',elementType:'labels.text.fill',stylers:[{color:'#515c6d'}]},
    {featureType:'water',elementType:'labels.text.stroke',stylers:[{color:'#17263c'}]}
  ];
  const darkModeMql=window.matchMedia('(prefers-color-scheme: dark)');
  function getCurrentMapStyles(){
    return darkModeMql.matches?GMAP_STYLES_DARK:GMAP_STYLES_LIGHT;
  }

  // ── Map (Google Maps) ──
  $('loading-status').textContent='地図を描画中...';
  const map=new google.maps.Map($('map'),{
    center:{lat:36.5,lng:137.5},zoom:6,
    mapTypeControl:window.innerWidth>768,
    mapTypeControlOptions:{position:google.maps.ControlPosition.TOP_RIGHT},
    zoomControl:true,
    zoomControlOptions:{position:window.innerWidth>768
      ?google.maps.ControlPosition.RIGHT_TOP
      :google.maps.ControlPosition.RIGHT_BOTTOM},
    streetViewControl:false,fullscreenControl:false,
    styles:getCurrentMapStyles()
  });
  const infoWindow=new google.maps.InfoWindow();

  // GeoJSON市区町村ポリゴン
  $('loading-status').textContent=`市区町村ポリゴンを描画中...(${geoData.features.length}件)`;
  await new Promise(r=>setTimeout(r,50)); // UI更新を待つ
  const geoDataLayer=new google.maps.Data({map:map});
  geoDataLayer.addGeoJson(geoData);
  await new Promise(r=>setTimeout(r,50)); // 描画を待つ

  // レベルフィルタ: どのレベルを色付き表示するか（デフォは全OFF=チェックなし）
  const legendFilter={0:false,1:true,2:true,3:true};

  function applyGeoStyles(){
    const mc=mapColors;
    geoDataLayer.setStyle(feature=>{
      const code=feature.getProperty('N03_007');
      // 一時ルートハイライト（最優先）
      if(window._routeHighlightCodes&&window._routeHighlightCodes.has(code)){
        return{fillColor:mc.ROUTE_HL_FILL,fillOpacity:0.45,strokeColor:mc.ROUTE_HL_STROKE,strokeWeight:1.5,strokeOpacity:0.7,clickable:true,zIndex:3};
      }
      // 保存ルートハイライト（表示中のもの）
      for(const id of Object.keys(displayedRoutes)){
        const rd=displayedRoutes[id];
        if(rd.passedCodes&&rd.passedCodes.has(code)){
          return{fillColor:rd.color,fillOpacity:0.28,strokeColor:rd.color,strokeWeight:1.4,strokeOpacity:0.55,clickable:true,zIndex:2};
        }
      }
      const city=visitedData.cities[code];
      const lv=getLevel(city?city.visitDays:0);

      // フィルタが1つもONでなければ従来表示
      const anyFilterOn=Object.values(legendFilter).some(v=>v);
      if(!anyFilterOn){
        const fillOpacity=lv===0?0:0.7;
        return{fillColor:mc.FILL[lv],fillOpacity:fillOpacity,strokeColor:mc.STROKE_COLOR,strokeWeight:lv===0?0.6:1.0,strokeOpacity:lv===0?0.35:0.6,clickable:true,zIndex:1};
      }

      // フィルタON時: チェックの入ったレベルだけ色表示
      if(legendFilter[lv]){
        if(lv===0){
          // 未訪問: ハイライト色、境界線はアクセント色
          return{fillColor:mc.UNVISITED_HIGHLIGHT,fillOpacity:0.45,strokeColor:mc.STROKE_COLOR,strokeWeight:0.8,strokeOpacity:0.5,clickable:true,zIndex:1};
        }
        return{fillColor:mc.FILL[lv],fillOpacity:0.7,strokeColor:mc.STROKE_COLOR,strokeWeight:1.0,strokeOpacity:0.6,clickable:true,zIndex:1};
      } else {
        // チェックが入っていないレベル: fillなし、境界線のみ
        return{fillColor:'transparent',fillOpacity:0,strokeColor:mc.STROKE_COLOR,strokeWeight:0.5,strokeOpacity:0.25,clickable:true,zIndex:1};
      }
    });
  }
  applyGeoStyles();

  // OSのダークモード切替に追従して地図の色も更新
  darkModeMql.addEventListener('change',()=>{
    mapColors=getMapColors();
    map.setOptions({styles:getCurrentMapStyles()});
    if(tracksDataLayer){
      tracksDataLayer.setStyle({strokeColor:mapColors.TRACK_STROKE,strokeWeight:1.8,strokeOpacity:0.55,clickable:false,zIndex:2});
    }
    applyGeoStyles();
  });

  // legendチェックボックスのイベント
  document.querySelectorAll('.legend-filter').forEach(cb=>{
    cb.addEventListener('change',()=>{
      legendFilter[parseInt(cb.dataset.lv)]=cb.checked;
      // 凡例が全OFFなら市区町村レイヤも非表示、どれかONなら自動表示
      const anyOn=Object.values(legendFilter).some(v=>v);
      if(!anyOn){
        geoDataLayer.setMap(null);
        chkPolygons.checked=false;
      } else if(!chkPolygons.checked){
        chkPolygons.checked=true;
        geoDataLayer.setMap(map);
      }
      applyGeoStyles();
    });
  });

  // Hover（strokeのみ強調、fillは変えない）
  let hoveredFeature=null;
  geoDataLayer.addListener('mouseover',e=>{
    hoveredFeature=e.feature;
    geoDataLayer.overrideStyle(e.feature,{strokeWeight:2.5,strokeColor:mapColors.STROKE_COLOR,strokeOpacity:1.0});
  });
  geoDataLayer.addListener('mouseout',e=>{
    geoDataLayer.revertStyle(e.feature);
    hoveredFeature=null;
  });

  // Click → InfoWindow or mapPick
  let _lastFeatureClickTime=0;
  geoDataLayer.addListener('click',e=>{
    _lastFeatureClickTime=Date.now();
    if(typeof mapPickMode!=='undefined'&&mapPickMode){
      const cx=e.domEvent?e.domEvent.clientX:null;
      const cy=e.domEvent?e.domEvent.clientY:null;
      handleMapPick({lat:e.latLng.lat(),lng:e.latLng.lng()},featureToProps(e.feature),cx,cy);
      return;
    }
    infoWindow.setContent(popupHTMLFromFeature(e.feature));
    infoWindow.setPosition(e.latLng);
    infoWindow.open(map);
  });

  map.addListener('click',e=>{
    // ポリゴンクリックのイベント伝播でinfoWindowが即閉じしないよう無視
    if(Date.now()-_lastFeatureClickTime<100) return;
    if(typeof mapPickMode!=='undefined'&&mapPickMode){
      const feat=findMunicipalityAtLatLng(e.latLng);
      const cx=e.domEvent?e.domEvent.clientX:null;
      const cy=e.domEvent?e.domEvent.clientY:null;
      handleMapPick({lat:e.latLng.lat(),lng:e.latLng.lng()},feat,cx,cy);
      return;
    }
    // GoogleネイティブPOIクリック: デフォルトInfoWindowを阻止して自前で表示
    if(e.placeId){
      e.stop();
      placesService.getDetails({placeId:e.placeId,fields:['name','formatted_address','url']},(place,status)=>{
        if(status===google.maps.places.PlacesServiceStatus.OK&&place){
          const h=`<div class="iw-body">
            <div style="font-weight:700;font-size:14px;">${place.name||''}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.5;">${place.formatted_address||''}</div>
            ${place.url?`<a href="${place.url}" target="_blank" rel="noopener" style="font-size:11px;color:var(--accent);text-decoration:none;display:inline-block;margin-top:4px;">Googleマップで見る</a>`:''}
          </div>`;
          infoWindow.setContent(h);
          infoWindow.setPosition(e.latLng);
          infoWindow.open(map);
        }
      });
      return;
    }
    infoWindow.close();
  });

  function featureToProps(feature){
    const code=feature.getProperty('N03_007');
    if(!code) return null;
    return{properties:{N03_007:code,N03_001:feature.getProperty('N03_001'),N03_003:feature.getProperty('N03_003'),N03_004:feature.getProperty('N03_004')}};
  }

  function popupHTMLFromFeature(feature){
    const code=feature.getProperty('N03_007');
    const fp=featureProps[code]||{};
    const fullName=buildFullName(code,fp.gun,fp.city,fp.ward)||'不明';
    const city=visitedData.cities[code];
    const lv=getLevel(city?city.visitDays:0);
    const score=city?Math.min(city.visitDays,3):0;
    let h=`<div class="iw-body" style="color:${getComputedStyle(document.documentElement).getPropertyValue('--text')};">`;
    h+=`<div class="pop-pref">${fp.pref||''}</div><div class="pop-name">${fullName}</div>`;
    h+=`<span class="pop-badge badge-${lv}">${getLevelLabel(lv)}</span>`;
    if(city) h+=`<div class="pop-detail">初訪問: ${city.firstVisit}<br>最終: ${city.lastVisit}<br>訪問日数: ${city.visitDays}日<br>制覇スコア: ${score}/3</div>`;
    h+=`</div>`;
    return h;
  }

  // 軌跡レイヤー
  let tracksDataLayer=null;
  if(tracksData){
    tracksDataLayer=new google.maps.Data({map:map});
    tracksDataLayer.addGeoJson(tracksData);
    tracksDataLayer.setStyle({strokeColor:mapColors.TRACK_STROKE,strokeWeight:1.8,strokeOpacity:0.55,clickable:false,zIndex:2});
  }

  // レイヤートグル（Google Maps カスタムコントロール）
  const toggleDiv=document.createElement('div');
  toggleDiv.className='layer-toggles';
  toggleDiv.style.margin='10px';
  
　// 変更後
　const chkTracks = document.createElement('input');
　chkTracks.type = 'checkbox';
　chkTracks.id = 'toggle-tracks';
　if (tracksData) { chkTracks.checked = true; } else { chkTracks.disabled = true; }

　const chkPolygons = document.createElement('input');
　chkPolygons.type = 'checkbox';
　chkPolygons.id = 'toggle-polygons';
　chkPolygons.checked = true;

　const lblTracks = document.createElement('label');
　lblTracks.className = 'toggle-item';
　lblTracks.append(chkTracks, Object.assign(document.createElement('span'),{className:'toggle-line'}), Object.assign(document.createElement('span'),{textContent:'軌跡'}));

　const lblPolygons = document.createElement('label');
　lblPolygons.className = 'toggle-item';

  // 都道府県一覧用のソート（entries: [code, prefData] の配列）
  function sortPrefEntries(entries){
    const sorters={
      'rate-desc':(a,b)=>{
        if(currentMode==='visit') return b[1].rate-a[1].rate||a[0].localeCompare(b[0]);
        const sa=prefStats[a[0]]?.score||0,sb=prefStats[b[0]]?.score||0;
        const ma=prefStats[a[0]]?.maxScore||1,mb=prefStats[b[0]]?.maxScore||1;
        return(sb/mb)-(sa/ma)||a[0].localeCompare(b[0]);
      },
      'rate-asc':(a,b)=>{
        if(currentMode==='visit') return a[1].rate-b[1].rate||a[0].localeCompare(b[0]);
        const sa=prefStats[a[0]]?.score||0,sb=prefStats[b[0]]?.score||0;
        const ma=prefStats[a[0]]?.maxScore||1,mb=prefStats[b[0]]?.maxScore||1;
        return(sa/ma)-(sb/mb)||a[0].localeCompare(b[0]);
      },
      'code':(a,b)=>a[0].localeCompare(b[0]),
      'last-visit-desc':(a,b)=>{
        const la=prefStats[a[0]]?.lastVisit||'',lb=prefStats[b[0]]?.lastVisit||'';
        if(!la&&!lb) return a[0].localeCompare(b[0]);
        if(!la) return 1; // 未訪問は末尾
        if(!lb) return -1;
        return lb.localeCompare(la)||a[0].localeCompare(b[0]);
      },
      'last-visit-asc':(a,b)=>{
        const la=prefStats[a[0]]?.lastVisit||'',lb=prefStats[b[0]]?.lastVisit||'';
        if(!la&&!lb) return a[0].localeCompare(b[0]);
        if(!la) return 1;
        if(!lb) return -1;
        return la.localeCompare(lb)||a[0].localeCompare(b[0]);
      },
      'visits-desc':(a,b)=>{
        const va=prefStats[a[0]]?.totalVisitDays||0,vb=prefStats[b[0]]?.totalVisitDays||0;
        return vb-va||a[0].localeCompare(b[0]);
      },
      'visits-asc':(a,b)=>{
        const va=prefStats[a[0]]?.totalVisitDays||0,vb=prefStats[b[0]]?.totalVisitDays||0;
        return va-vb||a[0].localeCompare(b[0]);
      }
    };
    const fn=sorters[currentSort]||sorters['rate-desc'];
    return entries.sort(fn);
  }

  // 市区町村用のソート（cities: city オブジェクト配列）
  function sortCities(cities){
    const sorters={
      'rate-desc':(a,b)=>(currentMode==='complete'?b.score-a.score:b.visitDays-a.visitDays)||a.code.localeCompare(b.code),
      'rate-asc':(a,b)=>(currentMode==='complete'?a.score-b.score:a.visitDays-b.visitDays)||a.code.localeCompare(b.code),
      'code':(a,b)=>a.code.localeCompare(b.code),
      'last-visit-desc':(a,b)=>{
        const la=a.lastVisit||'',lb=b.lastVisit||'';
        if(!la&&!lb) return a.code.localeCompare(b.code);
        if(!la) return 1;
        if(!lb) return -1;
        return lb.localeCompare(la)||a.code.localeCompare(b.code);
      },
      'last-visit-asc':(a,b)=>{
        const la=a.lastVisit||'',lb=b.lastVisit||'';
        if(!la&&!lb) return a.code.localeCompare(b.code);
        if(!la) return 1;
        if(!lb) return -1;
        return la.localeCompare(lb)||a.code.localeCompare(b.code);
      },
      'visits-desc':(a,b)=>b.visitDays-a.visitDays||a.code.localeCompare(b.code),
      'visits-asc':(a,b)=>a.visitDays-b.visitDays||a.code.localeCompare(b.code)
    };
    const fn=sorters[currentSort]||sorters['rate-desc'];
    return cities.sort(fn);
  }

  // 市区町村フィルタ
  function filterCities(cities){
    if(currentFilter==='unvisited') return cities.filter(c=>c.visitDays===0);

    if(currentFilter==='multi') return cities.filter(c=>c.visitDays>=2);

  }

  function ringSVG(rate,size=40){
    const r=size/2-4,circ=2*Math.PI*r,off=circ*(1-rate/100);
    const col=rate>=75?'#2563eb':rate>=25?'#60a5fa':'#cdd1da';
    return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#ebedf2" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
  }
  function barHTML(pc){
    const c=prefStats[pc]?.lvCounts||[0,0,0,0];const t=c.reduce((a,b)=>a+b,0);
    if(!t)return '';
    let h='<div class="pref-bar">';
    for(let i=0;i<4;i++){const p=c[i]/t*100;if(p>0)h+=`<div class="pref-bar-seg" style="width:${p}%;background:${FILL[i]};"></div>`;}
    return h+'</div>';
  }

  // 市区町村にズーム

  // Google Places / Geocoder
  const placesService=new google.maps.places.PlacesService(map);
  const geocoderService=new google.maps.Geocoder();

  async function placesSearch(q){
    if(!q.trim()) return [];
    const normalized=q.replace(/\u3000/g,' ').trim();
    const center=map.getCenter();
    return new Promise(resolve=>{
      placesService.textSearch({
        query:normalized,
        location:center,
        language:'ja'
      },(results,status)=>{
        if(status===google.maps.places.PlacesServiceStatus.OK&&results){
          resolve(results.slice(0,8).map(r=>({
            name:r.name,
            address:r.formatted_address,
            lat:r.geometry.location.lat(),
            lon:r.geometry.location.lng(),
            place_id:r.place_id
          })));
        } else resolve([]);
      });
    });
  }

  async function reverseGeocode(lat,lon){
    return new Promise(resolve=>{
      geocoderService.geocode({location:{lat,lng:lon}},(results,status)=>{
        if(status==='OK'&&results&&results.length){
          resolve({display_name:results[0].formatted_address,lat:results[0].geometry.location.lat(),lon:results[0].geometry.location.lng()});
        } else resolve(null);
      });
    });
  }

  // 座標文字列の検出
  function parseCoordString(str){
    const s=str.trim();
    const m=s.match(/^(-?\d+\.?\d*)\s*[,、]\s*(-?\d+\.?\d*)$/);
    if(!m) return null;
    const a=parseFloat(m[1]),b=parseFloat(m[2]);
    if(a>=20&&a<=46&&b>=122&&b<=154) return {lat:a,lng:b};
    if(b>=20&&b<=46&&a>=122&&a<=154) return {lat:b,lng:a};
    return null;
  }

  // 場所名検索→ピン
  const searchInput=$('search-input');
  const searchResults=$('search-results');
  async function doSearch(){
    const q=searchInput.value.trim();
    if(!q){searchResults.style.display='none';return;}

    // 座標入力の検出
    const coord=parseCoordString(q);
    if(coord){
      if(searchMarker) searchMarker.setMap(null);
      searchMarker=new google.maps.Marker({position:{lat:coord.lat,lng:coord.lng},map:map});
      map.setCenter({lat:coord.lat,lng:coord.lng});map.setZoom(15);
      const rev=await reverseGeocode(coord.lat,coord.lng);
      const name=rev&&rev.display_name?rev.display_name.split(',')[0]:`${coord.lat.toFixed(5)}, ${coord.lng.toFixed(5)}`;
      const iw=new google.maps.InfoWindow({content:name});
      iw.open(map,searchMarker);
      iw.addListener('closeclick',()=>{if(searchMarker){searchMarker.setMap(null);searchMarker=null;}});
      searchResults.style.display='none';
      return;

    const allCities=[...unvisited.map(c=>({...c,_visited:false})),...visited.map(c=>({...c,_visited:true}))];

  // 都市の入口ポイントを取得
  // fromPt, toPt: ルート上の前後のポイント[lat,lng] — 方向を計算するため
  // 境界から中心に向かって100m入った地点付近のスポットを返す
  async function findCityEntryPoint(code,name,fromPt,toPt){
    const boundary=getCityBoundaryRings(code);
    const centroid=getCityCentroid(code);
    if(!boundary.length||!centroid){
      const results=await placesSearch(name);
      if(results.length) return [parseFloat(results[0].lat),parseFloat(results[0].lon)];
      return null;
    }

    // fromPt→toPtの直線がポリゴン境界と交差する点を求める
    let entryPt=null;
    if(fromPt&&toPt){
      entryPt=findLinePolygonEntry(fromPt,toPt,boundary);
    }
    if(!entryPt&&fromPt){
      // fromPt→centroidの線で境界交差を求める
      entryPt=findLinePolygonEntry(fromPt,centroid,boundary);
    }
    if(!entryPt){
      // fallback: ポリゴンの境界上で重心に最も近い点
      entryPt=findClosestBoundaryPoint(centroid,boundary);
    }
    if(!entryPt) return centroid;

    // entryPtから中心方向に100m移動
    const pt100=moveToward(entryPt,centroid,100);

    // reverseGeocodeで付近のスポットを取得
    const rev=await reverseGeocode(pt100[0],pt100[1]);
    if(rev&&rev.lat&&rev.lon) return [parseFloat(rev.lat),parseFloat(rev.lon)];
    return pt100;
  }

  // geoDataのfeaturesからコード別に高速参照するインデックス
  const _geoFeaturesByCode={};
  for(const f of geoData.features){
    const code=f.properties.N03_007;
    if(!code) continue;
    if(!_geoFeaturesByCode[code]) _geoFeaturesByCode[code]=[];
    _geoFeaturesByCode[code].push(f);
  }

  function getCityBoundaryRings(code){
    const rings=[];
    const features=_geoFeaturesByCode[code]||[];
    for(const f of features){
      const geom=f.geometry;
      if(geom.type==='Polygon'){
        rings.push(geom.coordinates[0].map(c=>[c[1],c[0]]));
      } else if(geom.type==='MultiPolygon'){
        for(const poly of geom.coordinates) rings.push(poly[0].map(c=>[c[1],c[0]]));
      }
    }
    return rings;
  }

  function getCityCentroid(code){
    let sumLat=0,sumLng=0,count=0;
    const features=_geoFeaturesByCode[code]||[];
    for(const f of features){
      const flat=flattenCoords(f.geometry.coordinates);
      for(const c of flat){sumLng+=c[0];sumLat+=c[1];count++;}
    }
    if(count===0) return null;
    return [sumLat/count,sumLng/count];
  }

  function flattenCoords(coords){
    const result=[];
    function recurse(arr){
      if(typeof arr[0]==='number'){result.push(arr);return;}
      for(const a of arr) recurse(a);
    }
    recurse(coords);
    return result;
  }

  // fromPt→toPtの線分がrings(境界)と交差する最初の点を返す
  function findLinePolygonEntry(fromPt,toPt,rings){
    let best=null,bestDist=Infinity;
    const ax=fromPt[0],ay=fromPt[1],bx=toPt[0],by=toPt[1];
    for(const ring of rings){
      for(let i=0;i<ring.length-1;i++){
        const cx=ring[i][0],cy=ring[i][1],dx=ring[i+1][0],dy=ring[i+1][1];
        const pt=segmentIntersection(ax,ay,bx,by,cx,cy,dx,dy);
        if(pt){
          const d=(pt[0]-ax)**2+(pt[1]-ay)**2;
          if(d<bestDist){bestDist=d;best=pt;}
        }
      }
    }
    return best;
  }

  // 2つの線分の交点（存在すれば[lat,lng]、なければnull）
  function segmentIntersection(ax,ay,bx,by,cx,cy,dx,dy){
    const denom=(bx-ax)*(dy-cy)-(by-ay)*(dx-cx);
    if(Math.abs(denom)<1e-12) return null;
    const t=((cx-ax)*(dy-cy)-(cy-ay)*(dx-cx))/denom;
    const u=((cx-ax)*(by-ay)-(cy-ay)*(bx-ax))/denom;
    if(t>=0&&t<=1&&u>=0&&u<=1) return [ax+t*(bx-ax),ay+t*(by-ay)];
    return null;
  }

  function findClosestBoundaryPoint(center,rings){
    let best=null,bestDist=Infinity;
    for(const ring of rings){
      for(const pt of ring){
        const d=(pt[0]-center[0])**2+(pt[1]-center[1])**2;
        if(d<bestDist){bestDist=d;best=pt;}
      }
    }
    return best;
  }

  // fromからtoの方向にdistMeters移動した地点を返す
  function moveToward(from,to,distMeters){
    const R=6371000;
    const dLat=(to[0]-from[0])*Math.PI/180;
    const dLng=(to[1]-from[1])*Math.PI/180;
    const totalDist=Math.sqrt(dLat*dLat+dLng*dLng*Math.cos(from[0]*Math.PI/180)**2)*R;
    if(totalDist<1) return from;
    const ratio=Math.min(distMeters/totalDist,0.5);
    return [from[0]+ratio*(to[0]-from[0]),from[1]+ratio*(to[1]-from[1])];
  }

  function makeCircleIcon(color,size){

  }

  function updateRoutePreview(){
    clearRoutePreview();
    if(routeFromCoord){
      if(routeFromCity.isCityWaypoint&&routeFromCity.cityCode){
        highlightCityOnMap(routeFromCity.cityCode,'#22c55e');
      } else {

        routePreviewMarkers.push(m);
      }

    if(routeToCoord){
      if(routeToCity.isCityWaypoint&&routeToCity.cityCode){
        highlightCityOnMap(routeToCity.cityCode,'#ef4444');
      } else {
        const m=new google.maps.Marker({position:{lat:routeToCoord[0],lng:routeToCoord[1]},map,icon:makeCircleIcon('#ef4444',14)});
        routePreviewMarkers.push(m);
      }

    for(const wp of routeWaypoints){
      if(wp.isCityWaypoint&&wp.cityCode){
        highlightCityOnMap(wp.cityCode,'#f59e0b');

        const m=new google.maps.Marker({position:{lat:wp.coord[0],lng:wp.coord[1]},map,icon:makeCircleIcon('#f59e0b',12)});
        routePreviewMarkers.push(m);
      }

  function highlightCityOnMap(cityCode,color){

    for(const f of features){
      const dl=new google.maps.Data({map:map});
      dl.addGeoJson({type:'FeatureCollection',features:[f]});
      dl.setStyle({fillColor:color,fillOpacity:0.35,strokeColor:color,strokeWeight:2.5,strokeOpacity:0.8,clickable:false});
      routePreviewMarkers.push(dl);
    }

        <button class="wp-remove-btn" data-wp-idx="${i}" title="削除">✕</button>

    // ── ドラッグ&ドロップ ──
    let dragIdx=null;
    container.querySelectorAll('.route-wp-row').forEach(row=>{
      row.addEventListener('dragstart',e=>{

        row.classList.add('dragging');
        e.dataTransfer.effectAllowed='move';
      });
      row.addEventListener('dragend',()=>{
        row.classList.remove('dragging');
        container.querySelectorAll('.route-wp-row').forEach(r=>r.classList.remove('drag-over'));
        dragIdx=null;
      });
      row.addEventListener('dragover',e=>{
        e.preventDefault();
        e.dataTransfer.dropEffect='move';
        container.querySelectorAll('.route-wp-row').forEach(r=>r.classList.remove('drag-over'));
        row.classList.add('drag-over');
      });
      row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
      row.addEventListener('drop',e=>{
        e.preventDefault();
        const dropIdx=parseInt(row.dataset.wpIdx);
        if(dragIdx!==null&&dragIdx!==dropIdx){
          const item=routeWaypoints.splice(dragIdx,1)[0];
          routeWaypoints.splice(dropIdx,0,item);
          renderWaypoints();

    // 削除
    container.querySelectorAll('.wp-remove-btn').forEach(btn=>{

    // Focus & autocomplete
    container.querySelectorAll('.wp-input').forEach(input=>{
      const idx=parseInt(input.dataset.wpIdx);
      input.addEventListener('focus',()=>setActiveInput('wp-'+idx));
      const suggest=container.querySelector('#wp-suggest-'+idx);
      let timer=null;
      input.addEventListener('input',()=>{
        clearTimeout(timer);
        routeWaypoints[idx].coord=null;
        routeWaypoints[idx].isCityWaypoint=false;
        routeWaypoints[idx].cityCode=null;
        const q=input.value.trim();
        if(!q){suggest.style.display='none';return;}
        // 座標入力検出
        const coord=parseCoordString(q);
        if(coord){
          routeWaypoints[idx].coord=[coord.lat,coord.lng];
          routeWaypoints[idx].name=q;

          suggest.style.display='block';
          const results=await placesSearch(q);

          suggest.innerHTML=results.map((r,ri)=>`
            <div class="route-suggest-item" data-lat="${r.lat}" data-lon="${r.lon}">
              <div class="rsi-main">${r.name}</div>
              <div class="rsi-sub">${(r.address||'').split(',').slice(0,2).join(',')}</div>
            </div>`).join('');
          suggest.querySelectorAll('.route-suggest-item').forEach(el=>{
            el.addEventListener('click',()=>{
              input.value=el.querySelector('.rsi-main').textContent;

              routeWaypoints[idx].name=input.value;
              suggest.style.display='none';
              updateRoutePreview();
            });
          });
        },800);
      });
    });
    updateRoutePreview();
    updateRouteInputsScroll();
  }

  // ── 地図クリックでの地点追加 ──
  function findMunicipalityAtLatLng(latLng){
    // Google MapsのLatLngから{lat,lng}に変換して検索
    return findMunicipalityAtPoint({lat:latLng.lat(),lng:latLng.lng()});
  }
  function findMunicipalityAtPoint(latlng){
    // latlng: {lat,lng}
    for(const[code,features] of Object.entries(_geoFeaturesByCode)){
      for(const f of features){
        if(isPointInFeature(latlng,f)) return f;
      }
    }
    return null;
  }
  function isPointInFeature(latlng,feature){
    if(!feature||!feature.geometry||!feature.geometry.type) return false;
    const t=feature.geometry.type,c=feature.geometry.coordinates;
    if(t==='Polygon') return isPointInPolygon(latlng,c);
    if(t==='MultiPolygon'){for(const p of c){if(isPointInPolygon(latlng,p)) return true;}}
    return false;
  }
  function isPointInPolygon(latlng,polyCoords){
    const ring=polyCoords[0];if(!ring) return false;
    const x=latlng.lng,y=latlng.lat;let inside=false;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
      if((yi>y)!==(yj>y)&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  // 出発地・目的地の市区町村経由フラグ
  let routeFromCity={isCityWaypoint:false,cityCode:null,name:''};
  let routeToCity={isCityWaypoint:false,cityCode:null,name:''};

  function applyPickResult(coord,name,target,isCityWaypoint,cityCode){
    if(target==='from'){
      routeFromCoord=coord;$('route-from').value=name;
      routeFromCity={isCityWaypoint,cityCode,name:name.replace('（市区町村経由）','')};
    } else if(target==='to'){
      routeToCoord=coord;$('route-to').value=name;
      routeToCity={isCityWaypoint,cityCode,name:name.replace('（市区町村経由）','')};
    } else if(target&&target.startsWith('wp-')){
      const idx=parseInt(target.substring(3));
      if(routeWaypoints[idx]){
        routeWaypoints[idx].coord=coord;
        routeWaypoints[idx].name=name.replace('（市区町村経由）','');
        routeWaypoints[idx].isCityWaypoint=isCityWaypoint;
        routeWaypoints[idx].cityCode=cityCode;

      }

    updateRoutePreview();
