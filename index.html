<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>踏破マップ — 市区町村コンプリート</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f5f5f0;
    --bg-panel: #ffffff;
    --bg-panel-hover: #f0f0ec;
    --border: #e0ddd5;
    --border-light: #eae7e0;
    --text: #2c2c2c;
    --text-dim: #8a8580;
    --text-bright: #1a1a1a;
    --accent: #d4542a;
    --accent-light: rgba(212, 84, 42, 0.08);

    --unvisited-fill: #edeae4;
    --unvisited-stroke: #d5d0c8;
    --visit-1-fill: #fce4b8;
    --visit-1-stroke: #e0c690;
    --visit-2-fill: #f0a868;
    --visit-2-stroke: #d08840;
    --visit-3-fill: #d4542a;
    --visit-3-stroke: #b0401e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: 54px; background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 20px; gap: 20px;
  }
  #header h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; color: var(--text-bright); }
  #header h1 span { color: var(--accent); }

  .stat-chips { display: flex; gap: 10px; align-items: center; flex-wrap: nowrap; overflow-x: auto; }
  .stat-chip { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; white-space: nowrap; font-family: 'DM Mono', monospace; }
  .stat-chip .label { color: var(--text-dim); font-family: 'Noto Sans JP', sans-serif; font-size: 11px; }
  .stat-chip .value { color: var(--text); font-weight: 500; }
  .stat-chip .value.large { font-size: 15px; color: var(--accent); font-weight: 700; }

  #sidebar {
    position: fixed; top: 54px; left: 0; bottom: 0; width: 320px;
    background: var(--bg-panel); border-right: 1px solid var(--border);
    z-index: 999; display: flex; flex-direction: column; transition: transform 0.3s ease;
  }
  #sidebar.collapsed { transform: translateX(-320px); }

  #sidebar-toggle {
    position: fixed; top: 64px; left: 320px; z-index: 1000;
    width: 26px; height: 44px; background: var(--bg-panel);
    border: 1px solid var(--border); border-left: none;
    border-radius: 0 6px 6px 0; color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 13px; transition: left 0.3s ease, background 0.2s;
  }
  #sidebar-toggle:hover { background: var(--bg-panel-hover); color: var(--text); }
  #sidebar.collapsed + #sidebar-toggle { left: 0; }

  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border-light); }
  .sidebar-header h2 { font-size: 12px; font-weight: 500; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  #pref-search { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color 0.2s; }
  #pref-search:focus { border-color: var(--accent); }
  #pref-search::placeholder { color: var(--text-dim); }

  .sort-controls { display: flex; gap: 4px; margin-top: 8px; }
  .sort-btn { flex: 1; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text-dim); font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
  .sort-btn:hover { background: var(--bg-panel-hover); }
  .sort-btn.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  #pref-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
  #pref-list::-webkit-scrollbar { width: 4px; }
  #pref-list::-webkit-scrollbar-track { background: transparent; }
  #pref-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .pref-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; gap: 10px; }
  .pref-item:hover { background: var(--bg-panel-hover); }
  .pref-item .pref-rate-ring { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; flex-shrink: 0; position: relative; color: var(--text-bright); }
  .pref-item .pref-rate-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .pref-info { flex: 1; min-width: 0; }
  .pref-name { font-size: 13px; font-weight: 500; color: var(--text-bright); }
  .pref-detail { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .pref-bar { display: flex; gap: 2px; margin-top: 4px; }
  .pref-bar-seg { height: 4px; border-radius: 2px; }

  #map-container { position: fixed; top: 54px; left: 320px; right: 0; bottom: 0; transition: left 0.3s ease; }
  #sidebar.collapsed ~ #map-container { left: 0; }
  #map { width: 100%; height: 100%; background: var(--bg); }
  .leaflet-container { background: var(--bg) !important; }

  .city-tooltip { background: var(--bg-panel) !important; border: 1px solid var(--border) !important; border-radius: 10px !important; padding: 12px 16px !important; color: var(--text) !important; font-family: 'Noto Sans JP', sans-serif !important; font-size: 13px !important; box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important; min-width: 160px; }
  .city-tooltip .tip-pref { font-size: 11px; color: var(--text-dim); }
  .city-tooltip .tip-name { font-weight: 700; font-size: 15px; color: var(--text-bright); margin-top: 1px; }
  .city-tooltip .tip-badge { display: inline-block; margin-top: 6px; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 500; }
  .city-tooltip .tip-badge.badge-0 { background: var(--unvisited-fill); color: var(--text-dim); }
  .city-tooltip .tip-badge.badge-1 { background: var(--visit-1-fill); color: #8a6a20; }
  .city-tooltip .tip-badge.badge-2 { background: var(--visit-2-fill); color: #6a3a10; }
  .city-tooltip .tip-badge.badge-3 { background: var(--visit-3-fill); color: #fff; }
  .city-tooltip .tip-detail { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--text-dim); margin-top: 6px; line-height: 1.6; }
  .leaflet-tooltip-top:before { border-top-color: var(--bg-panel) !important; }
  .leaflet-tooltip-bottom:before { border-bottom-color: var(--bg-panel) !important; }

  #loading { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.5s ease; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading h2 { font-size: 20px; font-weight: 700; color: var(--text-bright); }
  #loading h2 span { color: var(--accent); }
  .loader { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-status { font-size: 12px; color: var(--text-dim); font-family: 'DM Mono', monospace; }

  .legend { position: fixed; bottom: 20px; right: 20px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; z-index: 999; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .legend-title { font-weight: 700; color: var(--text-bright); margin-bottom: 10px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .legend-color { width: 20px; height: 14px; border-radius: 3px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.08); }
  .legend-label { color: var(--text); font-size: 12px; }

  @media (max-width: 768px) {
    #sidebar { width: 280px; }
    #sidebar-toggle { left: 280px; }
    #sidebar.collapsed + #sidebar-toggle { left: 0; }
    #map-container { left: 0; }
    #sidebar:not(.collapsed) ~ #map-container { left: 280px; }
    .stat-chips { display: none; }
  }
  @media (max-width: 480px) {
    #sidebar { width: 100%; }
    #sidebar-toggle { display: none; }
    #header h1 { font-size: 14px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader"></div>
  <h2>踏破<span>マップ</span></h2>
  <div id="loading-status">データを読み込み中...</div>
</div>

<div id="header">
  <h1>踏破<span>マップ</span></h1>
  <div class="stat-chips">
    <div class="stat-chip">
      <span class="label">訪問</span>
      <span class="value large" id="stat-visited">-</span>
      <span class="label">/ </span>
      <span class="value" id="stat-total">-</span>
    </div>
    <div class="stat-chip">
      <span class="label">踏破率</span>
      <span class="value large" id="stat-rate">-</span>
    </div>
    <div class="stat-chip">
      <span class="label">期間</span>
      <span class="value" id="stat-range">-</span>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>都道府県別</h2>
    <input type="text" id="pref-search" placeholder="都道府県を検索...">
    <div class="sort-controls">
      <button class="sort-btn active" data-sort="rate-desc">踏破率↓</button>
      <button class="sort-btn" data-sort="rate-asc">踏破率↑</button>
      <button class="sort-btn" data-sort="code">コード順</button>
    </div>
  </div>
  <div id="pref-list"></div>
</div>
<button id="sidebar-toggle">◀</button>

<div id="map-container">
  <div id="map"></div>
</div>

<div class="legend">
  <div class="legend-title">訪問回数</div>
  <div class="legend-item"><div class="legend-color" style="background:var(--unvisited-fill);border-color:var(--unvisited-stroke);"></div><span class="legend-label">未訪問</span></div>
  <div class="legend-item"><div class="legend-color" style="background:var(--visit-1-fill);border-color:var(--visit-1-stroke);"></div><span class="legend-label">1回</span></div>
  <div class="legend-item"><div class="legend-color" style="background:var(--visit-2-fill);border-color:var(--visit-2-stroke);"></div><span class="legend-label">2回</span></div>
  <div class="legend-item"><div class="legend-color" style="background:var(--visit-3-fill);border-color:var(--visit-3-stroke);"></div><span class="legend-label">3回以上</span></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<script>
(async function() {
  const loadingStatus = document.getElementById('loading-status');
  const loading = document.getElementById('loading');

  function getLevel(visitDays) {
    if (!visitDays || visitDays === 0) return 0;
    if (visitDays === 1) return 1;
    if (visitDays === 2) return 2;
    return 3;
  }
  function getLevelLabel(level) {
    return ['未訪問', '1回', '2回', '3回以上'][level];
  }

  const FILL = ['#edeae4','#fce4b8','#f0a868','#d4542a'];
  const STROKE = ['#d5d0c8','#e0c690','#d08840','#b0401e'];

  loadingStatus.textContent = 'ポリゴンデータを読み込み中...';
  const [topoRes, visitedRes] = await Promise.all([
    fetch('data/municipalities.topojson'),
    fetch('data/visited_cities.json')
  ]);
  loadingStatus.textContent = 'データを解析中...';
  const topoData = await topoRes.json();
  const visitedData = await visitedRes.json();
  const objectName = Object.keys(topoData.objects)[0];
  const geoData = topojson.feature(topoData, topoData.objects[objectName]);

  function getStyle(feature) {
    const code = feature.properties.N03_007;
    const city = visitedData.cities[code];
    const lv = getLevel(city ? city.visitDays : 0);
    return {
      fillColor: FILL[lv], fillOpacity: lv === 0 ? 0.5 : 0.8,
      color: STROKE[lv], weight: lv > 0 ? 1.2 : 0.5, opacity: lv > 0 ? 0.9 : 0.4,
    };
  }

  loadingStatus.textContent = '地図を描画中...';
  const map = L.map('map', { center: [36.5, 137.5], zoom: 6, zoomControl: false, attributionControl: false });
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 18, opacity: 0.5 }).addTo(map);

  const geoLayer = L.geoJSON(geoData, {
    style: getStyle,
    onEachFeature: function(feature, layer) {
      const code = feature.properties.N03_007;
      const name = feature.properties.N03_004 || '不明';
      const pref = feature.properties.N03_001 || '';
      const city = visitedData.cities[code];
      const lv = getLevel(city ? city.visitDays : 0);

      let html = `<div class="tip-pref">${pref}</div><div class="tip-name">${name}</div>`;
      html += `<span class="tip-badge badge-${lv}">${getLevelLabel(lv)}</span>`;
      if (city) {
        html += `<div class="tip-detail">初訪問: ${city.firstVisit}<br>最終: ${city.lastVisit}<br>訪問日数: ${city.visitDays}日</div>`;
      }

      layer.bindTooltip(html, { className: 'city-tooltip', sticky: true, direction: 'top', offset: [0, -10] });
      layer.on('mouseover', function() { this.setStyle({ weight: 2.5, color: '#d4542a', fillOpacity: 0.95 }); this.bringToFront(); });
      layer.on('mouseout', function() { geoLayer.resetStyle(this); });
    }
  }).addTo(map);

  const meta = visitedData.meta;
  document.getElementById('stat-visited').textContent = meta.visitedCount;
  document.getElementById('stat-total').textContent = meta.totalMunicipalities;
  document.getElementById('stat-rate').textContent = meta.coverageRate + '%';
  document.getElementById('stat-range').textContent = (meta.dateRange[0]||'') + ' ~ ' + (meta.dateRange[1]||'');

  // ── Sidebar ──
  const prefList = document.getElementById('pref-list');
  const prefs = visitedData.prefectures;
  let currentSort = 'rate-desc';

  const prefLvCounts = {};
  for (const [pc, p] of Object.entries(prefs)) { prefLvCounts[pc] = [p.total - p.visited, 0, 0, 0]; }
  for (const [code, c] of Object.entries(visitedData.cities)) {
    const pc = c.prefCode; const lv = getLevel(c.visitDays);
    if (prefLvCounts[pc] && lv > 0) prefLvCounts[pc][lv]++;
  }

  function ringSVG(rate) {
    const r = 17, circ = 2 * Math.PI * r, off = circ * (1 - rate / 100);
    const col = rate >= 75 ? '#d4542a' : rate >= 25 ? '#f0a868' : '#d5d0c8';
    return `<svg width="42" height="42" viewBox="0 0 42 42"><circle cx="21" cy="21" r="${r}" fill="none" stroke="#edeae4" stroke-width="3"/><circle cx="21" cy="21" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-dasharray="${circ}" stroke-dashoffset="${off}" stroke-linecap="round"/></svg>`;
  }
  function barHTML(pc) {
    const c = prefLvCounts[pc]||[0,0,0,0]; const t = c.reduce((a,b)=>a+b,0);
    if (!t) return '';
    let h = '<div class="pref-bar">';
    for (let i = 0; i < 4; i++) { const p = c[i]/t*100; if (p > 0) h += `<div class="pref-bar-seg" style="width:${p}%;background:${FILL[i]};"></div>`; }
    return h + '</div>';
  }

  function renderPrefList(filter = '') {
    let entries = Object.entries(prefs);
    if (filter) entries = entries.filter(([_,p]) => p.name.includes(filter));
    if (currentSort === 'rate-desc') entries.sort((a,b) => b[1].rate - a[1].rate || a[0].localeCompare(b[0]));
    else if (currentSort === 'rate-asc') entries.sort((a,b) => a[1].rate - b[1].rate || a[0].localeCompare(b[0]));
    else entries.sort((a,b) => a[0].localeCompare(b[0]));

    prefList.innerHTML = entries.map(([code, p]) => `
      <div class="pref-item" data-code="${code}">
        <div class="pref-rate-ring">${ringSVG(p.rate)}<span>${Math.round(p.rate)}</span></div>
        <div class="pref-info">
          <div class="pref-name">${p.name}</div>
          <div class="pref-detail">${p.visited}/${p.total}</div>
          ${barHTML(code)}
        </div>
      </div>`).join('');

    prefList.querySelectorAll('.pref-item').forEach(item => {
      item.addEventListener('click', () => {
        const code = item.dataset.code; const layers = [];
        geoLayer.eachLayer(l => { const c = l.feature.properties.N03_007; if (c && c.startsWith(code)) layers.push(l); });
        if (layers.length) map.fitBounds(L.featureGroup(layers).getBounds(), { padding: [30,30] });
      });
    });
  }
  renderPrefList();
  document.getElementById('pref-search').addEventListener('input', e => renderPrefList(e.target.value));
  document.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); currentSort = btn.dataset.sort;
      renderPrefList(document.getElementById('pref-search').value);
    });
  });

  const sidebar = document.getElementById('sidebar');
  document.getElementById('sidebar-toggle').addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    document.getElementById('sidebar-toggle').textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
    setTimeout(() => map.invalidateSize(), 350);
  });

  loading.classList.add('hidden');
  setTimeout(() => loading.remove(), 500);
})();
</script>
</body>
</html>
