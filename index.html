  // ── ルート検索 (Google Directions Service) ──
  const directionsService=new google.maps.DirectionsService();

  async function fetchRoute(points,opts={}){
    if(points.length<2) return null;
    const origin={lat:points[0][0],lng:points[0][1]};
    const dest={lat:points[points.length-1][0],lng:points[points.length-1][1]};
    const waypoints=points.slice(1,points.length-1).map(p=>({location:{lat:p[0],lng:p[1]},stopover:true}));
    const travelMode=currentRouteMode==='walking'?google.maps.TravelMode.WALKING:google.maps.TravelMode.DRIVING;
    const provideAlts=!opts.noAlternatives&&waypoints.length===0; // 経由地ありだとalternatives不可

    return new Promise(resolve=>{
      directionsService.route({
        origin,destination:dest,waypoints,
        travelMode,provideRouteAlternatives:provideAlts,
        region:'jp'
      },(result,status)=>{
        if(status!==google.maps.DirectionsStatus.OK||!result||!result.routes||!result.routes.length){
          console.error('Directions API error:',status,result);
          resolve(null);
          return;
        }

        // Directions結果を内部形式に変換
        function convertRoute(route){
          const leg=route.legs;
          let totalDist=0,totalDur=0;
          const coords=[];
          for(const l of leg){
            totalDist+=l.distance.value;
            totalDur+=l.duration.value;
          }
          // overview_pathが存在すればそれを使う（既にデコード済みLatLng配列）
          // なければoverview_polyline.pointsをデコード
          let path=route.overview_path;
          if(!path||!path.length){
            const encoded=route.overview_polyline;
            if(encoded&&typeof encoded==='string'){
              path=google.maps.geometry.encoding.decodePath(encoded);
            } else if(encoded&&encoded.points){
              path=google.maps.geometry.encoding.decodePath(encoded.points);
            } else {
              // フォールバック: legsのstepsから座標を抽出
              path=[];
              for(const l of leg){
                for(const step of l.steps){
                  if(step.path) path.push(...step.path);
                  else if(step.lat_lngs) path.push(...step.lat_lngs);
                }
              }
            }
          }
          for(const p of path) coords.push([p.lng(),p.lat()]);
          return{distance:totalDist,duration:totalDur,geometry:{coordinates:coords},_gRoute:route};
        }

        if(result.routes.length===1){resolve(convertRoute(result.routes[0]));return;}

        // 複数ルート: 最速＋市区町村通過考慮で選択
        const cityCodes=opts.cityCodes||[];
        let best=null,bestScore=Infinity;
        for(const route of result.routes){
          const conv=convertRoute(route);
          let score=conv.duration;
          if(cityCodes.length>0){
            let passCount=0;
            for(const code of cityCodes){
              if(checkRoutePassesCity(conv.geometry.coordinates,code)) passCount++;
            }
            score+=(cityCodes.length-passCount)*1800;
          }
          if(score<bestScore){bestScore=score;best=conv;}
        }
        resolve(best||convertRoute(result.routes[0]));
      });
    });
  }

  function checkRoutePassesCity(routeCoords,cityCode){
    const rings=getCityBoundaryRings(cityCode);
    if(!rings.length) return false;
    for(let i=0;i<routeCoords.length;i+=2){
      const lat=routeCoords[i][1],lng=routeCoords[i][0];
      for(const ring of rings){
        if(isPointInRing({lat,lng},ring)) return true;
      }
    }
    return false;
  }

  function isPointInRing(latlng,ring){
    const x=latlng.lng,y=latlng.lat;
    let inside=false;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const yi=ring[i][0],xi=ring[i][1];
      const yj=ring[j][0],xj=ring[j][1];
      if((yi>y)!==(yj>y)&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  // ── 市区町村経由ポイントの決定 ──
  //
  // 【方針】Places API で「市区町村名 役場」「道の駅」等を検索し、
  //         道路上の実在スポット座標を経由地に使う。
  //         スポットが見つからない場合は重心（centroid）にフォールバック。
  //
  // getCityRoadPoint(cityName, cityCode, centroid):
  //   cityName  = 表示用の市区町村名（例：「鶴居村」）
  //   cityCode  = 市区町村コード
  //   centroid  = [lat,lng] フォールバック用重心
  //   戻り値    = Promise<[lat,lng]>
  //
  // 検索クエリ優先順: 役場 > 道の駅 > 駅 > 重心フォールバック
  // 取得した座標が市区町村境界内に収まっているかを確認してから採用する。
  async function getCityRoadPoint(cityName,cityCode,centroid){
    const rings=getCityBoundaryRings(cityCode);

    function isInside(lat,lng){
      if(!rings.length) return true; // 境界データなければ制限しない
      const pt={lat,lng};
      for(const ring of rings){ if(isPointInRing(pt,ring)) return true; }
      return false;
    }

    // Places textSearch で候補を1件取得
    async function searchPlace(query){
      return new Promise(resolve=>{
        placesService.textSearch({
          query,
          location:new google.maps.LatLng(centroid[0],centroid[1]),
          radius:50000,
          language:'ja'
        },(results,status)=>{
          if(status===google.maps.places.PlacesServiceStatus.OK&&results&&results.length){
            const r=results[0];
            const lat=r.geometry.location.lat();
            const lng=r.geometry.location.lng();
            resolve({lat,lng,name:r.name});
          } else resolve(null);
        });
      });
    }

    // 優先順に検索
    const queries=[
      `${cityName} 役場`,
      `${cityName} 道の駅`,
      `${cityName} 駅`,
    ];
    for(const q of queries){
      const r=await searchPlace(q);
      if(r&&isInside(r.lat,r.lng)){
        return [r.lat,r.lng];
      }
    }

    // フォールバック: 重心
    return centroid;
  }

  $('route-go-btn').addEventListener('click',async()=>{
    const fromVal=$('route-from').value.trim();
    const toVal=$('route-to').value.trim();
    if(!routeFromCoord&&fromVal){
      const c=parseCoordString(fromVal);
      if(c) routeFromCoord=[c.lat,c.lng];
      else{const r=await placesSearch(fromVal);if(r.length) routeFromCoord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
    }
    if(!routeToCoord&&toVal){
      const c=parseCoordString(toVal);
      if(c) routeToCoord=[c.lat,c.lng];
      else{const r=await placesSearch(toVal);if(r.length) routeToCoord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
    }
    for(const wp of routeWaypoints){
      if(!wp.coord&&wp.name){
        const c=parseCoordString(wp.name);
        if(c) wp.coord=[c.lat,c.lng];
        else{const r=await placesSearch(wp.name);if(r.length) wp.coord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
      }
    }
    if(!routeFromCoord||!routeToCoord){alert('出発地と目的地を入力してください');return;}

    $('route-result').style.display='block';
    $('route-result').textContent='ルートを計算中...';

    // 全経由地を元の順番で構築
    const orderedWp=routeWaypoints.filter(wp=>wp.coord||wp.isCityWaypoint);
    const cityCheckResults=[];
    const wpMarkerData=[];

    // 通常経由地（ポイント指定）と市区町村経由地を分離
    const normalPoints=[];  // {coord, name, originalIdx}
    const cityWpList=[];    // {cityCode, name, originalIdx}
    for(let i=0;i<orderedWp.length;i++){
      const wp=orderedWp[i];
      if(!wp.isCityWaypoint&&wp.coord){
        normalPoints.push({coord:wp.coord,name:wp.name,originalIdx:i});
      } else if(wp.isCityWaypoint&&wp.cityCode){
        cityWpList.push({cityCode:wp.cityCode,name:wp.name,originalIdx:i});
      }
    }

    // 出発地・目的地の市区町村フラグ
    const fromIsCity=routeFromCity.isCityWaypoint&&routeFromCity.cityCode;
    const toIsCity=routeToCity.isCityWaypoint&&routeToCity.cityCode;

    // 市区町村経由の指定がない場合は1回のAPI呼び出しで完結
    const needsCityProcessing=cityWpList.length>0||fromIsCity||toIsCity;

    if(!needsCityProcessing){
      // ── シンプルケース: 通常経由地のみ、API1回 ──
      const pts=[routeFromCoord,...normalPoints.map(p=>p.coord),routeToCoord];
      let route;
      try{route=await fetchRoute(pts,{noAlternatives:pts.length>2});}
      catch(e){$('route-result').textContent='ルート取得に失敗しました';return;}
      if(!route){$('route-result').textContent='ルートが見つかりませんでした';return;}
      const wmd=normalPoints.map(p=>({coord:p.coord,name:p.name,cityCode:null}));
      renderFinalRoute(route,wmd,[]);
      return;
    }

    // ── 市区町村経由あり: 2回API方式 ──
    // 【理由】侵入ポイントが「道路上の点」でないとAPIが境界外にスナップして通過失敗する。
    //         1回目APIで実際の道路座標列を得てから侵入ポイントを確定する必要がある。

    // 【1回目API】通常経由地のみ → 実際の道路上の座標列を取得
    $('route-result').textContent='ルートを計算中 (1/2)...';
    const basePoints=[routeFromCoord,...normalPoints.map(p=>p.coord),routeToCoord];
    let baseRoute;
    try{baseRoute=await fetchRoute(basePoints,{noAlternatives:normalPoints.length>0});}
    catch(e){$('route-result').textContent='ルート取得に失敗しました';return;}
    if(!baseRoute){$('route-result').textContent='ルートが見つかりませんでした';return;}

    // 【経由ポイント決定】Places APIで道路上スポット座標を取得（役場・道の駅・駅の優先順）
    // ユーザー指定順（originalIdx）を厳守してソートする
    $('route-result').textContent='経由地を検索中...';
    const additionalWaypoints=[];
    for(const cwp of cityWpList){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,cwp.cityCode);
      if(passes){
        cityCheckResults.push({name:cwp.name,passes:true});
      } else {
        const centroid=getCityCentroid(cwp.cityCode)||[0,0];
        const coord=await getCityRoadPoint(cwp.name,cwp.cityCode,centroid);
        additionalWaypoints.push({coord,name:cwp.name,cityCode:cwp.cityCode,originalIdx:cwp.originalIdx});
        cityCheckResults.push({name:cwp.name,passes:false});
      }
    }

    // 出発地・目的地の市区町村処理
    if(fromIsCity){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,routeFromCity.cityCode);
      if(!passes){
        const centroid=getCityCentroid(routeFromCity.cityCode)||[0,0];
        routeFromCoord=await getCityRoadPoint(routeFromCity.name,routeFromCity.cityCode,centroid);
      }
      cityCheckResults.push({name:routeFromCity.name,passes});
    }
    if(toIsCity){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,routeToCity.cityCode);
      if(!passes){
        const centroid=getCityCentroid(routeToCity.cityCode)||[0,0];
        routeToCoord=await getCityRoadPoint(routeToCity.name,routeToCity.cityCode,centroid);
      }
      cityCheckResults.push({name:routeToCity.name,passes});
    }

    // 追加経由地がなければ（全市区町村がベースルートで通過済み）2回目不要
    if(additionalWaypoints.length===0&&!fromIsCity&&!toIsCity){
      const wmd=normalPoints.map(p=>({coord:p.coord,name:p.name,cityCode:null}));
      renderFinalRoute(baseRoute,wmd,cityCheckResults);
      return;
    }

    // 【2回目API】道路上スポット経由地を挿入して最終ルートを取得
    // ユーザー指定の originalIdx 順を厳守
    $('route-result').textContent='ルートを計算中 (2/2)...';
    const allWpEntries=[
      ...normalPoints.map(p=>({coord:p.coord,name:p.name,originalIdx:p.originalIdx,cityCode:null})),
      ...additionalWaypoints
    ];
    allWpEntries.sort((a,b)=>a.originalIdx-b.originalIdx);

    const finalPoints=[routeFromCoord,...allWpEntries.map(w=>w.coord),routeToCoord];
    const allCityCodes=additionalWaypoints.map(w=>w.cityCode);
    if(fromIsCity) allCityCodes.push(routeFromCity.cityCode);
    if(toIsCity) allCityCodes.push(routeToCity.cityCode);

    let finalRoute;
    try{finalRoute=await fetchRoute(finalPoints,{cityCodes:allCityCodes,noAlternatives:true});}
    catch(e){finalRoute=null;}
    if(!finalRoute) finalRoute=baseRoute; // フォールバック

    // 事後チェック: 2回目ルートで通過を再確認
    for(const cr of cityCheckResults){
      if(!cr.passes){
        const wd=additionalWaypoints.find(w=>w.name===cr.name);
        if(wd) cr.passes=checkRoutePassesCity(finalRoute.geometry.coordinates,wd.cityCode);
      }
    }

    const wmd=allWpEntries.map(w=>({coord:w.coord,name:w.name,cityCode:w.cityCode||null}));
    renderFinalRoute(finalRoute,wmd,cityCheckResults);
  });

  // ── ルート通過市区町村のハイライト ──
  function highlightRouteCities(routeCoords){
    // 既存のハイライトレイヤーをクリア
    if(_routeHighlightLayer){_routeHighlightLayer.setMap(null);_routeHighlightLayer=null;}
    window._routeHighlightCodes=new Set();

    const passedCodes=new Set();

    for(let i=0;i<routeCoords.length;i+=2){
      const lng=routeCoords[i][0],lat=routeCoords[i][1];
      const latlng={lat,lng};
      for(const[code,features] of Object.entries(_geoFeaturesByCode)){
        if(passedCodes.has(code)) continue;
        for(const f of features){
          if(!f||!f.geometry||!f.geometry.type) continue;
          try{
            if(isPointInFeature(latlng,f)){passedCodes.add(code);break;}
          }catch(e){}
        }
      }
    }

    if(passedCodes.size>0){
      window._routeHighlightCodes=passedCodes;
      // geoDataLayerのスタイル関数を再適用してハイライトを反映
      applyGeoStyles();
      window._routeHighlightCodes=passedCodes;
    }

    return passedCodes;
  }

  // ── 描画共通関数 ──
  function renderFinalRoute(route,wpMarkerData,cityCheckResults){
    const resolvedPoints=[routeFromCoord,...wpMarkerData.map(w=>w.coord),routeToCoord];
    const dist=(route.distance/1000).toFixed(1);
    const dur=Math.round(route.duration/60);
    const h=Math.floor(dur/60),m=dur%60;
    const durStr=h>0?`${h}時間${m}分`:`${m}分`;
    if(routeLayer){routeLayer.setMap(null);routeLayer=null;}
    if(window._wpMarkers){window._wpMarkers.forEach(mk=>mk.setMap(null));window._wpMarkers=[];}

    const routePath=route.geometry.coordinates.map(c=>({lat:c[1],lng:c[0]}));
    routeLayer=new google.maps.Polyline({path:routePath,strokeColor:'#b45309',strokeWeight:6,strokeOpacity:0.92,zIndex:10,map:map});

    window._wpMarkers=[];
    for(const wd of wpMarkerData){
      const marker=new google.maps.Marker({
        position:{lat:wd.coord[0],lng:wd.coord[1]},map,
        icon:makeCircleIcon('#b45309',12),zIndex:11,title:wd.name
      });
      const iw=new google.maps.InfoWindow({content:`<strong>経由地</strong><br>${wd.name}`});
      marker.addListener('click',()=>iw.open(map,marker));
      window._wpMarkers.push(marker);
    }

    const routeBounds=new google.maps.LatLngBounds();
    routePath.forEach(p=>routeBounds.extend(p));
    map.fitBounds(routeBounds,40);

    // ルート通過市区町村を色付け
    const passedCities=highlightRouteCities(route.geometry.coordinates);

    let resultHTML=`距離: <strong>${dist} km</strong><br>所要時間: <strong>${durStr}</strong>`;
    if(currentRouteMode==='walking') resultHTML+=` <span style="font-size:10px;color:var(--text-dim)">(徒歩)</span>`;
    resultHTML+=`<br>通過市区町村: <strong>${passedCities.size}箇所</strong>`;
    if(wpMarkerData.length) resultHTML+=`<br>経由地: <strong>${wpMarkerData.length}箇所</strong>`;
    for(const cr of cityCheckResults){
      resultHTML+=`<br>${cr.passes?'✅':'📌'} ${cr.name}${cr.passes?' — ルート上で通過済み':''}`;
    }
    $('route-result').innerHTML=resultHTML;
    $('route-clear-btn').style.display='block';
    $('route-save-btn').style.display='block';
    // 保存用にルートデータを保持
    window._lastRouteData={
      mode:currentRouteMode,
      from:{coord:routeFromCoord,name:$('route-from').value,isCity:routeFromCity.isCityWaypoint,cityCode:routeFromCity.cityCode},
      to:{coord:routeToCoord,name:$('route-to').value,isCity:routeToCity.isCityWaypoint,cityCode:routeToCity.cityCode},
      waypoints:wpMarkerData.map(w=>({coord:w.coord,name:w.name,cityCode:w.cityCode||null})),
      geometry:route.geometry.coordinates,
      distance:route.distance,duration:route.duration,
      passedCities:Array.from(passedCities)
    };
    buildGoogleMapsLinks(resolvedPoints,wpMarkerData,cityCheckResults);
  }

  const GMAP_WP_LIMIT=9; // Googleマップ経由地上限

  function buildGoogleMapsLinks(points,wpData,cityResults){
    // points: [出発coord, ...経由coord..., 目的coord]
    // 出発=points[0], 目的=points[points.length-1], 経由=points[1..n-2]
    if(points.length<2) return;

    const origin=points[0];
    const dest=points[points.length-1];
    const waypoints=points.slice(1,points.length-1);

    // 通過済み市区町村の省略判定
    // 重要: 誤判定による取り逃しを防ぐため、通過済みかつfinalRouteでも通過を再確認したもののみ省略
    // ここでは安全策として通過済み判定は参考表示のみにし、
    // Googleマップに渡す経由地からは「ルート検索で実際にポイントが追加されなかった」ものだけ自然に除外される
    // （resolvedPointsにはそもそも通過済みのポイントは含まれていない）

    // つまりwaypoints = 実際に必要な経由地のみ（既に絞り込み済み）
    const gmapMode=currentRouteMode==='walking'?'walking':'driving';

    if(waypoints.length<=GMAP_WP_LIMIT){
      // 制限内: 1つのURLで完結
      const {url,device}=buildMapUrl(origin,dest,waypoints,gmapMode);
      showGmapLinks([{url,label:getMapLinkLabel(device,null),sub:null}]);
    } else {
      // 制限超過: 最小分割（iOS Apple Maps は経由地制限が緩いが安全のため同じ分割を適用）
      const segments=splitForGmap(origin,dest,waypoints);
      const links=segments.map((seg,i)=>{
        const {url,device}=buildMapUrl(seg.origin,seg.dest,seg.waypoints,gmapMode);
        const segLabel=segments.length>1?`区間${i+1}/${segments.length}`:null;
        const label=getMapLinkLabel(device,segLabel);
        const sub=`${seg.originName} → ${seg.destName}`;
        return {url,label,sub};
      });
      showGmapLinks(links);
    }
  }

  // ── デバイス判定 ──
  function detectDevice(){
    const ua=navigator.userAgent||'';
    if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream) return 'ios';
    if(/Android/.test(ua)) return 'android';
    return 'desktop';
  }

  // iOS: Apple Maps URL
  // saddr/daddr は "lat,lng" 形式、経由地は waypoints パラメータ（Apple Maps はネイティブのみ対応）
  // 実用上 Apple Maps は多経由地を URL で渡せないため出発→目的のみ渡し、
  // 経由地は waypoints パラメータ(カンマ区切り lat,lng)で試みる
  function buildAppleMapsUrl(origin,dest,waypoints,mode){
    const dirflg=mode==='walking'?'w':'d';
    const saddr=`${origin[0]},${origin[1]}`;
    const daddr=`${dest[0]},${dest[1]}`;
    let url=`https://maps.apple.com/?saddr=${saddr}&daddr=${daddr}&dirflg=${dirflg}`;
    // Apple Maps は waypoints パラメータを実験的にサポート
    if(waypoints.length>0){
      // 中継点を daddr に +to: 形式で繋ぐ（Apple Maps URL scheme の書き方）
      // 複数経由地は "daddr=A+to:B+to:C+to:DEST" 形式
      const allDest=[...waypoints,dest];
      const daddrChain=allDest.map(w=>`${w[0]},${w[1]}`).join('+to:');
      url=`https://maps.apple.com/?saddr=${saddr}&daddr=${daddrChain}&dirflg=${dirflg}`;
    }
    return url;
  }

  // Android/Desktop: Google Maps URL
  function buildGmapUrl(origin,dest,waypoints,mode){
    const o=`${origin[0]},${origin[1]}`;
    const d=`${dest[0]},${dest[1]}`;
    let url=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=${mode}`;
    if(waypoints.length>0){
      const wpStr=waypoints.map(w=>`${w[0]},${w[1]}`).join('|');
      url+=`&waypoints=${encodeURIComponent(wpStr)}`;
    }
    return url;
  }

  function buildMapUrl(origin,dest,waypoints,mode){
    const device=detectDevice();
    if(device==='ios') return {url:buildAppleMapsUrl(origin,dest,waypoints,mode),device};
    return {url:buildGmapUrl(origin,dest,waypoints,mode),device};
  }

  function getMapLinkLabel(device,segLabel){
    const appName=device==='ios'?'マップ（Apple）':'Googleマップ';
    return segLabel?`${segLabel} — ${appName}で開く`:`${appName}で開く`;
  }

  function splitForGmap(origin,dest,waypoints){
    // 最小分割: GMAP_WP_LIMITごとに区切る
    // 各区間: origin→wp[0..limit-1]→(次区間のoriginになる最終経由地)
    const segments=[];
    let segStart=origin;
    let segStartName='出発地';
    let i=0;
    while(i<waypoints.length){
      const remaining=waypoints.length-i;
      const chunkSize=Math.min(GMAP_WP_LIMIT,remaining);
      const chunk=waypoints.slice(i,i+chunkSize);
      const isLast=(i+chunkSize>=waypoints.length);
      const segDest=isLast?dest:chunk[chunk.length-1];
      const segDestName=isLast?'目的地':`経由地${i+chunkSize}`;
      // 最後の区間でない場合、chunkの最後は次区間のoriginになるので経由地から除く
      const segWp=isLast?chunk:chunk.slice(0,chunk.length-1);
      segments.push({
        origin:segStart,
        dest:segDest,
        waypoints:segWp,
        originName:segStartName,
        destName:segDestName
      });
      if(!isLast){
        segStart=chunk[chunk.length-1];
        segStartName=`経由地${i+chunkSize}`;
      }
      i+=chunkSize;
    }
    return segments;
  }

  function showGmapLinks(links){
    // route-result内にマップリンクを追加
    const device=detectDevice();
    const icon=device==='ios'?'🍎':'🗺';
    const container=document.createElement('div');
    container.className='gmap-links';
    for(const link of links){
      const a=document.createElement('a');
      a.className='gmap-link-btn';
      a.href=link.url;
      a.target='_blank';
      a.rel='noopener';
      a.innerHTML=`<span class="gmap-icon">${icon}</span><span class="gmap-label">${link.label}${link.sub?`<br><span class="gmap-sub">${link.sub}</span>`:''}</span><span style="font-size:13px;">↗</span>`;
      container.appendChild(a);
    }
    $('route-result').appendChild(container);
  }

  // ══════════════════════════════════════════════════════
  // ── スポットコレクション機能 ──
  // ══════════════════════════════════════════════════════
  let spotData=null; // spot_visits.json のデータ
  let spotUserData={}; // spot_user.json のデータ {spotId: {manualChecked:true}}
  let spotMarkers=[]; // Google Maps マーカー
  let spotMarkersVisible=true;
  let spotCurrentView='catList'; // 'catList' | 'spotList'
  let spotCurrentCatId=null;

  function getSpotUser(spotId){
    return spotUserData[spotId]||{};
  }
  // status: "visited"=利用した, "passed"=通過のみ, undefined=未設定
  function getManualStatus(spotId){
    const u=spotUserData[spotId];
    return u?u.status:undefined;
  }
  function setManualStatus(spotId,status){
    // 対象スポットのgroupを取得
    let group=null;
    if(spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(sp.id===spotId&&sp.group){group=sp.group;break;}
        }
        if(group) break;
      }
    }
    // 同groupの全スポットIDを収集
    const targets=[spotId];
    if(group&&spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(sp.group===group&&sp.id!==spotId) targets.push(sp.id);
        }
      }
    }
    // 全対象にstatusをセット
    for(const sid of targets){
      if(!spotUserData[sid]) spotUserData[sid]={};
      if(status) spotUserData[sid].status=status;
      else delete spotUserData[sid].status;
      if(Object.keys(spotUserData[sid]).length===0) delete spotUserData[sid];
    }
    // spotData側にも反映
    if(spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(targets.includes(sp.id)) sp._manualStatus=status;
        }
      }
    }
  }
  // 実効的に「訪問した」扱いか
  function isEffectiveVisited(spot){
    const ms=spot._manualStatus||getManualStatus(spot.id);
    if(ms==='visited') return true;
    if(ms==='passed') return false;
    // 未設定なら自動検出をそのまま使う
    return !!spot.autoDetected;
  }
  // 実効的に「利用した」（手動で明示）か
  function isManualVisited(spot){
    const ms=spot._manualStatus||getManualStatus(spot.id);
    return ms==='visited';
  }

  // spot_user.json を JSONダウンロードで書き出し
  function downloadSpotUserJson(){
    // 空エントリを除外して整形
    const clean={};
    for(const[k,v] of Object.entries(spotUserData)){
      if(v&&v.status) clean[k]={status:v.status};
    }
    const json=JSON.stringify(clean,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='spot_user.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // spot_visits.json + spot_user.json を読み込み
  async function loadSpotData(){
    try{
      const res=await fetch('data/spot_visits.json');
      if(!res.ok) return;
      spotData=await res.json();
    }catch(e){
      console.log('spot_visits.json not found:',e);
      return;
    }
    // spot_user.json を読み込み（なくてもOK）
    // 旧形式(manualChecked:true)との互換: statusに変換
    try{
      const res2=await fetch('data/spot_user.json');
      if(res2.ok){
        spotUserData=await res2.json();
        for(const[k,v] of Object.entries(spotUserData)){
          if(v.manualChecked===true&&!v.status){v.status='visited';delete v.manualChecked;}
        }
      }
    }catch(e){}
    // マージ
    for(const cat of spotData.categories){
      for(const s of cat.spots){
        s._manualStatus=getManualStatus(s.id);
      }
    }
    renderSpotHeaderStats();
    renderSpotCatList();
    addSpotMarkers();
    addSpotLayerToggle();
  }

  function countSpotStats(){
    if(!spotData) return {total:0,autoVisited:0,visited:0};
    let total=0,autoVisited=0,visited=0;
    for(const cat of spotData.categories){
      for(const s of cat.spots){
        total++;
        if(s.autoDetected) autoVisited++;
        if(isEffectiveVisited(s)) visited++;
      }
    }
    return {total,autoVisited,visited};
  }

  function renderSpotHeaderStats(){
    const stats=countSpotStats();
    $('spot-header-stats').innerHTML=`
      <div class="spot-stat-chip"><span>総スポット</span><span class="sv">${stats.total}</span></div>
      <div class="spot-stat-chip"><span>訪問</span><span class="sv">${stats.visited}</span></div>
      <div class="spot-stat-chip"><span>自動検出</span><span class="sv">${stats.autoVisited}</span></div>
    `;
  }

  function getEffectiveCompleted(cat){
    let n=0;
    for(const s of cat.spots){
      if(isEffectiveVisited(s)) n++;
    }
    return n;
  }

  function renderSpotCatList(){
    spotCurrentView='catList';spotCurrentCatId=null;
    const el=$('spot-sidebar-content');
    if(!spotData||!spotData.categories.length){
      el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">spot_visits.json が見つかりません。<br>パイプラインを実行してスポットデータを生成してください。</div>';
      return;
    }
    el.innerHTML=spotData.categories.map(cat=>{
      const ec=getEffectiveCompleted(cat);
      const isComplete=ec>=cat.total;
      return `<div class="spot-cat-item${isComplete?' spot-cat-complete':''}" data-cat-id="${cat.id}">
        <div class="spot-cat-icon">${cat.icon||'📍'}</div>
        <div class="spot-cat-info">
          <div class="spot-cat-name">${cat.name}</div>
          <div class="spot-cat-desc">${cat.description||''}</div>
          <div class="spot-cat-prog">
            <div class="spot-cat-bar"><div class="spot-cat-bar-fill" style="width:${cat.total>0?ec/cat.total*100:0}%"></div></div>
            <div class="spot-cat-count">${ec}/${cat.total}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    // カテゴリ一覧の下部に保存ボタン
    el.innerHTML+=`<div style="padding:10px 12px;"><button class="ctrl-btn" id="spot-save-all-btn" style="width:100%;padding:8px;font-size:12px;">📥 利用データを保存</button></div>`;
    el.querySelectorAll('.spot-cat-item').forEach(item=>{
      item.addEventListener('click',()=>renderSpotList(item.dataset.catId));
    });
    $('spot-save-all-btn').addEventListener('click',downloadSpotUserJson);
  }

  function renderSpotList(catId){
    spotCurrentView='spotList';spotCurrentCatId=catId;
    const cat=spotData.categories.find(c=>c.id===catId);
    if(!cat) return;
    const el=$('spot-sidebar-content');
    let h=`<button class="back-btn" id="spot-back-to-cats">← カテゴリ一覧</button>`;
    h+=`<div style="padding:4px 12px 8px;"><span style="font-size:15px;font-weight:700;color:var(--text-bright);">${cat.icon||''} ${cat.name}</span>`;
    h+=`<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${cat.description||''}</div></div>`;
    for(const s of cat.spots){
      const isAuto=s.autoDetected;
      const ms=s._manualStatus||getManualStatus(s.id);
      const effVisited=isEffectiveVisited(s);
      const isManualV=ms==='visited';
      const isPassed=ms==='passed';
      // ステータス表示: 手動優先
      const statusClass=isManualV?'manual':effVisited?'auto':'';
      const statusIcon=isManualV?'✔':effVisited?'~':'';
      const statusTitle=isManualV?'利用した':isPassed?'通過のみ（自動検出あり）':isAuto?'自動検出（近くを通過）':'未訪問';
      const dateStr=s.firstVisit?`${s.firstVisit} ~ ${s.lastVisit||s.firstVisit}`:'';
      // 自動検出マーク（手動で上書きしている場合に小さく表示）
      const autoTag=(isAuto&&ms)?'<span style="font-size:9px;color:var(--text-dim);margin-left:4px;" title="自動検出あり">🛰</span>':'';
      // 所属カテゴリバッジ（他カテゴリにも属している場合）
      let otherCats='';
      if(s.group){
        const others=[];
        for(const oc of spotData.categories){
          if(oc.id===cat.id) continue;
          for(const os of oc.spots){
            if(os.group===s.group) others.push(oc);
          }
        }
        if(others.length) otherCats=others.map(oc=>`<span style="font-size:9px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1px 5px;color:var(--text-dim);white-space:nowrap;">${oc.icon||''} ${oc.name}</span>`).join(' ');
      }
      h+=`<div class="spot-item" data-spot-id="${s.id}">
        <div class="spot-status ${statusClass}" data-spot-id="${s.id}" title="${statusTitle}">${statusIcon}</div>
        <div class="spot-info">
          <div class="spot-name">${s.name}${autoTag}</div>
          <div class="spot-pref">${s.pref}${otherCats?' '+otherCats:''}</div>
          ${dateStr?`<div class="spot-dates">${dateStr}${s.visitDays?' ('+s.visitDays+'日)':''}</div>`:''}
          <div class="spot-actions">
            <button class="spot-act-btn ${isManualV?'checked':''}" data-spot-id="${s.id}" data-action="visited">${isManualV?'✓ 利用した':'利用した'}</button>
            <button class="spot-act-btn ${isPassed?'checked':''}" data-spot-id="${s.id}" data-action="passed" style="${isPassed?'background:var(--bg);border-color:var(--text-dim);color:var(--text-dim);font-weight:500;':''}">${isPassed?'✓ 通過のみ':'通過のみ'}</button>
          </div>
        </div>
        <button class="spot-locate-btn" data-lat="${s.lat}" data-lon="${s.lon}" title="地図で表示">📍</button>
      </div>`;
    }
    el.innerHTML=h;

    // イベント: 戻るボタン
    $('spot-back-to-cats').addEventListener('click',()=>{renderSpotCatList();renderSpotHeaderStats();});

    // イベント: 利用した / 通過のみ
    el.querySelectorAll('[data-action="visited"]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const sid=btn.dataset.spotId;
        const cur=getManualStatus(sid);
        setManualStatus(sid,cur==='visited'?undefined:'visited');
        renderSpotList(catId);
        updateSpotMarkers();
        renderSpotHeaderStats();
      });
    });
    el.querySelectorAll('[data-action="passed"]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const sid=btn.dataset.spotId;
        const cur=getManualStatus(sid);
        setManualStatus(sid,cur==='passed'?undefined:'passed');
        renderSpotList(catId);
        updateSpotMarkers();
        renderSpotHeaderStats();
      });
    });

    // イベント: 地図で表示
    el.querySelectorAll('.spot-locate-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const lat=parseFloat(btn.dataset.lat),lon=parseFloat(btn.dataset.lon);
        map.setCenter({lat,lng:lon});
        map.setZoom(15);
        if(window.innerWidth<=768){
          sidebar.classList.add('collapsed');
          updateToggleBtn();
          setTimeout(()=>google.maps.event.trigger(map,'resize'),350);
        }
      });
    });
  }

  // ── スポットマーカー (地図上) ──
  function makeSpotIcon(catIcon,visited,manualChecked){
    const bgColor=manualChecked?'#C1F0C8':visited?'#EFFBF1':'#e5e7eb';
    const borderColor=manualChecked?'#4ade80':visited?'#86efac':'#9ca3af';
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34">
      <circle cx="17" cy="17" r="15" fill="${bgColor}" stroke="${borderColor}" stroke-width="2"/>
      <text x="17" y="23" text-anchor="middle" font-size="16">${catIcon}</text>
    </svg>`;
    return{url:'data:image/svg+xml,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(34,34),anchor:new google.maps.Point(17,17)};
  }

  function addSpotMarkers(){
    if(!spotData) return;
    clearSpotMarkers();
    for(const cat of spotData.categories){
      const catIcon=cat.icon||'📍';
      for(const s of cat.spots){
        const effVisited=isEffectiveVisited(s);
        const isManualV=isManualVisited(s);
        const marker=new google.maps.Marker({
          position:{lat:s.lat,lng:s.lon},
          map:spotMarkersVisible?map:null,
          icon:makeSpotIcon(catIcon,effVisited,isManualV),
          title:s.name,
          zIndex:5,
        });
        const dateStr=s.firstVisit?`<br>初訪問: ${s.firstVisit}`:'';
        const ms=s._manualStatus||getManualStatus(s.id);
        const statusLabel=ms==='visited'?'利用した':ms==='passed'?'通過のみ':s.autoDetected?'自動検出':'未訪問';
        // 所属カテゴリ一覧（複数ある場合は併記）
        let catLabels=cat.icon+' '+cat.name;
        if(s.group){
          const allCats=[{icon:cat.icon,name:cat.name}];
          for(const oc of spotData.categories){
            if(oc.id===cat.id) continue;
            for(const os of oc.spots){if(os.group===s.group) allCats.push({icon:oc.icon,name:oc.name});}
          }
          if(allCats.length>1) catLabels=allCats.map(c=>(c.icon||'')+' '+c.name).join(' / ');
        }
        const iwContent=`<div class="iw-body">
          <div style="font-weight:700;font-size:14px;">${s.name}</div>
          <div style="color:#7a8494;font-size:11px;margin-top:2px;">${catLabels} · ${s.pref}</div>
          <div style="margin-top:6px;font-size:11px;"><span style="padding:2px 8px;border-radius:10px;background:${isManualV?'#C1F0C8':effVisited?'#EFFBF1':'#f3f4f6'};color:${isManualV?'#166534':effVisited?'#166534':'#6b7280'};font-weight:500;">${statusLabel}</span>${s.autoDetected&&ms?'<span style="font-size:9px;color:#7a8494;margin-left:4px;" title="自動検出あり">🛰</span>':''}</div>
          ${dateStr?`<div style="font-size:11px;color:#7a8494;margin-top:4px;font-family:'DM Mono',monospace;">${dateStr}</div>`:''}
        </div>`;
        marker.addListener('click',()=>{
          infoWindow.setContent(iwContent);
          infoWindow.open(map,marker);
        });
        marker._spotId=s.id;
        spotMarkers.push(marker);
      }
    }
  }

  function clearSpotMarkers(){
    spotMarkers.forEach(m=>m.setMap(null));
    spotMarkers=[];
  }

  function updateSpotMarkers(){
    if(!spotData) return;
    for(const marker of spotMarkers){
      const sid=marker._spotId;
      let found=null,catIcon='📍';
      for(const cat of spotData.categories){
        for(const s of cat.spots){if(s.id===sid){found=s;catIcon=cat.icon||'📍';break;}}
        if(found) break;
      }
      if(found){
        const effVisited=isEffectiveVisited(found);
        const isManualV=isManualVisited(found);
        marker.setIcon(makeSpotIcon(catIcon,effVisited,isManualV));
      }
    }
  }

  // レイヤートグルにスポット表示切替を追加
  function addSpotLayerToggle(){
    const chkSpots=document.createElement('input');
    chkSpots.type='checkbox';chkSpots.id='toggle-spots';chkSpots.checked=true;
    const lblSpots=document.createElement('label');
    lblSpots.className='toggle-item';
    const spotIcon=document.createElement('span');
    spotIcon.textContent='📍';spotIcon.style.fontSize='13px';
    const spotText=document.createElement('span');
    spotText.textContent='スポット';
    lblSpots.append(chkSpots,spotIcon,spotText);
    toggleDiv.appendChild(lblSpots);
    chkSpots.addEventListener('change',function(){
      spotMarkersVisible=this.checked;
      spotMarkers.forEach(m=>m.setMap(this.checked?map:null));
    });
  }

  // スポットデータ読み込み開始
  loadSpotData();

  // ── 保存ルート管理 ──
  const ROUTE_COLORS=['#fde047','#fb923c','#a3e635','#34d399','#38bdf8','#818cf8','#e879f9','#f472b6','#4ade80','#2dd4bf'];
  let savedRoutes=[]; // [{id,name,color,mode,from,to,waypoints,geometry,distance,duration,passedCities}]
  let displayedRoutes={}; // id -> {polyline, highlightLayer, markers[]}

  // data/routes.json から読み込み
  async function loadSavedRoutes(){
    try{
      const res=await fetch('data/routes.json');
      if(res.ok){savedRoutes=await res.json();renderSavedRoutesList();}
    }catch(e){}
  }

  function getNextColor(){
    const usedColors=savedRoutes.map(r=>r.color);
    for(const c of ROUTE_COLORS){if(!usedColors.includes(c)) return c;}
    return ROUTE_COLORS[savedRoutes.length%ROUTE_COLORS.length];
  }

  // ── 保存ルート編集 ──
  let _editingRouteId=null; // 編集中のルートID（nullなら新規）

  function loadRouteForEdit(id){
    const r=savedRoutes.find(r=>r.id===id);
    if(!r) return;
    _editingRouteId=id;

    // ルート検索フォームをクリア
    $('route-clear-btn').click();

    // 出発・ゴールをセット
    $('route-from').value=r.from.name||'';
    routeFromCoord=r.from.coord;
    routeFromCity={isCityWaypoint:r.from.isCity||false,cityCode:r.from.cityCode||null,name:r.from.name||''};

    $('route-to').value=r.to.name||'';
    routeToCoord=r.to.coord;
    routeToCity={isCityWaypoint:r.to.isCity||false,cityCode:r.to.cityCode||null,name:r.to.name||''};

    // 経由地をセット
    routeWaypoints=(r.waypoints||[]).map(w=>({
      coord:w.coord,name:w.name,isCityWaypoint:!!w.cityCode,cityCode:w.cityCode||null
    }));
    renderWaypoints();

    // 走行モードをセット
    currentRouteMode=r.mode||'driving';
    document.querySelectorAll('.route-mode-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.mode===currentRouteMode);
    });

    // 保存ボタンのラベルを変更して編集モードを明示
    $('route-save-btn').textContent='ルートを保存（編集中）';
    $('route-save-btn').style.display='none'; // 再検索後に表示

    // ルートタブからルート検索タブへ切り替え
    document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelector('[data-tab="route"]').classList.add('active');
    $('tab-route').classList.add('active');
  }

  // ルート保存（ダウンロード）
  $('route-save-btn').addEventListener('click',()=>{
    if(!window._lastRouteData) return;
    const rd=window._lastRouteData;

    if(_editingRouteId){
      // 編集モード：上書きか新規かを選択
      const choice=confirm('「OK」→元のルートに上書き保存\n「キャンセル」→新しいルートとして保存');
      if(choice){
        // 上書き
        const idx=savedRoutes.findIndex(r=>r.id===_editingRouteId);
        if(idx>=0){
          const existing=savedRoutes[idx];
          savedRoutes[idx]={
            ...existing,
            mode:rd.mode,
            from:rd.from,to:rd.to,
            waypoints:rd.waypoints,
            geometry:rd.geometry,
            distance:rd.distance,duration:rd.duration,
            passedCities:rd.passedCities
          };
          if(displayedRoutes[_editingRouteId]){hideSavedRoute(_editingRouteId);showSavedRoute(_editingRouteId);}
        }
      } else {
        // 新規
        const name=prompt('ルート名を入力:',savedRoutes.find(r=>r.id===_editingRouteId)?.name+' (コピー)');
        if(!name) return;
        savedRoutes.push({
          id:'route_'+Date.now(),
          name,
          color:getNextColor(),
          createdAt:new Date().toISOString(),
          mode:rd.mode,
          from:rd.from,to:rd.to,
          waypoints:rd.waypoints,
          geometry:rd.geometry,
          distance:rd.distance,duration:rd.duration,
          passedCities:rd.passedCities
        });
      }
      _editingRouteId=null;
      $('route-save-btn').textContent='ルートを保存';
    } else {
      // 新規保存
      const name=prompt('ルート名を入力:','ルート '+(savedRoutes.length+1));
      if(!name) return;
      savedRoutes.push({
        id:'route_'+Date.now(),
        name,
        color:getNextColor(),
        createdAt:new Date().toISOString(),
        mode:rd.mode,
        from:rd.from,to:rd.to,
        waypoints:rd.waypoints,
        geometry:rd.geometry,
        distance:rd.distance,duration:rd.duration,
        passedCities:rd.passedCities
      });
    }

    renderSavedRoutesList();
    downloadRoutesJson();
    // タブを保存ルートに切り替え
    document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelector('[data-tab="routes"]').classList.add('active');
    $('tab-routes').classList.add('active');
  });

  function downloadRoutesJson(){
    const json=JSON.stringify(savedRoutes,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='routes.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // 一覧描画
  function renderSavedRoutesList(){
    const list=$('saved-routes-list');
    if(!savedRoutes.length){
      list.innerHTML='<div class="sr-empty">保存ルートはありません<br><span style="font-size:10px;">ルート検索後「ルートを保存」で追加</span></div>';
      return;
    }
    list.innerHTML=savedRoutes.map(r=>{
      const dist=(r.distance/1000).toFixed(1);
      const dur=Math.round(r.duration/60);
      const h=Math.floor(dur/60),m=dur%60;
      const durStr=h>0?`${h}h${m}m`:`${m}m`;
      const shown=!!displayedRoutes[r.id];
      return`<div class="saved-route-item" data-id="${r.id}">
        <input type="checkbox" class="sr-check" data-id="${r.id}" ${shown?'checked':''}>
        <div class="sr-color" data-id="${r.id}" style="background:${r.color};" title="色を変更"></div>
        <div class="sr-info">
          <div class="sr-name">${r.name}</div>
          <div class="sr-meta">${dist}km / ${durStr} / ${r.passedCities?r.passedCities.length:0}市区町村</div>
        </div>
        <button class="sr-edit" data-id="${r.id}" title="編集">✏️</button>
        <button class="sr-delete" data-id="${r.id}" title="削除">🗑</button>
      </div>`;
    }).join('');

    // チェックボックス: 表示/非表示
    list.querySelectorAll('.sr-check').forEach(cb=>{
      cb.addEventListener('change',()=>{
        const id=cb.dataset.id;
        if(cb.checked) showSavedRoute(id);
        else hideSavedRoute(id);
      });
    });
    // 色変更
    list.querySelectorAll('.sr-color').forEach(el=>{
      el.addEventListener('click',ev=>{
        ev.stopPropagation();
        showColorPicker(el,el.dataset.id);
      });
    });
    // 編集
    list.querySelectorAll('.sr-edit').forEach(btn=>{
      btn.addEventListener('click',()=>loadRouteForEdit(btn.dataset.id));
    });
    // ルート削除
    list.querySelectorAll('.sr-delete').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const id=btn.dataset.id;
        if(!confirm('このルートを削除しますか？')) return;
        hideSavedRoute(id);
        savedRoutes=savedRoutes.filter(r=>r.id!==id);
        renderSavedRoutesList();
        downloadRoutesJson();
      });
    });
  }

  // 色選択ポップアップ
  function showColorPicker(anchor,routeId){
    document.querySelectorAll('.color-picker-popup').forEach(p=>p.remove());
    const popup=document.createElement('div');
    popup.className='color-picker-popup';
    const rect=anchor.getBoundingClientRect();
    popup.style.left=(rect.left+20)+'px';popup.style.top=rect.top+'px';popup.style.position='fixed';
    ROUTE_COLORS.forEach(c=>{
      const sw=document.createElement('div');
      sw.className='color-picker-swatch';sw.style.background=c;
      const route=savedRoutes.find(r=>r.id===routeId);
      if(route&&route.color===c) sw.style.borderColor='var(--text)';
      sw.addEventListener('click',()=>{
        const r=savedRoutes.find(r=>r.id===routeId);
        if(r){
          r.color=c;
          if(displayedRoutes[routeId]){
            displayedRoutes[routeId].color=c;
            displayedRoutes[routeId].polyline.setOptions({strokeColor:c});
            applyGeoStyles();
          }
          renderSavedRoutesList();
        }
        popup.remove();
      });
      popup.appendChild(sw);
    });
    document.body.appendChild(popup);
    setTimeout(()=>{document.addEventListener('click',function rem(){popup.remove();document.removeEventListener('click',rem);},{once:true});},10);
  }

  // ルート表示
  function showSavedRoute(id){
    const r=savedRoutes.find(r=>r.id===id);
    if(!r||displayedRoutes[id]) return;
    const path=r.geometry.map(c=>({lat:c[1],lng:c[0]}));
    const polyline=new google.maps.Polyline({path,strokeColor:r.color,strokeWeight:4,strokeOpacity:0.8,zIndex:8,map});
    const passedCodes=new Set(r.passedCities||[]);
    displayedRoutes[id]={polyline,passedCodes,color:r.color,markers:[]};
    applyGeoStyles();
  }

  function hideSavedRoute(id){
    const d=displayedRoutes[id];
    if(!d) return;
    d.polyline.setMap(null);
    d.markers.forEach(m=>m.setMap(null));
    delete displayedRoutes[id];
    applyGeoStyles();
  }

  // 全表示/全非表示
  $('sr-show-all').addEventListener('click',()=>{
    savedRoutes.forEach(r=>showSavedRoute(r.id));
    renderSavedRoutesList();
  });
  $('sr-hide-all').addEventListener('click',()=>{
    savedRoutes.forEach(r=>hideSavedRoute(r.id));
    renderSavedRoutesList();
  });

  // ファイル読み込み
  $('sr-import-btn').addEventListener('click',()=>{
    const input=document.createElement('input');
    input.type='file';input.accept='.json';
    input.addEventListener('change',async()=>{
      const file=input.files[0];if(!file) return;
      try{
        const text=await file.text();
        const data=JSON.parse(text);
        if(Array.isArray(data)){savedRoutes=data;renderSavedRoutesList();}
        else alert('無効なファイル形式です');
      }catch(e){alert('ファイル読み込みに失敗しました');}
    });
    input.click();
  });

  // 初期読み込み
  loadSavedRoutes();

  // Sidebar toggle
  const sidebar=$('sidebar');
  const legendEl=document.querySelector('.legend');
  function updateToggleBtn(){
    $('sidebar-toggle').textContent=sidebar.classList.contains('collapsed')?'▶':'◀';
  }
  function updateLegendPosition(){
    if(window.innerWidth<=768) return;
    legendEl.style.left=sidebar.classList.contains('collapsed')?'16px':'336px';
  }
  $('sidebar-toggle').addEventListener('click',()=>{
    sidebar.classList.toggle('collapsed');
    updateToggleBtn();
    setTimeout(()=>{google.maps.event.trigger(map,'resize');updateLegendPosition();},350);
  });
  // オーバーレイタップでサイドバーを閉じる（スマホ）
  $('sidebar-overlay').addEventListener('click',()=>{
    sidebar.classList.add('collapsed');
    updateToggleBtn();
    setTimeout(()=>google.maps.event.trigger(map,'resize'),350);
  });
  if(window.innerWidth<=768){sidebar.classList.add('collapsed');updateToggleBtn();}
  updateLegendPosition();

  $('loading').classList.add('hidden');
  setTimeout(()=>$('loading').remove(),500);
})();
</script>
</body>
</html>
