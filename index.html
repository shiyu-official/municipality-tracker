  // Google Places / Geocoder
  const placesService=new google.maps.places.PlacesService(map);
  const geocoderService=new google.maps.Geocoder();

  async function placesSearch(q){
    if(!q.trim()) return [];
    const normalized=q.replace(/\u3000/g,' ').trim();
    const center=map.getCenter();
    return new Promise(resolve=>{
      placesService.textSearch({
        query:normalized,
        location:center,
        language:'ja'
      },(results,status)=>{
        if(status===google.maps.places.PlacesServiceStatus.OK&&results){
          resolve(results.slice(0,8).map(r=>({
            name:r.name,
            address:r.formatted_address,
            lat:r.geometry.location.lat(),
            lon:r.geometry.location.lng(),
            place_id:r.place_id
          })));
        } else resolve([]);
      });
    });
  }

  async function reverseGeocode(lat,lon){
    return new Promise(resolve=>{
      geocoderService.geocode({location:{lat,lng:lon}},(results,status)=>{
        if(status==='OK'&&results&&results.length){
          resolve({display_name:results[0].formatted_address,lat:results[0].geometry.location.lat(),lon:results[0].geometry.location.lng()});
        } else resolve(null);
      });
    });
  }

  // 座標文字列の検出
  function parseCoordString(str){
    const s=str.trim();
    const m=s.match(/^(-?\d+\.?\d*)\s*[,、]\s*(-?\d+\.?\d*)$/);
    if(!m) return null;
    const a=parseFloat(m[1]),b=parseFloat(m[2]);
    if(a>=20&&a<=46&&b>=122&&b<=154) return {lat:a,lng:b};
    if(b>=20&&b<=46&&a>=122&&a<=154) return {lat:b,lng:a};
    return null;
  }

  // 場所名検索→ピン
  const searchInput=$('search-input');
  const searchResults=$('search-results');
  async function doSearch(){
    const q=searchInput.value.trim();
    if(!q){searchResults.style.display='none';return;}

    // 座標入力の検出
    const coord=parseCoordString(q);
    if(coord){
      if(searchMarker) searchMarker.setMap(null);
      searchMarker=new google.maps.Marker({position:{lat:coord.lat,lng:coord.lng},map:map});
      map.setCenter({lat:coord.lat,lng:coord.lng});map.setZoom(15);
      const rev=await reverseGeocode(coord.lat,coord.lng);
      const name=rev&&rev.display_name?rev.display_name.split(',')[0]:`${coord.lat.toFixed(5)}, ${coord.lng.toFixed(5)}`;
      const iw=new google.maps.InfoWindow({content:name});
      iw.open(map,searchMarker);
      iw.addListener('closeclick',()=>{if(searchMarker){searchMarker.setMap(null);searchMarker=null;}});
      searchResults.style.display='none';
      return;
    }

    searchResults.style.display='block';
    searchResults.innerHTML='<div class="search-result-item"><span style="color:var(--text-dim)">検索中...</span></div>';
    const results=await placesSearch(q);
    if(!results.length){
      searchResults.innerHTML='<div class="search-result-item"><span style="color:var(--text-dim)">見つかりませんでした</span></div>';
      return;
    }
    searchResults.innerHTML=results.map((r,i)=>`
      <div class="search-result-item" data-i="${i}" data-lat="${r.lat}" data-lon="${r.lon}">
        <div class="sri-name">${r.name}</div>
        <div class="sri-addr">${(r.address||'').split(',').slice(0,2).join(',')}</div>
      </div>`).join('');
    searchResults.querySelectorAll('.search-result-item[data-lat]').forEach(el=>{
      el.addEventListener('click',()=>{
        const lat=parseFloat(el.dataset.lat),lon=parseFloat(el.dataset.lon);
        if(searchMarker) searchMarker.setMap(null);
        searchMarker=new google.maps.Marker({position:{lat,lng:lon},map:map});
        const iw=new google.maps.InfoWindow({content:el.querySelector('.sri-name').textContent});
        iw.open(map,searchMarker);
        iw.addListener('closeclick',()=>{if(searchMarker){searchMarker.setMap(null);searchMarker=null;}});
        map.setCenter({lat,lng:lon});map.setZoom(14);
        searchResults.style.display='none';
      });
    });
  }
  $('search-btn').addEventListener('click',doSearch);
  searchInput.addEventListener('keydown',e=>{if(e.key==='Enter') doSearch();});
  document.addEventListener('click',e=>{if(!e.target.closest('#search-panel')) searchResults.style.display='none';});

  function getLocation(cb){
    if(!navigator.geolocation){alert('このブラウザは現在地取得に対応していません');return;}
    navigator.geolocation.getCurrentPosition(pos=>cb(pos.coords.latitude,pos.coords.longitude),()=>alert('現在地を取得できませんでした'));

  // ── フォーカス管理: 入力欄フォーカスで地図クリック対象を切り替え ──
  function setActiveInput(target){
    activeRouteInput=target;
    mapPickMode=true;

  // ルート入力のオートコンプリート
  function setupRouteSuggest(inputId,suggestId,coordSetter){
    const input=$('route-panel').querySelector('#'+inputId);
    const suggest=$('route-panel').querySelector('#'+suggestId);
    let timer=null;
    input.addEventListener('input',()=>{
      clearTimeout(timer);
      coordSetter(null); // テキスト変更で座標リセット
      // テキスト変更で市区町村フラグもリセット
      if(inputId==='route-from') routeFromCity={isCityWaypoint:false,cityCode:null,name:''};
      if(inputId==='route-to') routeToCity={isCityWaypoint:false,cityCode:null,name:''};
      const q=input.value.trim();
      if(!q){suggest.style.display='none';return;}
      // 座標入力検出
      const coord=parseCoordString(q);
      if(coord){
        coordSetter([coord.lat,coord.lng]);
        suggest.style.display='none';
        updateRoutePreview();
        return;
      }
      timer=setTimeout(async()=>{
        suggest.innerHTML='<div class="route-suggest-item"><div class="rsi-sub">検索中...</div></div>';
        suggest.style.display='block';
        const results=await placesSearch(q);
        if(!results.length){suggest.innerHTML='<div class="route-suggest-item"><div class="rsi-sub">見つかりませんでした</div></div>';return;}
        suggest.innerHTML=results.map((r,i)=>`
          <div class="route-suggest-item" data-lat="${r.lat}" data-lon="${r.lon}" data-i="${i}">
            <div class="rsi-main">${r.name}</div>
            <div class="rsi-sub">${(r.address||'').split(',').slice(0,2).join(',')}</div>
          </div>`).join('');
        suggest.querySelectorAll('.route-suggest-item').forEach(el=>{
          el.addEventListener('click',()=>{
            input.value=el.querySelector('.rsi-main').textContent;
            coordSetter([parseFloat(el.dataset.lat),parseFloat(el.dataset.lon)]);
            suggest.style.display='none';
            if(inputId==='route-from') routeFromCity={isCityWaypoint:false,cityCode:null,name:''};
            if(inputId==='route-to') routeToCity={isCityWaypoint:false,cityCode:null,name:''};
            updateRoutePreview();
          });
        });
      },800);
    });
    document.addEventListener('click',e=>{if(!e.target.closest('#'+suggestId)&&!e.target.closest('#'+inputId)) suggest.style.display='none';});
  }
  setupRouteSuggest('route-from','route-from-suggest',c=>routeFromCoord=c);

  // 都市の入口ポイントを取得
  // fromPt, toPt: ルート上の前後のポイント[lat,lng] — 方向を計算するため
  // 境界から中心に向かって100m入った地点付近のスポットを返す
  async function findCityEntryPoint(code,name,fromPt,toPt){
    const boundary=getCityBoundaryRings(code);
    const centroid=getCityCentroid(code);
    if(!boundary.length||!centroid){
      const results=await placesSearch(name);
      if(results.length) return [parseFloat(results[0].lat),parseFloat(results[0].lon)];
      return null;
    }

    // fromPt→toPtの直線がポリゴン境界と交差する点を求める
    let entryPt=null;
    if(fromPt&&toPt){
      entryPt=findLinePolygonEntry(fromPt,toPt,boundary);
    }
    if(!entryPt&&fromPt){
      // fromPt→centroidの線で境界交差を求める
      entryPt=findLinePolygonEntry(fromPt,centroid,boundary);
    }
    if(!entryPt){
      // fallback: ポリゴンの境界上で重心に最も近い点
      entryPt=findClosestBoundaryPoint(centroid,boundary);
    }
    if(!entryPt) return centroid;

    // entryPtから中心方向に100m移動
    const pt100=moveToward(entryPt,centroid,100);

    // reverseGeocodeで付近のスポットを取得
    const rev=await reverseGeocode(pt100[0],pt100[1]);
    if(rev&&rev.lat&&rev.lon) return [parseFloat(rev.lat),parseFloat(rev.lon)];
    return pt100;
  }

  // geoDataのfeaturesからコード別に高速参照するインデックス
  // geometryが欠損/空のfeatureは最適化や境界検査で使えないため除外
  const _geoFeaturesByCode={};
  let _skippedGeomCount=0;
  for(const f of geoData.features){
    const code=f.properties.N03_007;
    if(!code) continue;
    if(!f.geometry||!f.geometry.coordinates){_skippedGeomCount++;continue;}
    if(!_geoFeaturesByCode[code]) _geoFeaturesByCode[code]=[];
    _geoFeaturesByCode[code].push(f);
  }
  if(_skippedGeomCount>0) console.warn(`[init] skipped ${_skippedGeomCount} features with null geometry`);

  function getCityBoundaryRings(code){
    const rings=[];
    const features=_geoFeaturesByCode[code]||[];
    for(const f of features){
      const geom=f&&f.geometry;
      if(!geom||!geom.coordinates) continue;
      if(geom.type==='Polygon'){
        rings.push(geom.coordinates[0].map(c=>[c[1],c[0]]));
      } else if(geom.type==='MultiPolygon'){
        for(const poly of geom.coordinates) rings.push(poly[0].map(c=>[c[1],c[0]]));
      }
    }
    return rings;
  }

  function getCityCentroid(code){
    let sumLat=0,sumLng=0,count=0;
    const features=_geoFeaturesByCode[code]||[];
    for(const f of features){
      // geometry が null/undefined、coordinates が null の feature はスキップ
      // （topojson→geojson変換でごく稀に発生）
      if(!f||!f.geometry||!f.geometry.coordinates) continue;
      const flat=flattenCoords(f.geometry.coordinates);
      for(const c of flat){sumLng+=c[0];sumLat+=c[1];count++;}
    }
    if(count===0) return null;
    return [sumLat/count,sumLng/count];
  }

  function flattenCoords(coords){
    const result=[];
    function recurse(arr){
      if(typeof arr[0]==='number'){result.push(arr);return;}
      for(const a of arr) recurse(a);
    }
    recurse(coords);
    return result;
  }

  // fromPt→toPtの線分がrings(境界)と交差する最初の点を返す
  function findLinePolygonEntry(fromPt,toPt,rings){
    let best=null,bestDist=Infinity;
    const ax=fromPt[0],ay=fromPt[1],bx=toPt[0],by=toPt[1];
    for(const ring of rings){
      for(let i=0;i<ring.length-1;i++){
        const cx=ring[i][0],cy=ring[i][1],dx=ring[i+1][0],dy=ring[i+1][1];
        const pt=segmentIntersection(ax,ay,bx,by,cx,cy,dx,dy);
        if(pt){
          const d=(pt[0]-ax)**2+(pt[1]-ay)**2;
          if(d<bestDist){bestDist=d;best=pt;}
        }
      }
    }
    return best;
  }

  // 2つの線分の交点（存在すれば[lat,lng]、なければnull）
  function segmentIntersection(ax,ay,bx,by,cx,cy,dx,dy){
    const denom=(bx-ax)*(dy-cy)-(by-ay)*(dx-cx);
    if(Math.abs(denom)<1e-12) return null;
    const t=((cx-ax)*(dy-cy)-(cy-ay)*(dx-cx))/denom;
    const u=((cx-ax)*(by-ay)-(cy-ay)*(bx-ax))/denom;
    if(t>=0&&t<=1&&u>=0&&u<=1) return [ax+t*(bx-ax),ay+t*(by-ay)];
    return null;
  }

  function findClosestBoundaryPoint(center,rings){
    let best=null,bestDist=Infinity;
    for(const ring of rings){
      for(const pt of ring){
        const d=(pt[0]-center[0])**2+(pt[1]-center[1])**2;
        if(d<bestDist){bestDist=d;best=pt;}
      }
    }
    return best;
  }

  // fromからtoの方向にdistMeters移動した地点を返す
  function moveToward(from,to,distMeters){
    const R=6371000;
    const dLat=(to[0]-from[0])*Math.PI/180;
    const dLng=(to[1]-from[1])*Math.PI/180;
    const totalDist=Math.sqrt(dLat*dLat+dLng*dLng*Math.cos(from[0]*Math.PI/180)**2)*R;
    if(totalDist<1) return from;
    const ratio=Math.min(distMeters/totalDist,0.5);
    return [from[0]+ratio*(to[0]-from[0]),from[1]+ratio*(to[1]-from[1])];
  }

  // ── 地図クリックでの地点追加 ──
  function findMunicipalityAtLatLng(latLng){
    // Google MapsのLatLngから{lat,lng}に変換して検索
    return findMunicipalityAtPoint({lat:latLng.lat(),lng:latLng.lng()});
  }
  function findMunicipalityAtPoint(latlng){
    // latlng: {lat,lng}
    for(const[code,features] of Object.entries(_geoFeaturesByCode)){
      for(const f of features){
        if(isPointInFeature(latlng,f)) return f;
      }
    }
    return null;
  }
  function isPointInFeature(latlng,feature){
    if(!feature||!feature.geometry||!feature.geometry.type) return false;
    const t=feature.geometry.type,c=feature.geometry.coordinates;
    if(t==='Polygon') return isPointInPolygon(latlng,c);
    if(t==='MultiPolygon'){for(const p of c){if(isPointInPolygon(latlng,p)) return true;}}
    return false;
  }
  function isPointInPolygon(latlng,polyCoords){
    const ring=polyCoords[0];if(!ring) return false;
    const x=latlng.lng,y=latlng.lat;let inside=false;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1];
      if((yi>y)!==(yj>y)&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  function handleMapPick(latlng,feature,clientX,clientY){

        <div class="mcm-detail">

          <div class="mcm-sub">${prefName}・${isVisited?'訪問済み':'未訪問'}</div>
        </div>
      </div>`;
    }
    modal.innerHTML=html;

    // clientX/Y（domEvent座標）を使ってモーダルを配置。取得できない場合は画面中央
    const cx=clientX!=null?clientX:window.innerWidth/2;
    const cy=clientY!=null?clientY:window.innerHeight/2;
    const modalW=284,modalH=code?180:130;
    let left=cx+12,top=cy-20;
    if(left+modalW>window.innerWidth) left=cx-modalW-12;
    if(top+modalH>window.innerHeight) top=window.innerHeight-modalH-10;

    overlay.addEventListener('click',closeModal);

      const name=rev&&rev.display_name?rev.display_name.split(',')[0]:`${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;

  let routeFromCity={isCityWaypoint:false,cityCode:null,name:''};
  let routeToCity={isCityWaypoint:false,cityCode:null,name:''};

  function applyPickResult(coord,name,target,isCityWaypoint,cityCode){
    if(target==='from'){
      routeFromCoord=coord;$('route-from').value=name;
      routeFromCity={isCityWaypoint,cityCode,name:name.replace('（市区町村経由）','')};
    } else if(target==='to'){
      routeToCoord=coord;$('route-to').value=name;
      routeToCity={isCityWaypoint,cityCode,name:name.replace('（市区町村経由）','')};
    } else if(target&&target.startsWith('wp-')){
      const idx=parseInt(target.substring(3));
      if(routeWaypoints[idx]){
        routeWaypoints[idx].coord=coord;
        routeWaypoints[idx].name=name.replace('（市区町村経由）','');
        routeWaypoints[idx].isCityWaypoint=isCityWaypoint;
        routeWaypoints[idx].cityCode=cityCode;
        renderWaypoints();
      }
    }
    updateRoutePreview();
  }

  // ── ルート検索 (Google Directions Service) ──
  const directionsService=new google.maps.DirectionsService();

  async function fetchRoute(points,opts={}){
    if(points.length<2) return null;
    const origin={lat:points[0][0],lng:points[0][1]};
    const dest={lat:points[points.length-1][0],lng:points[points.length-1][1]};
    const waypoints=points.slice(1,points.length-1).map(p=>({location:{lat:p[0],lng:p[1]},stopover:true}));
    const travelMode=currentRouteMode==='walking'?google.maps.TravelMode.WALKING:google.maps.TravelMode.DRIVING;
    const provideAlts=!opts.noAlternatives&&waypoints.length===0; // 経由地ありだとalternatives不可

    return new Promise(resolve=>{
      directionsService.route({
        origin,destination:dest,waypoints,
        travelMode,provideRouteAlternatives:provideAlts,
        region:'jp'
      },(result,status)=>{
        if(status!==google.maps.DirectionsStatus.OK||!result||!result.routes||!result.routes.length){
          console.error('Directions API error:',status,result);
          resolve(null);
          return;
        }

        // Directions結果を内部形式に変換
        function convertRoute(route){
          const leg=route.legs;
          let totalDist=0,totalDur=0;
          const coords=[];
          for(const l of leg){
            totalDist+=l.distance.value;
            totalDur+=l.duration.value;
          }
          // overview_pathが存在すればそれを使う（既にデコード済みLatLng配列）
          // なければoverview_polyline.pointsをデコード
          let path=route.overview_path;
          if(!path||!path.length){
            const encoded=route.overview_polyline;
            if(encoded&&typeof encoded==='string'){
              path=google.maps.geometry.encoding.decodePath(encoded);
            } else if(encoded&&encoded.points){
              path=google.maps.geometry.encoding.decodePath(encoded.points);
            } else {
              // フォールバック: legsのstepsから座標を抽出
              path=[];
              for(const l of leg){
                for(const step of l.steps){
                  if(step.path) path.push(...step.path);
                  else if(step.lat_lngs) path.push(...step.lat_lngs);
                }
              }
            }
          }
          for(const p of path) coords.push([p.lng(),p.lat()]);
          return{distance:totalDist,duration:totalDur,geometry:{coordinates:coords},_gRoute:route};
        }

        if(result.routes.length===1){resolve(convertRoute(result.routes[0]));return;}

        // 複数ルート: 最速＋市区町村通過考慮で選択
        const cityCodes=opts.cityCodes||[];
        let best=null,bestScore=Infinity;
        for(const route of result.routes){
          const conv=convertRoute(route);
          let score=conv.duration;
          if(cityCodes.length>0){
            let passCount=0;
            for(const code of cityCodes){
              if(checkRoutePassesCity(conv.geometry.coordinates,code)) passCount++;
            }
            score+=(cityCodes.length-passCount)*1800;
          }
          if(score<bestScore){bestScore=score;best=conv;}
        }
        resolve(best||convertRoute(result.routes[0]));
      });
    });
  }

  function checkRoutePassesCity(routeCoords,cityCode){
    const rings=getCityBoundaryRings(cityCode);
    if(!rings.length) return false;
    for(let i=0;i<routeCoords.length;i+=2){
      const lat=routeCoords[i][1],lng=routeCoords[i][0];
      for(const ring of rings){
        if(isPointInRing({lat,lng},ring)) return true;
      }
    }
    return false;
  }

  // ── D-1: 未訪問市区町村を最大通過するルート最適化 ──
  // 設定
  const OPTIMIZE_DEFAULTS={
    maxDetourMin:30,    // デフォルト許容時間(分)
    targetMaxLevel:0    // デフォルト対象レベル: 0=未訪問のみ
  };
  const OPTIMIZE_CONFIG={
    maxCandidates:8,           // 事前スクリーニング後の候補数上限（API予算とのバランス）
    searchRadiusRatio:0.7,     // 直行距離のこの割合を検索半径に
    apiCallBudget:10           // Directions API総呼び出し上限（セーフティ）
  };
  const LS_KEY_DETOUR='tohaMap.optimizeDetourMin';
  const LS_KEY_TARGET='tohaMap.optimizeTargetLevel';

  // 許容時間(秒)を取得: 入力欄の値を優先、無効ならlocalStorage、なければデフォルト
  function getDetourSec(){
    const inputEl=$('route-optimize-detour');
    let min=null;
    if(inputEl){
      const v=parseFloat(inputEl.value);
      if(!isNaN(v)&&v>0) min=v;
    }
    if(min===null){
      const saved=parseFloat(localStorage.getItem(LS_KEY_DETOUR));
      if(!isNaN(saved)&&saved>0) min=saved;
    }
    if(min===null) min=OPTIMIZE_DEFAULTS.maxDetourMin;
    return min*60;
  }

  // 候補対象の最大レベルを取得: 0=未訪問のみ, 1=未訪問+1回, 2=未訪問+1〜2回
  // (visitDays<=このレベル を候補とする)
  function getTargetMaxLevel(){
    const sel=$('route-optimize-target');
    let lv=null;
    if(sel){
      const v=parseInt(sel.value,10);
      if(!isNaN(v)&&v>=0&&v<=2) lv=v;
    }
    if(lv===null){
      const saved=parseInt(localStorage.getItem(LS_KEY_TARGET),10);
      if(!isNaN(saved)&&saved>=0&&saved<=2) lv=saved;
    }
    if(lv===null) lv=OPTIMIZE_DEFAULTS.targetMaxLevel;
    return lv;
  }

  // レベルから日本語ラベル
  function getTargetLabel(maxLv){
    return ['未訪問','2回未満','3回未満'][maxLv]||'未訪問';
  }

  // D-1 許容時間入力: localStorageから復元、変更時に保存
  (function initDetourInput(){
    const inp=$('route-optimize-detour');
    if(!inp) return;
    const saved=parseFloat(localStorage.getItem(LS_KEY_DETOUR));
    if(!isNaN(saved)&&saved>0) inp.value=saved;
    inp.addEventListener('change',()=>{
      const v=parseFloat(inp.value);
      if(!isNaN(v)&&v>0){
        localStorage.setItem(LS_KEY_DETOUR,String(v));
      } else {
        // 不正値はデフォルトに戻す
        inp.value=OPTIMIZE_DEFAULTS.maxDetourMin;
        localStorage.removeItem(LS_KEY_DETOUR);
      }
    });
  })();

  // D-1 対象レベル選択: localStorageから復元、変更時に保存+ボタンラベル更新
  (function initTargetSelect(){
    const sel=$('route-optimize-target');
    if(!sel) return;
    const saved=parseInt(localStorage.getItem(LS_KEY_TARGET),10);
    if(!isNaN(saved)&&saved>=0&&saved<=2) sel.value=String(saved);
    sel.addEventListener('change',()=>{
      const v=parseInt(sel.value,10);
      if(!isNaN(v)&&v>=0&&v<=2){
        localStorage.setItem(LS_KEY_TARGET,String(v));
      }
      updateOptimizeBtnLabel();
    });
    // 初期ラベル設定
    updateOptimizeBtnLabel();
  })();

  // 全市区町村の重心キャッシュ（初回の計算コスト削減）
  const _centroidCache={};
  function getCentroidCached(code){
    if(code in _centroidCache) return _centroidCache[code];
    const c=getCityCentroid(code);
    _centroidCache[code]=c;
    return c;
  }

  // 2点間の地球上の距離（メートル）
  function distMeters(a,b){
    return google.maps.geometry.spherical.computeDistanceBetween(
      new google.maps.LatLng(a[0],a[1]),
      new google.maps.LatLng(b[0],b[1])
    );
  }

  // 2点の中点
  function midpoint(a,b){
    return [(a[0]+b[0])/2,(a[1]+b[1])/2];
  }

  // ルート上の通過市区町村コードを列挙（幾何判定のみ、API不要）
  function getPassedCityCodes(routeCoords){
    const passed=new Set();
    for(let i=0;i<routeCoords.length;i+=3){
      const lat=routeCoords[i][1],lng=routeCoords[i][0];
      const feat=findMunicipalityAtPoint({lat,lng});
      if(feat){
        const code=feat.properties?.N03_007||feat.getProperty?.('N03_007');
        if(code) passed.add(code);
      }
    }
    return passed;
  }

  // D-1 本体: 現在の出発地・経由地・目的地から、未訪問を最大通過するよう経由地を追加
  async function optimizeRouteForUnvisited(){
    const btn=$('route-optimize-btn');
    const statusEl=$('route-optimize-status');
    const setStatus=(txt,cls='active')=>{
      statusEl.className=cls;
      statusEl.textContent=txt;
    };

    // 0. 入力チェック
    if(!routeFromCoord||!routeToCoord){
      setStatus('出発地と目的地を設定してください','ro-err');
      return;
    }

    btn.disabled=true;
    let apiCalls=0;
    const maxApi=OPTIMIZE_CONFIG.apiCallBudget;

    try{
      setStatus('ベースルートを計算中...');
      // 1. 現在の経由地構成でベースルートを取得
      const currentWpCoords=routeWaypoints
        .filter(wp=>wp.coord)
        .map(wp=>wp.coord);
      const basePoints=[routeFromCoord,...currentWpCoords,routeToCoord];
      const baseRoute=await fetchRoute(basePoints,{noAlternatives:true});
      apiCalls++;
      if(!baseRoute){
        setStatus('ベースルートの取得に失敗しました','ro-err');
        btn.disabled=false;
        return;
      }
      const baseDuration=baseRoute.duration;
      const alreadyPassed=getPassedCityCodes(baseRoute.geometry.coordinates);

      // 2. 候補の絞り込み（対象レベル かつ 経路中点から一定範囲内）
      const targetMaxLv=getTargetMaxLevel();
      const targetLabel=getTargetLabel(targetMaxLv);
      const directDist=distMeters(routeFromCoord,routeToCoord);
      const mid=midpoint(routeFromCoord,routeToCoord);
      const searchRadius=Math.max(directDist*OPTIMIZE_CONFIG.searchRadiusRatio,20000); // 最低20km
      // 既に経由地/出発地/目的地になっている市区町村は除外
      const excluded=new Set();
      for(const wp of routeWaypoints){
        if(wp.cityCode) excluded.add(wp.cityCode);
        if(wp.coord){
          const feat=findMunicipalityAtPoint({lat:wp.coord[0],lng:wp.coord[1]});
          const code=feat?.properties?.N03_007||feat?.getProperty?.('N03_007');
          if(code) excluded.add(code);
        }
      }

      setStatus(`${targetLabel}候補を検索中...`);
      // 候補レベルの市区町村を距離付きでスコアリング
      // targetMaxLv=0: 未訪問のみ (visitDays===0)
      // targetMaxLv=1: 1回以下 (visitDays<=1)
      // targetMaxLv=2: 2回以下 (visitDays<=2)
      const candidates=[];
      for(const code of allCodes){
        const visitDays=visitedData.cities[code]?.visitDays||0;
        if(visitDays>targetMaxLv) continue; // 対象レベル外
        if(excluded.has(code)) continue;
        if(alreadyPassed.has(code)) continue; // すでに通ってる対象は追加不要
        const centroid=getCentroidCached(code);
        if(!centroid) continue;
        const distFromMid=distMeters(mid,centroid);
        if(distFromMid>searchRadius) continue;
        candidates.push({code,centroid,distFromMid,visitDays});
      }
      // 中点から近い順
      candidates.sort((a,b)=>a.distFromMid-b.distFromMid);
      const shortlist=candidates.slice(0,OPTIMIZE_CONFIG.maxCandidates);

      if(shortlist.length===0){
        setStatus(alreadyPassed.size>0
          ?`既にルート上で ${alreadyPassed.size} 市区町村を通過しており、追加候補なし`
          :`追加できる${targetLabel}市区町村が範囲内にありません`,
          'ro-result');
        btn.disabled=false;
        return;
      }

      // 3. 貪欲法で経由地を追加していく
      // 採用経由地リスト（元のrouteWaypointsはこの段階では変更しない）
      const appended=[]; // [{code,name,coord}]
      let currentWp=[...currentWpCoords]; // 現在の経由座標列

      const detourSec=getDetourSec(); // この呼び出し時点の許容時間(秒)
      // API予算をシビアに守るため、1イテレーションあたり最大 EVAL_BATCH 件のみ評価して
      // その中の最良を採用する（API消費が予測可能になる）
      const EVAL_BATCH=5;
      let remaining=[...shortlist];

      while(remaining.length>0){
        // 残りAPI予算が足りない（最低1回評価分も無い）なら終了
        if(apiCalls>=maxApi) break;
        const remainingBudget=maxApi-apiCalls;
        if(remainingBudget<1) break;

        const evalCount=Math.min(EVAL_BATCH,remaining.length,remainingBudget);
        setStatus(`候補を評価中... ${appended.length+1}件目（API ${apiCalls}/${maxApi}）`);

        // 中点距離順で先頭evalCount件を評価
        const slice=remaining.slice(0,evalCount).map(cand=>({
          cand,
          pts:[routeFromCoord,...currentWp,cand.centroid,routeToCoord]
        }));
        const results=await Promise.all(slice.map(async item=>{
          apiCalls++;
          const r=await fetchRoute(item.pts,{noAlternatives:true});
          return {cand:item.cand,route:r};
        }));

        // この評価バッチ内で許容時間内かつ最良の候補を選ぶ
        let best=null; // {cand, extraTime}
        for(const res of results){
          if(!res.route) continue;
          const extraTime=res.route.duration-baseDuration;
          if(extraTime>detourSec) continue;
          if(!best||extraTime<best.extraTime){
            best={cand:res.cand,extraTime};
          }
        }

        if(!best){
          // この5件中に許容範囲の候補なし → これ以上探しても見つかりにくい
          // (中点距離順なので、以降の候補はより遠い傾向)
          break;
        }

        // 採用: 名前を特定して追加
        const fp=featureProps[best.cand.code]||{};
        const cityName=buildFullName(best.cand.code,fp.gun,fp.city,fp.ward)||best.cand.code;
        appended.push({
          code:best.cand.code,
          name:`${fp.pref||''}${cityName}`,
          coord:best.cand.centroid,
          extraTime:best.extraTime,
          visitDays:best.cand.visitDays
        });
        currentWp=[...currentWp,best.cand.centroid];
        // 採用済みを除外
        remaining=remaining.filter(c=>c.code!==best.cand.code);
      }

      // 4. 結果を routeWaypoints に反映（既存の末尾に追加）
      if(appended.length===0){
        setStatus(`候補 ${shortlist.length} 件を検討しましたが、許容時間（${Math.round(detourSec/60)}分）内で通過できる${targetLabel}市区町村はありませんでした`,'ro-result');
        btn.disabled=false;
        return;
      }

      for(const a of appended){
        routeWaypoints.push({
          coord:a.coord,
          name:a.name,
          isCityWaypoint:true,
          cityCode:a.code
        });
      }
      renderWaypoints();
      updateRouteInputsScroll();

      const totalExtra=Math.round(appended[appended.length-1].extraTime/60);
      setStatus(`✓ ${targetLabel} ${appended.length} 市区町村を追加（合計 +${totalExtra}分）。「ルートを検索」で再計算してください`,'ro-result');

    }catch(e){
      console.error('[optimize] error:',e);
      setStatus('最適化中にエラーが発生しました','ro-err');
    }finally{
      btn.disabled=false;
    }
  }

  function isPointInRing(latlng,ring){
    const x=latlng.lng,y=latlng.lat;
    let inside=false;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const yi=ring[i][0],xi=ring[i][1];
      const yj=ring[j][0],xj=ring[j][1];
      if((yi>y)!==(yj>y)&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  // ── 市区町村経由ポイントの決定 ──
  //
  // 【方針】Places API で「市区町村名 役場」「道の駅」等を検索し、
  //         道路上の実在スポット座標を経由地に使う。
  //         スポットが見つからない場合は重心（centroid）にフォールバック。
  //
  // getCityRoadPoint(cityName, cityCode, centroid):
  //   cityName  = 表示用の市区町村名（例：「鶴居村」）
  //   cityCode  = 市区町村コード
  //   centroid  = [lat,lng] フォールバック用重心
  //   戻り値    = Promise<[lat,lng]>
  //
  // 検索クエリ優先順: 役場 > 道の駅 > 駅 > 重心フォールバック
  // 取得した座標が市区町村境界内に収まっているかを確認してから採用する。
  async function getCityRoadPoint(cityName,cityCode,centroid){
    const rings=getCityBoundaryRings(cityCode);

    function isInside(lat,lng){
      if(!rings.length) return true; // 境界データなければ制限しない
      const pt={lat,lng};
      for(const ring of rings){ if(isPointInRing(pt,ring)) return true; }
      return false;
    }

    // Places textSearch で候補を1件取得
    async function searchPlace(query){
      return new Promise(resolve=>{
        placesService.textSearch({
          query,
          location:new google.maps.LatLng(centroid[0],centroid[1]),
          radius:50000,
          language:'ja'
        },(results,status)=>{
          if(status===google.maps.places.PlacesServiceStatus.OK&&results&&results.length){
            const r=results[0];
            const lat=r.geometry.location.lat();
            const lng=r.geometry.location.lng();
            resolve({lat,lng,name:r.name});
          } else resolve(null);
        });
      });
    }

    // 優先順に検索
    const queries=[
      `${cityName} 役場`,
      `${cityName} 道の駅`,
      `${cityName} 駅`,
    ];
    for(const q of queries){
      const r=await searchPlace(q);
      if(r&&isInside(r.lat,r.lng)){
        return [r.lat,r.lng];
      }
    }

    // フォールバック: 重心
    return centroid;
  }

  $('route-go-btn').addEventListener('click',async()=>{
    const fromVal=$('route-from').value.trim();
    const toVal=$('route-to').value.trim();
    if(!routeFromCoord&&fromVal){
      const c=parseCoordString(fromVal);
      if(c) routeFromCoord=[c.lat,c.lng];
      else{const r=await placesSearch(fromVal);if(r.length) routeFromCoord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
    }
    if(!routeToCoord&&toVal){
      const c=parseCoordString(toVal);
      if(c) routeToCoord=[c.lat,c.lng];
      else{const r=await placesSearch(toVal);if(r.length) routeToCoord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
    }
    for(const wp of routeWaypoints){
      if(!wp.coord&&wp.name){
        const c=parseCoordString(wp.name);
        if(c) wp.coord=[c.lat,c.lng];
        else{const r=await placesSearch(wp.name);if(r.length) wp.coord=[parseFloat(r[0].lat),parseFloat(r[0].lon)];}
      }
    }
    if(!routeFromCoord||!routeToCoord){alert('出発地と目的地を入力してください');return;}

    $('route-result').style.display='block';
    $('route-result').textContent='ルートを計算中...';

    // 全経由地を元の順番で構築
    const orderedWp=routeWaypoints.filter(wp=>wp.coord||wp.isCityWaypoint);
    const cityCheckResults=[];
    const wpMarkerData=[];

    // 通常経由地（ポイント指定）と市区町村経由地を分離
    const normalPoints=[];  // {coord, name, originalIdx}
    const cityWpList=[];    // {cityCode, name, originalIdx}
    for(let i=0;i<orderedWp.length;i++){
      const wp=orderedWp[i];
      if(!wp.isCityWaypoint&&wp.coord){
        normalPoints.push({coord:wp.coord,name:wp.name,originalIdx:i});
      } else if(wp.isCityWaypoint&&wp.cityCode){
        cityWpList.push({cityCode:wp.cityCode,name:wp.name,originalIdx:i});
      }
    }

    // 出発地・目的地の市区町村フラグ
    const fromIsCity=routeFromCity.isCityWaypoint&&routeFromCity.cityCode;
    const toIsCity=routeToCity.isCityWaypoint&&routeToCity.cityCode;

    // 市区町村経由の指定がない場合は1回のAPI呼び出しで完結
    const needsCityProcessing=cityWpList.length>0||fromIsCity||toIsCity;

    if(!needsCityProcessing){
      // ── シンプルケース: 通常経由地のみ、API1回 ──
      const pts=[routeFromCoord,...normalPoints.map(p=>p.coord),routeToCoord];
      let route;
      try{route=await fetchRoute(pts,{noAlternatives:pts.length>2});}
      catch(e){$('route-result').textContent='ルート取得に失敗しました';return;}
      if(!route){$('route-result').textContent='ルートが見つかりませんでした';return;}
      const wmd=normalPoints.map(p=>({coord:p.coord,name:p.name,cityCode:null}));
      renderFinalRoute(route,wmd,[]);
      return;
    }

    // ── 市区町村経由あり: 2回API方式 ──
    // 【理由】侵入ポイントが「道路上の点」でないとAPIが境界外にスナップして通過失敗する。
    //         1回目APIで実際の道路座標列を得てから侵入ポイントを確定する必要がある。

    // 【1回目API】通常経由地のみ → 実際の道路上の座標列を取得
    $('route-result').textContent='ルートを計算中 (1/2)...';
    const basePoints=[routeFromCoord,...normalPoints.map(p=>p.coord),routeToCoord];
    let baseRoute;
    try{baseRoute=await fetchRoute(basePoints,{noAlternatives:normalPoints.length>0});}
    catch(e){$('route-result').textContent='ルート取得に失敗しました';return;}
    if(!baseRoute){$('route-result').textContent='ルートが見つかりませんでした';return;}

    // 【経由ポイント決定】Places APIで道路上スポット座標を取得（役場・道の駅・駅の優先順）
    // ユーザー指定順（originalIdx）を厳守してソートする
    $('route-result').textContent='経由地を検索中...';
    const additionalWaypoints=[];
    for(const cwp of cityWpList){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,cwp.cityCode);
      if(passes){
        cityCheckResults.push({name:cwp.name,passes:true});
      } else {
        const centroid=getCityCentroid(cwp.cityCode)||[0,0];
        const coord=await getCityRoadPoint(cwp.name,cwp.cityCode,centroid);
        additionalWaypoints.push({coord,name:cwp.name,cityCode:cwp.cityCode,originalIdx:cwp.originalIdx});
        cityCheckResults.push({name:cwp.name,passes:false});
      }
    }

    // 出発地・目的地の市区町村処理
    if(fromIsCity){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,routeFromCity.cityCode);
      if(!passes){
        const centroid=getCityCentroid(routeFromCity.cityCode)||[0,0];
        routeFromCoord=await getCityRoadPoint(routeFromCity.name,routeFromCity.cityCode,centroid);
      }
      cityCheckResults.push({name:routeFromCity.name,passes});
    }
    if(toIsCity){
      const passes=checkRoutePassesCity(baseRoute.geometry.coordinates,routeToCity.cityCode);
      if(!passes){
        const centroid=getCityCentroid(routeToCity.cityCode)||[0,0];
        routeToCoord=await getCityRoadPoint(routeToCity.name,routeToCity.cityCode,centroid);
      }
      cityCheckResults.push({name:routeToCity.name,passes});
    }

    // 追加経由地がなければ（全市区町村がベースルートで通過済み）2回目不要
    if(additionalWaypoints.length===0&&!fromIsCity&&!toIsCity){
      const wmd=normalPoints.map(p=>({coord:p.coord,name:p.name,cityCode:null}));
      renderFinalRoute(baseRoute,wmd,cityCheckResults);
      return;
    }

    // 【2回目API】道路上スポット経由地を挿入して最終ルートを取得
    // ユーザー指定の originalIdx 順を厳守
    $('route-result').textContent='ルートを計算中 (2/2)...';
    const allWpEntries=[
      ...normalPoints.map(p=>({coord:p.coord,name:p.name,originalIdx:p.originalIdx,cityCode:null})),
      ...additionalWaypoints
    ];
    allWpEntries.sort((a,b)=>a.originalIdx-b.originalIdx);

    const finalPoints=[routeFromCoord,...allWpEntries.map(w=>w.coord),routeToCoord];
    const allCityCodes=additionalWaypoints.map(w=>w.cityCode);
    if(fromIsCity) allCityCodes.push(routeFromCity.cityCode);
    if(toIsCity) allCityCodes.push(routeToCity.cityCode);

    let finalRoute;
    try{finalRoute=await fetchRoute(finalPoints,{cityCodes:allCityCodes,noAlternatives:true});}
    catch(e){finalRoute=null;}
    if(!finalRoute) finalRoute=baseRoute; // フォールバック

    // 事後チェック: 2回目ルートで通過を再確認
    for(const cr of cityCheckResults){
      if(!cr.passes){
        const wd=additionalWaypoints.find(w=>w.name===cr.name);
        if(wd) cr.passes=checkRoutePassesCity(finalRoute.geometry.coordinates,wd.cityCode);
      }
    }

    const wmd=allWpEntries.map(w=>({coord:w.coord,name:w.name,cityCode:w.cityCode||null}));
    renderFinalRoute(finalRoute,wmd,cityCheckResults);
  });

  // ── ルート通過市区町村のハイライト ──
  function highlightRouteCities(routeCoords){
    // 既存のハイライトレイヤーをクリア
    if(_routeHighlightLayer){_routeHighlightLayer.setMap(null);_routeHighlightLayer=null;}
    window._routeHighlightCodes=new Set();

    const passedCodes=new Set();

    for(let i=0;i<routeCoords.length;i+=2){
      const lng=routeCoords[i][0],lat=routeCoords[i][1];
      const latlng={lat,lng};
      for(const[code,features] of Object.entries(_geoFeaturesByCode)){
        if(passedCodes.has(code)) continue;
        for(const f of features){
          if(!f||!f.geometry||!f.geometry.type) continue;
          try{
            if(isPointInFeature(latlng,f)){passedCodes.add(code);break;}
          }catch(e){}
        }
      }
    }

    if(passedCodes.size>0){
      window._routeHighlightCodes=passedCodes;
      // geoDataLayerのスタイル関数を再適用してハイライトを反映
      applyGeoStyles();
      window._routeHighlightCodes=passedCodes;
    }

    return passedCodes;
  }

  // ── 描画共通関数 ──
  function renderFinalRoute(route,wpMarkerData,cityCheckResults){
    const resolvedPoints=[routeFromCoord,...wpMarkerData.map(w=>w.coord),routeToCoord];
    const dist=(route.distance/1000).toFixed(1);
    const dur=Math.round(route.duration/60);
    const h=Math.floor(dur/60),m=dur%60;
    const durStr=h>0?`${h}時間${m}分`:`${m}分`;
    if(routeLayer){routeLayer.setMap(null);routeLayer=null;}
    if(window._wpMarkers){window._wpMarkers.forEach(mk=>mk.setMap(null));window._wpMarkers=[];}

    const routePath=route.geometry.coordinates.map(c=>({lat:c[1],lng:c[0]}));
    routeLayer=new google.maps.Polyline({path:routePath,strokeColor:'#b45309',strokeWeight:6,strokeOpacity:0.92,zIndex:10,map:map});

    window._wpMarkers=[];
    for(const wd of wpMarkerData){
      const marker=new google.maps.Marker({
        position:{lat:wd.coord[0],lng:wd.coord[1]},map,
        icon:makeCircleIcon('#b45309',12),zIndex:11,title:wd.name
      });
      const iw=new google.maps.InfoWindow({content:`<strong>経由地</strong><br>${wd.name}`});
      marker.addListener('click',()=>iw.open(map,marker));
      window._wpMarkers.push(marker);
    }

    const routeBounds=new google.maps.LatLngBounds();
    routePath.forEach(p=>routeBounds.extend(p));
    map.fitBounds(routeBounds,40);

    // ルート通過市区町村を色付け
    const passedCities=highlightRouteCities(route.geometry.coordinates);

    let resultHTML=`距離: <strong>${dist} km</strong><br>所要時間: <strong>${durStr}</strong>`;
    if(currentRouteMode==='walking') resultHTML+=` <span style="font-size:10px;color:var(--text-dim)">(徒歩)</span>`;
    resultHTML+=`<br>通過市区町村: <strong>${passedCities.size}箇所</strong>`;
    if(wpMarkerData.length) resultHTML+=`<br>経由地: <strong>${wpMarkerData.length}箇所</strong>`;
    for(const cr of cityCheckResults){
      resultHTML+=`<br>${cr.passes?'✅':'📌'} ${cr.name}${cr.passes?' — ルート上で通過済み':''}`;
    }
    $('route-result').innerHTML=resultHTML;
    $('route-clear-btn').style.display='block';
    $('route-save-btn').style.display='block';
    // 保存用にルートデータを保持
    window._lastRouteData={
      mode:currentRouteMode,
      from:{coord:routeFromCoord,name:$('route-from').value,isCity:routeFromCity.isCityWaypoint,cityCode:routeFromCity.cityCode},
      to:{coord:routeToCoord,name:$('route-to').value,isCity:routeToCity.isCityWaypoint,cityCode:routeToCity.cityCode},
      waypoints:wpMarkerData.map(w=>({coord:w.coord,name:w.name,cityCode:w.cityCode||null})),
      geometry:route.geometry.coordinates,
      distance:route.distance,duration:route.duration,
      passedCities:Array.from(passedCities)
    };
    buildGoogleMapsLinks(resolvedPoints,wpMarkerData,cityCheckResults);
  }

  const GMAP_WP_LIMIT=9; // Googleマップ経由地上限

  function buildGoogleMapsLinks(points,wpData,cityResults){
    // points: [出発coord, ...経由coord..., 目的coord]
    // 出発=points[0], 目的=points[points.length-1], 経由=points[1..n-2]
    if(points.length<2) return;

    const origin=points[0];
    const dest=points[points.length-1];
    const waypoints=points.slice(1,points.length-1);

    // 通過済み市区町村の省略判定
    // 重要: 誤判定による取り逃しを防ぐため、通過済みかつfinalRouteでも通過を再確認したもののみ省略
    // ここでは安全策として通過済み判定は参考表示のみにし、
    // Googleマップに渡す経由地からは「ルート検索で実際にポイントが追加されなかった」ものだけ自然に除外される
    // （resolvedPointsにはそもそも通過済みのポイントは含まれていない）

    // つまりwaypoints = 実際に必要な経由地のみ（既に絞り込み済み）
    const gmapMode=currentRouteMode==='walking'?'walking':'driving';

    if(waypoints.length<=GMAP_WP_LIMIT){
      // 制限内: 1つのURLで完結
      const {url,device}=buildMapUrl(origin,dest,waypoints,gmapMode);
      showGmapLinks([{url,label:getMapLinkLabel(device,null),sub:null}]);
    } else {
      // 制限超過: 最小分割（iOS Apple Maps は経由地制限が緩いが安全のため同じ分割を適用）
      const segments=splitForGmap(origin,dest,waypoints);
      const links=segments.map((seg,i)=>{
        const {url,device}=buildMapUrl(seg.origin,seg.dest,seg.waypoints,gmapMode);
        const segLabel=segments.length>1?`区間${i+1}/${segments.length}`:null;
        const label=getMapLinkLabel(device,segLabel);
        const sub=`${seg.originName} → ${seg.destName}`;
        return {url,label,sub};
      });
      showGmapLinks(links);
    }
  }

  // ── デバイス判定 ──
  function detectDevice(){
    const ua=navigator.userAgent||'';
    if(/iPad|iPhone|iPod/.test(ua)&&!window.MSStream) return 'ios';
    if(/Android/.test(ua)) return 'android';
    return 'desktop';
  }

  // iOS: Apple Maps URL
  // saddr/daddr は "lat,lng" 形式、経由地は waypoints パラメータ（Apple Maps はネイティブのみ対応）
  // 実用上 Apple Maps は多経由地を URL で渡せないため出発→目的のみ渡し、
  // 経由地は waypoints パラメータ(カンマ区切り lat,lng)で試みる
  function buildAppleMapsUrl(origin,dest,waypoints,mode){
    const dirflg=mode==='walking'?'w':'d';
    const saddr=`${origin[0]},${origin[1]}`;
    const daddr=`${dest[0]},${dest[1]}`;
    let url=`https://maps.apple.com/?saddr=${saddr}&daddr=${daddr}&dirflg=${dirflg}`;
    // Apple Maps は waypoints パラメータを実験的にサポート
    if(waypoints.length>0){
      // 中継点を daddr に +to: 形式で繋ぐ（Apple Maps URL scheme の書き方）
      // 複数経由地は "daddr=A+to:B+to:C+to:DEST" 形式
      const allDest=[...waypoints,dest];
      const daddrChain=allDest.map(w=>`${w[0]},${w[1]}`).join('+to:');
      url=`https://maps.apple.com/?saddr=${saddr}&daddr=${daddrChain}&dirflg=${dirflg}`;
    }
    return url;
  }

  // Android/Desktop: Google Maps URL
  function buildGmapUrl(origin,dest,waypoints,mode){
    const o=`${origin[0]},${origin[1]}`;
    const d=`${dest[0]},${dest[1]}`;
    let url=`https://www.google.com/maps/dir/?api=1&origin=${o}&destination=${d}&travelmode=${mode}`;
    if(waypoints.length>0){
      const wpStr=waypoints.map(w=>`${w[0]},${w[1]}`).join('|');
      url+=`&waypoints=${encodeURIComponent(wpStr)}`;
    }
    return url;
  }

  function buildMapUrl(origin,dest,waypoints,mode){
    const device=detectDevice();
    if(device==='ios') return {url:buildAppleMapsUrl(origin,dest,waypoints,mode),device};
    return {url:buildGmapUrl(origin,dest,waypoints,mode),device};
  }

  function getMapLinkLabel(device,segLabel){
    const appName=device==='ios'?'マップ（Apple）':'Googleマップ';
    return segLabel?`${segLabel} — ${appName}で開く`:`${appName}で開く`;
  }

  function splitForGmap(origin,dest,waypoints){
    // 最小分割: GMAP_WP_LIMITごとに区切る
    // 各区間: origin→wp[0..limit-1]→(次区間のoriginになる最終経由地)
    const segments=[];
    let segStart=origin;
    let segStartName='出発地';
    let i=0;
    while(i<waypoints.length){
      const remaining=waypoints.length-i;
      const chunkSize=Math.min(GMAP_WP_LIMIT,remaining);
      const chunk=waypoints.slice(i,i+chunkSize);
      const isLast=(i+chunkSize>=waypoints.length);
      const segDest=isLast?dest:chunk[chunk.length-1];
      const segDestName=isLast?'目的地':`経由地${i+chunkSize}`;
      // 最後の区間でない場合、chunkの最後は次区間のoriginになるので経由地から除く
      const segWp=isLast?chunk:chunk.slice(0,chunk.length-1);
      segments.push({
        origin:segStart,
        dest:segDest,
        waypoints:segWp,
        originName:segStartName,
        destName:segDestName
      });
      if(!isLast){
        segStart=chunk[chunk.length-1];
        segStartName=`経由地${i+chunkSize}`;
      }
      i+=chunkSize;
    }
    return segments;
  }

  function showGmapLinks(links){
    // route-result内にマップリンクを追加
    const device=detectDevice();
    const icon=device==='ios'?'🍎':'🗺';
    const container=document.createElement('div');
    container.className='gmap-links';
    for(const link of links){
      const a=document.createElement('a');
      a.className='gmap-link-btn';
      a.href=link.url;
      a.target='_blank';
      a.rel='noopener';
      a.innerHTML=`<span class="gmap-icon">${icon}</span><span class="gmap-label">${link.label}${link.sub?`<br><span class="gmap-sub">${link.sub}</span>`:''}</span><span style="font-size:13px;">↗</span>`;
      container.appendChild(a);
    }
    $('route-result').appendChild(container);
  }
