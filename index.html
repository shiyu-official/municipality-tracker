  // ── GitHub 連携: PAT を使ってリポジトリ内のファイルを直接更新 ──
  // Personal Access Token を localStorage に保存し、GitHub REST API 経由で data/*.json を更新する
  // 対象: data/routes.json, data/spot_user.json（手動で記録を追加するファイル）
  const GH_LS_KEY='tohaMap.githubConfig';
  const GH_API='https://api.github.com';
  function loadGitHubConfig(){
    try{
      const raw=localStorage.getItem(GH_LS_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){return null;}
  }
  function saveGitHubConfig(cfg){
    localStorage.setItem(GH_LS_KEY,JSON.stringify(cfg));
  }
  function clearGitHubConfig(){
    localStorage.removeItem(GH_LS_KEY);
  }
  function isGitHubConfigured(){
    const c=loadGitHubConfig();
    return !!(c&&c.owner&&c.repo&&c.token);
  }

  // Base64(UTF-8) エンコード（JSON日本語対応）
  function utf8ToBase64(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function base64ToUtf8(str){
    return decodeURIComponent(escape(atob(str)));
  }

  // GitHub API: ファイル取得（SHAを得るため）
  async function githubGetFile(path){
    const cfg=loadGitHubConfig();
    if(!cfg) throw new Error('GitHub設定が未構成です');
    const branch=cfg.branch||'main';
    const url=`${GH_API}/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`;
    const res=await fetch(url,{
      headers:{
        'Authorization':`Bearer ${cfg.token}`,
        'Accept':'application/vnd.github+json',
        'X-GitHub-Api-Version':'2022-11-28'
      }
    });
    if(res.status===404) return null; // ファイルが無い（新規作成扱い）
    if(!res.ok) throw new Error(`GET失敗: ${res.status} ${res.statusText}`);
    return await res.json();
  }

  // GitHub API: ファイル更新（PUT）
  // content: 文字列。差分がなければskipしてスキップ結果を返す
  async function githubPutFile(path,content,message){
    const cfg=loadGitHubConfig();
    if(!cfg) throw new Error('GitHub設定が未構成です');
    const branch=cfg.branch||'main';
    // 現行ファイルのSHAを取得（あれば）
    let currentSha=null;
    let currentContent=null;
    const existing=await githubGetFile(path);
    if(existing){
      currentSha=existing.sha;
      try{currentContent=base64ToUtf8(existing.content.replace(/\n/g,''));}catch(e){currentContent=null;}
    }
    // 内容が同じなら何もしない
    if(currentContent!==null&&currentContent===content){
      return {skipped:true,reason:'no-change'};
    }
    const url=`${GH_API}/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(path)}`;
    const body={
      message:message||`Update ${path}`,
      content:utf8ToBase64(content),
      branch
    };
    if(currentSha) body.sha=currentSha;
    const res=await fetch(url,{
      method:'PUT',
      headers:{
        'Authorization':`Bearer ${cfg.token}`,
        'Accept':'application/vnd.github+json',
        'X-GitHub-Api-Version':'2022-11-28',
        'Content-Type':'application/json'
      },
      body:JSON.stringify(body)
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(`PUT失敗: ${res.status} ${err.message||res.statusText}`);
    }
    return {skipped:false,result:await res.json()};
  }

  // 接続テスト: リポジトリの情報を取得できるかチェック
  async function githubTestConnection(cfg){
    const url=`${GH_API}/repos/${cfg.owner}/${cfg.repo}`;
    const res=await fetch(url,{
      headers:{
        'Authorization':`Bearer ${cfg.token}`,
        'Accept':'application/vnd.github+json'
      }
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(`接続失敗: ${res.status} ${err.message||res.statusText}`);
    }
    const data=await res.json();
    // 書き込み権限を確認
    if(!data.permissions||!data.permissions.push){
      throw new Error('このトークンには書き込み権限がありません');
    }
    return data;
  }

  // 「未保存の変更あり」状態の管理
  const ghDirty={routes:false,spotUser:false};
  function markDirty(kind){
    ghDirty[kind]=true;
    updateGhSaveIndicators();
  }
  function clearDirty(kind){
    ghDirty[kind]=false;
    updateGhSaveIndicators();
  }
  function updateGhSaveIndicators(){
    // 「GitHubに保存」ボタンの表示状態を更新
    const btnRoutes=$('gh-save-routes-btn');
    const btnSpots=$('gh-save-spots-btn');
    if(btnRoutes){
      btnRoutes.classList.toggle('has-changes',ghDirty.routes);
      btnRoutes.disabled=!ghDirty.routes||!isGitHubConfigured();
    }
    if(btnSpots){
      btnSpots.classList.toggle('has-changes',ghDirty.spotUser);
      btnSpots.disabled=!ghDirty.spotUser||!isGitHubConfigured();
    }
  }

  // 「GitHubに保存」実行（対象タイプ: 'routes' or 'spotUser'）
  async function githubSaveData(kind){
    if(!isGitHubConfigured()){
      alert('先にGitHub連携設定を行ってください（ヘッダーメニュー → GitHub連携）');
      return;
    }
    try{
      let path,content,message;
      if(kind==='routes'){
        path='data/routes.json';
        content=JSON.stringify(savedRoutes,null,2);
        message=`Update routes.json (${savedRoutes.length} routes)`;
      } else if(kind==='spotUser'){
        const clean={};
        for(const[k,v] of Object.entries(spotUserData)){
          if(v&&v.status) clean[k]={status:v.status};
        }
        path='data/spot_user.json';
        content=JSON.stringify(clean,null,2);
        message=`Update spot_user.json (${Object.keys(clean).length} spots)`;
      } else {
        throw new Error('unknown kind:'+kind);
      }
      showGhToast('GitHubに保存中...',{duration:0});
      const res=await githubPutFile(path,content,message);
      if(res.skipped){
        showGhToast('変更なし（スキップ）',{duration:2000});
      } else {
        showGhToast('✓ GitHubに保存しました',{duration:2500,ok:true});
      }
      clearDirty(kind);
    }catch(e){
      console.error('[gh save]',e);
      showGhToast('保存失敗: '+e.message,{err:true,duration:4000});
    }
  }

  // GitHub操作用の軽量トースト（現在地追跡のtoastとは独立）
  let ghToastEl=null,ghToastTimer=null;
  function showGhToast(msg,opt={}){
    if(!ghToastEl){
      ghToastEl=document.createElement('div');
      ghToastEl.id='gh-toast';
      ghToastEl.style.cssText='position:fixed;top:64px;right:12px;z-index:2500;background:rgba(0,0,0,0.82);color:#fff;padding:9px 14px;border-radius:8px;font-size:12px;font-family:"Noto Sans JP",sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.3);max-width:calc(100vw - 32px);pointer-events:none;transition:opacity 0.2s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);';
      document.body.appendChild(ghToastEl);
    }
    ghToastEl.textContent=msg;
    ghToastEl.style.opacity='1';
    ghToastEl.style.transform='scale(1.06)';
    setTimeout(()=>{ghToastEl.style.transform='scale(1)';},60);
    if(opt.err) ghToastEl.style.background='rgba(185,28,28,0.92)';
    else if(opt.ok) ghToastEl.style.background='rgba(22,101,52,0.92)';
    else ghToastEl.style.background='rgba(0,0,0,0.82)';
    if(ghToastTimer) clearTimeout(ghToastTimer);
    const d=opt.duration||3000;
    if(d>0) ghToastTimer=setTimeout(()=>{ghToastEl.style.opacity='0';},d);
  }

  // 離脱時の未保存警告
  window.addEventListener('beforeunload',(e)=>{
    if(isGitHubConfigured()&&(ghDirty.routes||ghDirty.spotUser)){
      e.preventDefault();
      e.returnValue='';
    }
  });

  // 初期の保存ボタン状態更新
  updateGhSaveIndicators();

  // GitHub保存ボタンのクリックハンドラ
  const ghSaveRoutesBtn=$('gh-save-routes-btn');
  if(ghSaveRoutesBtn) ghSaveRoutesBtn.addEventListener('click',()=>githubSaveData('routes'));
  const ghSaveSpotsBtn=$('gh-save-spots-btn');
  if(ghSaveSpotsBtn) ghSaveSpotsBtn.addEventListener('click',()=>githubSaveData('spotUser'));

  // ══════════════════════════════════════════════════════
  // ── スポットコレクション機能 ──
  // ══════════════════════════════════════════════════════
  let spotData=null; // spot_visits.json のデータ
  let spotUserData={}; // spot_user.json のデータ {spotId: {manualChecked:true}}
  let spotMarkers=[]; // Google Maps マーカー
  let spotMarkersVisible=true;
  let spotCurrentView='catList'; // 'catList' | 'spotList'
  let spotCurrentCatId=null;

  function getSpotUser(spotId){
    return spotUserData[spotId]||{};
  }
  // status: "visited"=利用した, "passed"=通過のみ, undefined=未設定
  function getManualStatus(spotId){
    const u=spotUserData[spotId];
    return u?u.status:undefined;
  }
  function setManualStatus(spotId,status){
    // 対象スポットのgroupを取得
    let group=null;
    if(spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(sp.id===spotId&&sp.group){group=sp.group;break;}
        }
        if(group) break;
      }
    }
    // 同groupの全スポットIDを収集
    const targets=[spotId];
    if(group&&spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(sp.group===group&&sp.id!==spotId) targets.push(sp.id);
        }
      }
    }
    // 全対象にstatusをセット
    for(const sid of targets){
      if(!spotUserData[sid]) spotUserData[sid]={};
      if(status) spotUserData[sid].status=status;
      else delete spotUserData[sid].status;
      if(Object.keys(spotUserData[sid]).length===0) delete spotUserData[sid];
    }
    // spotData側にも反映
    if(spotData){
      for(const c of spotData.categories){
        for(const sp of c.spots){
          if(targets.includes(sp.id)) sp._manualStatus=status;
        }
      }
    }
    // GitHub未保存フラグ
    markDirty('spotUser');
  }
  // 実効的に「訪問した」扱いか
  function isEffectiveVisited(spot){
    const ms=spot._manualStatus||getManualStatus(spot.id);
    if(ms==='visited') return true;
    if(ms==='passed') return false;
    // 未設定なら自動検出をそのまま使う
    return !!spot.autoDetected;
  }
  // 実効的に「利用した」（手動で明示）か
  function isManualVisited(spot){
    const ms=spot._manualStatus||getManualStatus(spot.id);
    return ms==='visited';
  }

  // spot_user.json を JSONダウンロードで書き出し
  function downloadSpotUserJson(){
    // 空エントリを除外して整形
    const clean={};
    for(const[k,v] of Object.entries(spotUserData)){
      if(v&&v.status) clean[k]={status:v.status};
    }
    const json=JSON.stringify(clean,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='spot_user.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // spot_visits.json + spot_user.json を読み込み
  async function loadSpotData(){
    try{
      const res=await fetch('data/spot_visits.json');
      if(!res.ok) return;
      spotData=await res.json();
    }catch(e){
      console.log('spot_visits.json not found:',e);
      return;
    }
    // spot_user.json を読み込み（なくてもOK）
    // 旧形式(manualChecked:true)との互換: statusに変換
    try{
      const res2=await fetch('data/spot_user.json');
      if(res2.ok){
        spotUserData=await res2.json();
        for(const[k,v] of Object.entries(spotUserData)){
          if(v.manualChecked===true&&!v.status){v.status='visited';delete v.manualChecked;}
        }
      }
    }catch(e){}
    // マージ
    for(const cat of spotData.categories){
      for(const s of cat.spots){
        s._manualStatus=getManualStatus(s.id);
      }
    }
    renderSpotHeaderStats();
    renderSpotCatList();
    addSpotMarkers();
    addSpotLayerToggle();
  }

  function countSpotStats(){
    if(!spotData) return {total:0,autoVisited:0,visited:0};
    let total=0,autoVisited=0,visited=0;
    for(const cat of spotData.categories){
      for(const s of cat.spots){
        total++;
        if(s.autoDetected) autoVisited++;
        if(isEffectiveVisited(s)) visited++;
      }
    }
    return {total,autoVisited,visited};
  }

  function renderSpotHeaderStats(){
    const stats=countSpotStats();
    $('spot-header-stats').innerHTML=`
      <div class="spot-stat-chip"><span>総スポット</span><span class="sv">${stats.total}</span></div>
      <div class="spot-stat-chip"><span>訪問</span><span class="sv">${stats.visited}</span></div>
      <div class="spot-stat-chip"><span>自動検出</span><span class="sv">${stats.autoVisited}</span></div>
    `;
  }

  function getEffectiveCompleted(cat){
    let n=0;
    for(const s of cat.spots){
      if(isEffectiveVisited(s)) n++;
    }
    return n;
  }

  function renderSpotCatList(){
    spotCurrentView='catList';spotCurrentCatId=null;
    const el=$('spot-sidebar-content');
    if(!spotData||!spotData.categories.length){
      el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:12px;">spot_visits.json が見つかりません。<br>パイプラインを実行してスポットデータを生成してください。</div>';
      return;
    }
    el.innerHTML=spotData.categories.map(cat=>{
      const ec=getEffectiveCompleted(cat);
      const isComplete=ec>=cat.total;
      return `<div class="spot-cat-item${isComplete?' spot-cat-complete':''}" data-cat-id="${cat.id}">
        <div class="spot-cat-icon">${cat.icon||'📍'}</div>
        <div class="spot-cat-info">
          <div class="spot-cat-name">${cat.name}</div>
          <div class="spot-cat-desc">${cat.description||''}</div>
          <div class="spot-cat-prog">
            <div class="spot-cat-bar"><div class="spot-cat-bar-fill" style="width:${cat.total>0?ec/cat.total*100:0}%"></div></div>
            <div class="spot-cat-count">${ec}/${cat.total}</div>
          </div>
        </div>
      </div>`;
    }).join('');
    el.querySelectorAll('.spot-cat-item').forEach(item=>{
      item.addEventListener('click',()=>renderSpotList(item.dataset.catId));
    });
  }

  function renderSpotList(catId){
    spotCurrentView='spotList';spotCurrentCatId=catId;
    const cat=spotData.categories.find(c=>c.id===catId);
    if(!cat) return;
    const el=$('spot-sidebar-content');
    let h=`<button class="back-btn" id="spot-back-to-cats">← カテゴリ一覧</button>`;
    h+=`<div style="padding:4px 12px 8px;"><span style="font-size:15px;font-weight:700;color:var(--text-bright);">${cat.icon||''} ${cat.name}</span>`;
    h+=`<div style="font-size:11px;color:var(--text-dim);margin-top:2px;">${cat.description||''}</div></div>`;
    for(const s of cat.spots){
      const isAuto=s.autoDetected;
      const ms=s._manualStatus||getManualStatus(s.id);
      const effVisited=isEffectiveVisited(s);
      const isManualV=ms==='visited';
      const isPassed=ms==='passed';
      // ステータス表示: 手動優先
      const statusClass=isManualV?'manual':effVisited?'auto':'';
      const statusIcon=isManualV?'✔':effVisited?'~':'';
      const statusTitle=isManualV?'利用した':isPassed?'通過のみ（自動検出あり）':isAuto?'自動検出（近くを通過）':'未訪問';
      const dateStr=s.firstVisit?`${s.firstVisit} ~ ${s.lastVisit||s.firstVisit}`:'';
      // 自動検出マーク（手動で上書きしている場合に小さく表示）
      const autoTag=(isAuto&&ms)?'<span style="font-size:9px;color:var(--text-dim);margin-left:4px;" title="自動検出あり">🛰</span>':'';
      // 所属カテゴリバッジ（他カテゴリにも属している場合）
      let otherCats='';
      if(s.group){
        const others=[];
        for(const oc of spotData.categories){
          if(oc.id===cat.id) continue;
          for(const os of oc.spots){
            if(os.group===s.group) others.push(oc);
          }
        }
        if(others.length) otherCats=others.map(oc=>`<span style="font-size:9px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1px 5px;color:var(--text-dim);white-space:nowrap;">${oc.icon||''} ${oc.name}</span>`).join(' ');
      }
      h+=`<div class="spot-item" data-spot-id="${s.id}">
        <div class="spot-status ${statusClass}" data-spot-id="${s.id}" title="${statusTitle}">${statusIcon}</div>
        <div class="spot-info">
          <div class="spot-name">${s.name}${autoTag}</div>
          <div class="spot-pref">${s.pref}${otherCats?' '+otherCats:''}</div>
          ${dateStr?`<div class="spot-dates">${dateStr}${s.visitDays?' ('+s.visitDays+'日)':''}</div>`:''}
          <div class="spot-actions">
            <button class="spot-act-btn ${isManualV?'checked':''}" data-spot-id="${s.id}" data-action="visited">${isManualV?'✓ 利用した':'利用した'}</button>
            <button class="spot-act-btn ${isPassed?'checked':''}" data-spot-id="${s.id}" data-action="passed" style="${isPassed?'background:var(--bg);border-color:var(--text-dim);color:var(--text-dim);font-weight:500;':''}">${isPassed?'✓ 通過のみ':'通過のみ'}</button>
          </div>
        </div>
        <button class="spot-locate-btn" data-lat="${s.lat}" data-lon="${s.lon}" title="地図で表示">📍</button>
      </div>`;
    }
    el.innerHTML=h;

    // イベント: 戻るボタン
    $('spot-back-to-cats').addEventListener('click',()=>{renderSpotCatList();renderSpotHeaderStats();});

    // イベント: 利用した / 通過のみ
    el.querySelectorAll('[data-action="visited"]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const sid=btn.dataset.spotId;
        const cur=getManualStatus(sid);
        setManualStatus(sid,cur==='visited'?undefined:'visited');
        renderSpotList(catId);
        updateSpotMarkers();
        renderSpotHeaderStats();
      });
    });
    el.querySelectorAll('[data-action="passed"]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const sid=btn.dataset.spotId;
        const cur=getManualStatus(sid);
        setManualStatus(sid,cur==='passed'?undefined:'passed');
        renderSpotList(catId);
        updateSpotMarkers();
        renderSpotHeaderStats();
      });
    });

    // イベント: 地図で表示
    el.querySelectorAll('.spot-locate-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const lat=parseFloat(btn.dataset.lat),lon=parseFloat(btn.dataset.lon);
        map.setCenter({lat,lng:lon});
        map.setZoom(15);
        if(window.innerWidth<=768){
          sidebar.classList.add('collapsed');
          updateToggleBtn();
          setTimeout(()=>google.maps.event.trigger(map,'resize'),350);
        }
      });
    });
  }

  // ── スポットマーカー (地図上) ──
  function makeSpotIcon(catIcon,visited,manualChecked){
    const bgColor=manualChecked?'#C1F0C8':visited?'#EFFBF1':'#e5e7eb';
    const borderColor=manualChecked?'#4ade80':visited?'#86efac':'#9ca3af';
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34">
      <circle cx="17" cy="17" r="15" fill="${bgColor}" stroke="${borderColor}" stroke-width="2"/>
      <text x="17" y="23" text-anchor="middle" font-size="16">${catIcon}</text>
    </svg>`;
    return{url:'data:image/svg+xml,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(34,34),anchor:new google.maps.Point(17,17)};
  }

  function addSpotMarkers(){
    if(!spotData) return;
    clearSpotMarkers();
    for(const cat of spotData.categories){
      const catIcon=cat.icon||'📍';
      for(const s of cat.spots){
        const effVisited=isEffectiveVisited(s);
        const isManualV=isManualVisited(s);
        const marker=new google.maps.Marker({
          position:{lat:s.lat,lng:s.lon},
          map:spotMarkersVisible?map:null,
          icon:makeSpotIcon(catIcon,effVisited,isManualV),
          title:s.name,
          zIndex:5,
        });
        const dateStr=s.firstVisit?`<br>初訪問: ${s.firstVisit}`:'';
        const ms=s._manualStatus||getManualStatus(s.id);
        const statusLabel=ms==='visited'?'利用した':ms==='passed'?'通過のみ':s.autoDetected?'自動検出':'未訪問';
        // 所属カテゴリ一覧（複数ある場合は併記）
        let catLabels=cat.icon+' '+cat.name;
        if(s.group){
          const allCats=[{icon:cat.icon,name:cat.name}];
          for(const oc of spotData.categories){
            if(oc.id===cat.id) continue;
            for(const os of oc.spots){if(os.group===s.group) allCats.push({icon:oc.icon,name:oc.name});}
          }
          if(allCats.length>1) catLabels=allCats.map(c=>(c.icon||'')+' '+c.name).join(' / ');
        }
        const iwContent=`<div class="iw-body">
          <div style="font-weight:700;font-size:14px;">${s.name}</div>
          <div style="color:#7a8494;font-size:11px;margin-top:2px;">${catLabels} · ${s.pref}</div>
          <div style="margin-top:6px;font-size:11px;"><span style="padding:2px 8px;border-radius:10px;background:${isManualV?'#C1F0C8':effVisited?'#EFFBF1':'#f3f4f6'};color:${isManualV?'#166534':effVisited?'#166534':'#6b7280'};font-weight:500;">${statusLabel}</span>${s.autoDetected&&ms?'<span style="font-size:9px;color:#7a8494;margin-left:4px;" title="自動検出あり">🛰</span>':''}</div>
          ${dateStr?`<div style="font-size:11px;color:#7a8494;margin-top:4px;font-family:'DM Mono',monospace;">${dateStr}</div>`:''}
        </div>`;
        marker.addListener('click',()=>{
          infoWindow.setContent(iwContent);
          infoWindow.open(map,marker);
        });
        marker._spotId=s.id;
        spotMarkers.push(marker);
      }
    }
  }

  function clearSpotMarkers(){
    spotMarkers.forEach(m=>m.setMap(null));
    spotMarkers=[];
  }

  function updateSpotMarkers(){
    if(!spotData) return;
    for(const marker of spotMarkers){
      const sid=marker._spotId;
      let found=null,catIcon='📍';
      for(const cat of spotData.categories){
        for(const s of cat.spots){if(s.id===sid){found=s;catIcon=cat.icon||'📍';break;}}
        if(found) break;
      }
      if(found){
        const effVisited=isEffectiveVisited(found);
        const isManualV=isManualVisited(found);
        marker.setIcon(makeSpotIcon(catIcon,effVisited,isManualV));
      }
    }
  }

  // レイヤートグルにスポット表示切替を追加（ヘッダーのメニューパネル内へ）
  function addSpotLayerToggle(){
    const chkSpots=document.createElement('input');
    chkSpots.type='checkbox';chkSpots.id='toggle-spots';chkSpots.checked=true;
    const lblSpots=document.createElement('label');
    lblSpots.className='lmp-item';
    const spotIcon=document.createElement('span');
    spotIcon.textContent='📍';
    spotIcon.style.cssText='font-size:14px;width:18px;text-align:center;flex-shrink:0;';
    const spotText=document.createElement('span');
    spotText.textContent='スポット';
    lblSpots.append(chkSpots,spotIcon,spotText);
    const lmpLayers=$('lmp-layers');
    if(lmpLayers) lmpLayers.appendChild(lblSpots);
    chkSpots.addEventListener('change',function(){
      spotMarkersVisible=this.checked;
      spotMarkers.forEach(m=>m.setMap(this.checked?map:null));
    });
  }

  // スポットデータ読み込み開始
  loadSpotData();


  // ── 現在地リアルタイム追跡 ──
  // watchPositionで継続的に現在地を取得し、地図に青いマーカーで表示
  // Google Maps 標準アプリと同じ見た目・挙動
  (function setupGeolocationTracking(){
    const fabToggle=$('fab-geolocation');
    const fabRecenter=$('fab-recenter');
    if(!fabToggle) return;

    let watchId=null;           // watchPositionのID
    let accuracyCircle=null;    // 精度を表す薄い円
    let firstFix=true;          // 初回位置取得フラグ（地図中心を合わせる判定）
    let lastPos=null;           // 最新位置 {lat,lng,accuracy}
    let isTracking=false;
    let initialTimeout=null;    // 初回取得タイムアウト監視
    let followMode=false;       // 追従モード: ONならGPS更新のたびに地図中心も移動
    let suppressDragEvent=false; // 自動panToによるdrag誤検知を抑制するフラグ
    const visitedThisSession=new Set(); // このセッション中に到達した市区町村コード（再通知抑止用）

    // ステータストースト（画面下部に表示、数秒で消える）
    let toastEl=null,toastTimer=null,toastPopTimer=null;
    function showToast(msg,opt={}){
      if(!toastEl){
        toastEl=document.createElement('div');
        toastEl.id='geo-toast';
        toastEl.style.cssText='position:fixed;left:50%;bottom:88px;transform:translateX(-50%) scale(1);z-index:2500;background:rgba(0,0,0,0.82);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;font-family:"Noto Sans JP",sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.3);max-width:calc(100vw - 32px);text-align:center;pointer-events:none;transition:opacity 0.2s,transform 0.25s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);';
        document.body.appendChild(toastEl);
      }
      toastEl.textContent=msg;
      toastEl.style.opacity='1';
      if(opt.err) toastEl.style.background='rgba(185,28,28,0.92)';
      else toastEl.style.background='rgba(0,0,0,0.82)';
      // ポップ演出（scale 1.08 → 1）
      toastEl.style.transform='translateX(-50%) scale(1.08)';
      if(toastPopTimer) clearTimeout(toastPopTimer);
      toastPopTimer=setTimeout(()=>{toastEl.style.transform='translateX(-50%) scale(1)';},60);
      if(toastTimer) clearTimeout(toastTimer);
      const duration=opt.duration||3000;
      if(duration>0){
        toastTimer=setTimeout(()=>{toastEl.style.opacity='0';},duration);
      }
    }

    // ── 現在地ドット: OverlayViewでDOM要素を配置（CSSアニメで脈動、補間で滑らか移動） ──
    // Google Maps の Marker だとCSSアニメが効かないため OverlayView を使う
    let geoOverlay=null;  // 現在地ドットのOverlayViewインスタンス
    let currentRenderLatLng=null;  // 現在描画されている座標（補間中の値）
    let targetLatLng=null;         // 目標座標（最新GPS）
    let interpAnimId=null;         // requestAnimationFrame ID
    let interpStartTs=0;           // 補間開始時刻
    let interpFromLatLng=null;     // 補間元の座標
    const INTERP_DURATION=900;     // 補間にかける時間(ms)

    function createGeoOverlay(){
      const overlay=new google.maps.OverlayView();
      const dotEl=document.createElement('div');
      dotEl.className='geo-dot-overlay';
      dotEl.innerHTML='<div class="geo-dot-pulse"></div><div class="geo-dot-core"></div>';
      overlay.onAdd=function(){
        this.getPanes().overlayMouseTarget.appendChild(dotEl);
      };
      overlay.draw=function(){
        if(!currentRenderLatLng) return;
        const proj=this.getProjection();
        if(!proj) return;
        const px=proj.fromLatLngToDivPixel(new google.maps.LatLng(currentRenderLatLng.lat,currentRenderLatLng.lng));
        if(!px) return;
        dotEl.style.left=px.x+'px';
        dotEl.style.top=px.y+'px';
      };
      overlay.onRemove=function(){
        if(dotEl.parentNode) dotEl.parentNode.removeChild(dotEl);
      };
      overlay.setMap(map);
      overlay._dotEl=dotEl;
      return overlay;
    }

    // 補間アニメーション: currentRenderLatLng を targetLatLng に向けて滑らかに移動
    function startInterpolation(){
      if(interpAnimId!==null) cancelAnimationFrame(interpAnimId);
      interpStartTs=performance.now();
      interpFromLatLng=currentRenderLatLng?{...currentRenderLatLng}:{...targetLatLng};
      function step(now){
        const elapsed=now-interpStartTs;
        const t=Math.min(elapsed/INTERP_DURATION,1);
        // ease-out cubic
        const eased=1-Math.pow(1-t,3);
        currentRenderLatLng={
          lat:interpFromLatLng.lat+(targetLatLng.lat-interpFromLatLng.lat)*eased,
          lng:interpFromLatLng.lng+(targetLatLng.lng-interpFromLatLng.lng)*eased
        };
        // 再描画
        if(geoOverlay) geoOverlay.draw();
        if(t<1){
          interpAnimId=requestAnimationFrame(step);
        } else {
          interpAnimId=null;
        }
      }
      interpAnimId=requestAnimationFrame(step);
    }

    function updatePositionMarkers(lat,lng,accuracy){
      targetLatLng={lat,lng};
      // 初回は瞬時に、以降は補間アニメで滑らかに
      if(!currentRenderLatLng){
        currentRenderLatLng={lat,lng};
      } else {
        startInterpolation();
      }
      if(!geoOverlay){
        geoOverlay=createGeoOverlay();
      } else {
        // 初回描画や地図中心変化に備えて再描画キック
        geoOverlay.draw();
      }
      // 精度円（GPSの accuracy は半径メートル）
      const pos={lat,lng};
      if(!accuracyCircle){
        accuracyCircle=new google.maps.Circle({
          map:map,
          center:pos,
          radius:accuracy,
          fillColor:'#4285f4',
          fillOpacity:0.15,
          strokeColor:'#4285f4',
          strokeOpacity:0.3,
          strokeWeight:1,
          clickable:false,
          zIndex:9998
        });
      } else {
        accuracyCircle.setCenter(pos);
        accuracyCircle.setRadius(accuracy);
      }
      // C-2: 現在地の市区町村ハイライト更新
      updateCurrentCityHighlight(lat,lng);
      // 追従モード: 地図中心を現在地に追従（パンで滑らかに）
      if(followMode){
        suppressDragEvent=true;
        map.panTo({lat,lng});
        // panToのアニメは非同期で終わるので、数フレーム後にフラグ解除
        setTimeout(()=>{suppressDragEvent=false;},100);
      }
    }

    function clearMarkers(){
      if(interpAnimId!==null){cancelAnimationFrame(interpAnimId);interpAnimId=null;}
      if(geoOverlay){geoOverlay.setMap(null);geoOverlay=null;}
      if(accuracyCircle){accuracyCircle.setMap(null);accuracyCircle=null;}
      currentRenderLatLng=null;
      targetLatLng=null;
      // C-2: ハイライトも解除
      updateCurrentCityHighlight(null,null);
    }

    // ── C-2: 現在地の市区町村ハイライト更新 ──
    // 現在地の市区町村が変わったときだけ、該当ポリゴンだけ個別にstyle上書き/復元（軽量）
    function updateCurrentCityHighlight(lat,lng){
      const prevCode=window._currentCityCode||null;
      let newCode=null;
      if(lat!=null&&lng!=null){
        const feat=findMunicipalityAtPoint({lat,lng});
        if(feat){
          newCode=feat.properties?.N03_007||null;
        }
      }
      if(newCode===prevCode) return;
      window._currentCityCode=newCode;

      // 前の市区町村のスタイル上書きを解除
      if(prevCode){
        geoDataLayer.forEach(f=>{
          if(f.getProperty('N03_007')===prevCode){
            geoDataLayer.revertStyle(f);
          }
        });
      }
      // 新しい市区町村を強調
      if(newCode){
        geoDataLayer.forEach(f=>{
          if(f.getProperty('N03_007')===newCode){
            geoDataLayer.overrideStyle(f,{
              fillColor:mapColors.CURRENT_CITY_FILL,
              fillOpacity:0.55,
              strokeColor:mapColors.CURRENT_CITY_STROKE,
              strokeWeight:2.5,
              strokeOpacity:0.9,
              zIndex:3
            });
          }
        });
      }

      // C-3: 市区町村が変わった瞬間、踏破フィードバックを出す
      if(newCode&&newCode!==prevCode){
        const fp=featureProps[newCode];
        if(fp){
          const cityName=buildFullName(newCode,fp.gun,fp.city,fp.ward)||newCode;
          const visitDays=visitedData.cities[newCode]?.visitDays||0;
          // 同セッションで再進入した場合は簡略表示（出す頻度を減らす）
          const alreadyShownThisSession=visitedThisSession.has(newCode);
          visitedThisSession.add(newCode);

          // 都道府県境越えの判定
          const prevFp=prevCode?featureProps[prevCode]:null;
          const crossedPref=prevFp&&fp.pref&&prevFp.pref&&prevFp.pref!==fp.pref;

          if(crossedPref){
            // 都道府県境をまたいだ場合は特別に強調
            showToast(`✨ ${fp.pref} に入りました / ${cityName}`,{duration:3500});
          } else if(alreadyShownThisSession){
            // セッション内再進入は簡素に
            showToast(`↩ ${cityName}`,{duration:1500});
          } else if(visitDays===0){
            // 未訪問（最もお祝いしたいケース）
            showToast(`🎉 ${fp.pref||''}${cityName} に到達（未訪問エリア！）`,{duration:4000});
          } else if(visitDays===1){
            showToast(`🔄 ${fp.pref||''}${cityName} に再訪（2回目）`,{duration:2500});
          } else if(visitDays===2){
            showToast(`🔄 ${fp.pref||''}${cityName} に再訪（3回目）`,{duration:2500});
          } else {
            showToast(`📍 ${fp.pref||''}${cityName}（常連: ${visitDays}回訪問済み）`,{duration:2500});
          }
        }
      }
    }

    function recenterToCurrentPos(zoomTo){
      if(!lastPos) return;
      suppressDragEvent=true;
      map.panTo({lat:lastPos.lat,lng:lastPos.lng});
      if(typeof zoomTo==='number'&&map.getZoom()<zoomTo){
        map.setZoom(zoomTo);
      }
      setTimeout(()=>{suppressDragEvent=false;},300);
      // 追従モードをON
      setFollowMode(true);
    }

    // 追従モードの切替 + FABの見た目更新
    function setFollowMode(on){
      followMode=on;
      if(fabRecenter){
        fabRecenter.setAttribute('aria-pressed',String(on));
        fabRecenter.title=on?'追従中（地図を動かすと解除）':'現在地に戻る';
      }
    }

    function setTrackingState(on){
      isTracking=on;
      fabToggle.setAttribute('aria-pressed',String(on));
      fabToggle.title=on?'現在地の追跡中（クリックで停止）':'現在地を追跡';
      if(fabRecenter) fabRecenter.hidden=!on||!lastPos;
      if(!on) setFollowMode(false);
    }

    // 位置取得の成功コールバック
    function onPositionSuccess(pos){
      const {latitude,longitude,accuracy}=pos.coords;
      lastPos={lat:latitude,lng:longitude,accuracy};
      updatePositionMarkers(latitude,longitude,accuracy);
      // 初回タイムアウト監視を解除
      if(initialTimeout){clearTimeout(initialTimeout);initialTimeout=null;}
      // 初回だけ地図中心を現在地に
      if(firstFix){
        firstFix=false;
        recenterToCurrentPos(14);
        showToast(`現在地を取得しました（精度 ±${Math.round(accuracy)}m）`,{duration:2500});
      }
      // 位置が取れた時点で recenterボタンを表示
      if(fabRecenter&&isTracking) fabRecenter.hidden=false;
    }

    // 位置取得の失敗コールバック
    function onPositionError(err){
      console.warn('[geo] error:',err,'code:',err&&err.code,'msg:',err&&err.message);
      // Safariではerr.codeが取れない/数値でないことがあるので文字列メッセージでも判定
      const msg=(err&&err.message)||'';
      const code=err&&err.code;
      if(code===1 /* PERMISSION_DENIED */ || /denied|permission/i.test(msg)){
        showToast('位置情報の利用が許可されていません。Safariの設定を確認してください。',{err:true,duration:5000});
        stopTracking();
        return;
      }
      if(code===2 /* POSITION_UNAVAILABLE */ || /unavailable|kCLError/i.test(msg)){
        showToast('位置情報を取得できません。屋外に移動するかWi-Fi/モバイル通信を確認してください。',{err:true,duration:5000});
        return;
      }
      if(code===3 /* TIMEOUT */ || /timeout/i.test(msg)){
        showToast('位置取得がタイムアウトしました。再試行します...',{duration:3000});
        // watchPositionは内部で再試行を続けるので停止しない
        return;
      }
      // その他未分類
      showToast('位置取得エラー: '+(msg||'不明'),{err:true,duration:4000});
    }

    function startTracking(){
      if(!navigator.geolocation){
        showToast('このブラウザは現在地取得に対応していません',{err:true});
        setTrackingState(false);
        return;
      }
      if(watchId!==null) return; // 既に追跡中
      firstFix=true;
      setTrackingState(true);
      showToast('位置情報を取得中...',{duration:0}); // 成功/失敗が来るまで表示し続ける

      // iOS Safariでは watchPosition だけだと初回フィックスが遅い/取れないことがあるので
      // まず getCurrentPosition で明示的に1回取得をトリガー
      navigator.geolocation.getCurrentPosition(
        onPositionSuccess,
        onPositionError,
        {
          enableHighAccuracy:true,
          maximumAge:10000,
          timeout:20000
        }
      );

      // 初回取得の監視（20秒以上何も来なかったら警告）
      initialTimeout=setTimeout(()=>{
        if(firstFix&&isTracking){
          showToast('位置取得に時間がかかっています。屋外または窓際で試してください。',{duration:5000});
        }
      },20000);

      // 継続監視
      watchId=navigator.geolocation.watchPosition(
        onPositionSuccess,
        onPositionError,
        {
          enableHighAccuracy:true, // GPS優先（屋外で数m精度）
          maximumAge:5000,         // 5秒以内のキャッシュは再利用
          timeout:60000            // Safariは長めに（30秒→60秒）
        }
      );
    }

    function stopTracking(){
      if(watchId!==null){
        navigator.geolocation.clearWatch(watchId);
        watchId=null;
      }
      if(initialTimeout){clearTimeout(initialTimeout);initialTimeout=null;}
      clearMarkers();
      lastPos=null;
      setTrackingState(false);
      if(toastEl) toastEl.style.opacity='0';
    }

    fabToggle.addEventListener('click',()=>{
      if(isTracking) stopTracking();
      else startTracking();
    });

    if(fabRecenter){
      fabRecenter.addEventListener('click',()=>{
        recenterToCurrentPos(15);
      });
    }

    // 追従モードの解除トリガー: ユーザーが地図をドラッグ/ズーム操作
    // `suppressDragEvent` で自動panTo起点のdragは無視
    map.addListener('dragstart',()=>{
      if(suppressDragEvent) return;
      if(followMode) setFollowMode(false);
    });
    // マウスホイール/ピンチでのズーム操作も追従解除の合図
    // ただしrecenter時の自動setZoomは無視したいので、短時間の抑制期間を設ける
    map.addListener('zoom_changed',()=>{
      if(suppressDragEvent) return;
      if(followMode) setFollowMode(false);
    });

    // 初期状態
    setTrackingState(false);

    // ページ離脱時はクリーンアップ（バッテリー節約）
    window.addEventListener('beforeunload',stopTracking);
  })();

  // ── 保存ルート管理 ──
  const ROUTE_COLORS=['#fde047','#fb923c','#a3e635','#34d399','#38bdf8','#818cf8','#e879f9','#f472b6','#4ade80','#2dd4bf'];
  let savedRoutes=[]; // [{id,name,color,mode,from,to,waypoints,geometry,distance,duration,passedCities}]
  // displayedRoutes は applyGeoStyles から参照される都合で前方宣言済み

  // data/routes.json から読み込み
  async function loadSavedRoutes(){
    try{
      const res=await fetch('data/routes.json');
      if(res.ok){savedRoutes=await res.json();renderSavedRoutesList();}
    }catch(e){}
  }

  function getNextColor(){
    const usedColors=savedRoutes.map(r=>r.color);
    for(const c of ROUTE_COLORS){if(!usedColors.includes(c)) return c;}
    return ROUTE_COLORS[savedRoutes.length%ROUTE_COLORS.length];
  }

  // ── 保存ルート編集 ──
  let _editingRouteId=null; // 編集中のルートID（nullなら新規）

  function loadRouteForEdit(id){
    const r=savedRoutes.find(r=>r.id===id);
    if(!r) return;
    _editingRouteId=id;

    // ルート検索フォームをクリア
    $('route-clear-btn').click();

    // 出発・ゴールをセット
    $('route-from').value=r.from.name||'';
    routeFromCoord=r.from.coord;
    routeFromCity={isCityWaypoint:r.from.isCity||false,cityCode:r.from.cityCode||null,name:r.from.name||''};

    $('route-to').value=r.to.name||'';
    routeToCoord=r.to.coord;
    routeToCity={isCityWaypoint:r.to.isCity||false,cityCode:r.to.cityCode||null,name:r.to.name||''};

    // 経由地をセット
    routeWaypoints=(r.waypoints||[]).map(w=>({
      coord:w.coord,name:w.name,isCityWaypoint:!!w.cityCode,cityCode:w.cityCode||null
    }));
    renderWaypoints();

    // 走行モードをセット
    currentRouteMode=r.mode||'driving';
    document.querySelectorAll('.route-mode-btn').forEach(b=>{
      b.classList.toggle('active',b.dataset.mode===currentRouteMode);
    });

    // 保存ボタンのラベルを変更して編集モードを明示
    $('route-save-btn').textContent='ルートを保存（編集中）';
    $('route-save-btn').style.display='none'; // 再検索後に表示

    // ルートタブからルート検索タブへ切り替え
    document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelector('[data-tab="route"]').classList.add('active');
    $('tab-route').classList.add('active');
  }

  // ルート保存（ダウンロード）
  $('route-save-btn').addEventListener('click',()=>{
    if(!window._lastRouteData) return;
    const rd=window._lastRouteData;

    if(_editingRouteId){
      // 編集モード：上書きか新規かを選択
      const choice=confirm('「OK」→元のルートに上書き保存\n「キャンセル」→新しいルートとして保存');
      if(choice){
        // 上書き
        const idx=savedRoutes.findIndex(r=>r.id===_editingRouteId);
        if(idx>=0){
          const existing=savedRoutes[idx];
          savedRoutes[idx]={
            ...existing,
            mode:rd.mode,
            from:rd.from,to:rd.to,
            waypoints:rd.waypoints,
            geometry:rd.geometry,
            distance:rd.distance,duration:rd.duration,
            passedCities:rd.passedCities
          };
          if(displayedRoutes[_editingRouteId]){hideSavedRoute(_editingRouteId);showSavedRoute(_editingRouteId);}
        }
      } else {
        // 新規
        const name=prompt('ルート名を入力:',savedRoutes.find(r=>r.id===_editingRouteId)?.name+' (コピー)');
        if(!name) return;
        savedRoutes.push({
          id:'route_'+Date.now(),
          name,
          color:getNextColor(),
          createdAt:new Date().toISOString(),
          mode:rd.mode,
          from:rd.from,to:rd.to,
          waypoints:rd.waypoints,
          geometry:rd.geometry,
          distance:rd.distance,duration:rd.duration,
          passedCities:rd.passedCities
        });
      }
      _editingRouteId=null;
      $('route-save-btn').textContent='ルートを保存';
    } else {
      // 新規保存
      const name=prompt('ルート名を入力:','ルート '+(savedRoutes.length+1));
      if(!name) return;
      savedRoutes.push({
        id:'route_'+Date.now(),
        name,
        color:getNextColor(),
        createdAt:new Date().toISOString(),
        mode:rd.mode,
        from:rd.from,to:rd.to,
        waypoints:rd.waypoints,
        geometry:rd.geometry,
        distance:rd.distance,duration:rd.duration,
        passedCities:rd.passedCities
      });
    }

    renderSavedRoutesList();
    markDirty('routes');
    // タブを保存ルートに切り替え
    document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.sidebar-tab-panel').forEach(p=>p.classList.remove('active'));
    document.querySelector('[data-tab="routes"]').classList.add('active');
    $('tab-routes').classList.add('active');
  });

  function downloadRoutesJson(){
    const json=JSON.stringify(savedRoutes,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='routes.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // 一覧描画
  let _expandedRouteId=null; // 詳細展開中のルートID

  function renderSavedRoutesList(){
    const list=$('saved-routes-list');
    if(!savedRoutes.length){
      list.innerHTML='<div class="sr-empty">保存ルートはありません<br><span style="font-size:10px;">ルート検索後「ルートを保存」で追加</span></div>';
      return;
    }
    list.innerHTML=savedRoutes.map(r=>{
      const dist=(r.distance/1000).toFixed(1);
      const dur=Math.round(r.duration/60);
      const h=Math.floor(dur/60),m=dur%60;
      const durStr=h>0?`${h}h${m}m`:`${m}m`;
      const shown=!!displayedRoutes[r.id];
      const expanded=_expandedRouteId===r.id;

      // 経由地リスト
      const wpHtml=(r.waypoints||[]).map((w,i)=>{
        const name=w.name||(w.cityCode?(featureProps[w.cityCode]?buildFullName(w.cityCode,featureProps[w.cityCode].gun,featureProps[w.cityCode].city,featureProps[w.cityCode].ward):'(市区町村)'):`${w.coord[0].toFixed(4)}, ${w.coord[1].toFixed(4)}`);
        return `<div class="srd-wp">${i+1}. ${name}</div>`;
      }).join('')||'<div class="srd-empty">なし</div>';

      // 通過市区町村リスト（最初の数件 + 残数）
      const cityList=(r.passedCities||[]).slice(0,12).map(code=>{
        const fp=featureProps[code];
        if(!fp) return null;
        const name=buildFullName(code,fp.gun,fp.city,fp.ward);
        return `<span class="srd-city-pill" title="${fp.pref||''}${name}">${name}</span>`;
      }).filter(Boolean).join('');
      const moreCount=Math.max(0,(r.passedCities?.length||0)-12);
      const cityListMore=moreCount>0?`<span class="srd-city-more">+${moreCount}</span>`:'';

      // 走行モード
      const modeMap={driving:'🚗 自動車',walking:'🚶 徒歩',bicycling:'🚴 自転車',transit:'🚇 公共交通'};
      const modeLabel=modeMap[r.mode]||r.mode||'-';

      // 出発・目的地名
      const fromName=r.from?.name||'-';
      const toName=r.to?.name||'-';

      const detailHtml=expanded?`
        <div class="sr-detail">
          <div class="srd-row"><div class="srd-label">出発</div><div class="srd-value">${fromName}</div></div>
          <div class="srd-row"><div class="srd-label">目的</div><div class="srd-value">${toName}</div></div>
          <div class="srd-row"><div class="srd-label">経由地</div><div class="srd-value">${wpHtml}</div></div>
          <div class="srd-row"><div class="srd-label">モード</div><div class="srd-value">${modeLabel}</div></div>
          <div class="srd-row"><div class="srd-label">距離</div><div class="srd-value">${dist} km</div></div>
          <div class="srd-row"><div class="srd-label">時間</div><div class="srd-value">${durStr}</div></div>
          <div class="srd-row"><div class="srd-label">通過 (${r.passedCities?.length||0})</div><div class="srd-value srd-cities">${cityList}${cityListMore}</div></div>
          <div class="srd-actions">
            <button class="srd-btn" data-act="locate" data-id="${r.id}" title="地図で表示">🔍 地図</button>
            <button class="srd-btn" data-act="edit" data-id="${r.id}" title="編集モードに読み込む">✏️ 編集</button>
            <button class="srd-btn srd-danger" data-act="delete" data-id="${r.id}" title="削除">🗑 削除</button>
          </div>
        </div>`:'';

      return`<div class="saved-route-item-wrap ${expanded?'expanded':''}" data-id="${r.id}">
        <div class="saved-route-item" data-id="${r.id}">
          <input type="checkbox" class="sr-check" data-id="${r.id}" ${shown?'checked':''}>
          <div class="sr-color" data-id="${r.id}" style="background:${r.color};" title="色を変更"></div>
          <div class="sr-info sr-info-clickable" data-id="${r.id}">
            <div class="sr-name">${r.name}</div>
            <div class="sr-meta">${dist}km / ${durStr} / ${r.passedCities?r.passedCities.length:0}市区町村</div>
          </div>
          <button class="sr-toggle" data-id="${r.id}" title="${expanded?'閉じる':'詳細を開く'}">${expanded?'▾':'▸'}</button>
        </div>
        ${detailHtml}
      </div>`;
    }).join('');

    // チェックボックス: 表示/非表示
    list.querySelectorAll('.sr-check').forEach(cb=>{
      cb.addEventListener('change',(e)=>{
        e.stopPropagation();
        const id=cb.dataset.id;
        if(cb.checked) showSavedRoute(id);
        else hideSavedRoute(id);
      });
    });
    // 色変更
    list.querySelectorAll('.sr-color').forEach(el=>{
      el.addEventListener('click',ev=>{
        ev.stopPropagation();
        showColorPicker(el,el.dataset.id);
      });
    });
    // 行クリック (info部分) で詳細を開閉
    list.querySelectorAll('.sr-info-clickable').forEach(el=>{
      el.addEventListener('click',()=>{
        const id=el.dataset.id;
        _expandedRouteId=(_expandedRouteId===id)?null:id;
        renderSavedRoutesList();
      });
    });
    // 開閉トグルボタン
    list.querySelectorAll('.sr-toggle').forEach(btn=>{
      btn.addEventListener('click',ev=>{
        ev.stopPropagation();
        const id=btn.dataset.id;
        _expandedRouteId=(_expandedRouteId===id)?null:id;
        renderSavedRoutesList();
      });
    });
    // 詳細パネル内のアクションボタン
    list.querySelectorAll('.srd-btn').forEach(btn=>{
      btn.addEventListener('click',ev=>{
        ev.stopPropagation();
        const id=btn.dataset.id;
        const act=btn.dataset.act;
        if(act==='locate'){
          // 地図表示+ズーム
          if(!displayedRoutes[id]) showSavedRoute(id);
          const r=savedRoutes.find(x=>x.id===id);
          if(r&&r.geometry&&r.geometry.length){
            const bounds=new google.maps.LatLngBounds();
            r.geometry.forEach(c=>bounds.extend({lat:c[1],lng:c[0]}));
            map.fitBounds(bounds);
          }
          // チェックボックスもチェック状態に
          renderSavedRoutesList();
        } else if(act==='edit'){
          loadRouteForEdit(id);
        } else if(act==='delete'){
          if(!confirm('このルートを削除しますか？')) return;
          hideSavedRoute(id);
          savedRoutes=savedRoutes.filter(r=>r.id!==id);
          if(_expandedRouteId===id) _expandedRouteId=null;
          renderSavedRoutesList();
          markDirty('routes');
        }
      });
    });
  }

  // 色選択ポップアップ
  function showColorPicker(anchor,routeId){
    document.querySelectorAll('.color-picker-popup').forEach(p=>p.remove());
    const popup=document.createElement('div');
    popup.className='color-picker-popup';
    const rect=anchor.getBoundingClientRect();
    popup.style.left=(rect.left+20)+'px';popup.style.top=rect.top+'px';popup.style.position='fixed';
    ROUTE_COLORS.forEach(c=>{
      const sw=document.createElement('div');
      sw.className='color-picker-swatch';sw.style.background=c;
      const route=savedRoutes.find(r=>r.id===routeId);
      if(route&&route.color===c) sw.style.borderColor='var(--text)';
      sw.addEventListener('click',()=>{
        const r=savedRoutes.find(r=>r.id===routeId);
        if(r){
          r.color=c;
          if(displayedRoutes[routeId]){
            displayedRoutes[routeId].color=c;
            displayedRoutes[routeId].polyline.setOptions({strokeColor:c});
            applyGeoStyles();
          }
          renderSavedRoutesList();
          markDirty('routes');
        }
        popup.remove();
      });
      popup.appendChild(sw);
    });
    document.body.appendChild(popup);
    setTimeout(()=>{document.addEventListener('click',function rem(){popup.remove();document.removeEventListener('click',rem);},{once:true});},10);
  }

  // ルート表示
  function showSavedRoute(id){
    const r=savedRoutes.find(r=>r.id===id);
    if(!r||displayedRoutes[id]) return;
    const path=r.geometry.map(c=>({lat:c[1],lng:c[0]}));
    // 2本重ねでくっきり描画: 外側(白いハロー) + 内側(色付き本線)
    const haloLine=new google.maps.Polyline({
      path,
      strokeColor:'#ffffff',
      strokeWeight:7,
      strokeOpacity:0.95,
      zIndex:7,
      map
    });
    const polyline=new google.maps.Polyline({
      path,
      strokeColor:r.color,
      strokeWeight:4.5,
      strokeOpacity:1,
      zIndex:8,
      map
    });
    const passedCodes=new Set(r.passedCities||[]);
    displayedRoutes[id]={polyline,haloLine,passedCodes,color:r.color,markers:[]};
    applyGeoStyles();
  }

  function hideSavedRoute(id){
    const d=displayedRoutes[id];
    if(!d) return;
    d.polyline.setMap(null);
    if(d.haloLine) d.haloLine.setMap(null);
    d.markers.forEach(m=>m.setMap(null));
    delete displayedRoutes[id];
    applyGeoStyles();
  }

  // 全表示/全非表示
  $('sr-show-all').addEventListener('click',()=>{
    savedRoutes.forEach(r=>showSavedRoute(r.id));
    renderSavedRoutesList();
  });
  $('sr-hide-all').addEventListener('click',()=>{
    savedRoutes.forEach(r=>hideSavedRoute(r.id));
    renderSavedRoutesList();
  });

  // ファイル読み込み
  $('sr-import-btn').addEventListener('click',()=>{
    const input=document.createElement('input');
    input.type='file';input.accept='.json';
    input.addEventListener('change',async()=>{
      const file=input.files[0];if(!file) return;
      try{
        const text=await file.text();
        const data=JSON.parse(text);
        if(Array.isArray(data)){savedRoutes=data;renderSavedRoutesList();markDirty('routes');}
        else alert('無効なファイル形式です');
      }catch(e){alert('ファイル読み込みに失敗しました');}
    });
    input.click();
  });

  // 初期読み込み
  loadSavedRoutes();

  // Sidebar toggle
  const sidebar=$('sidebar');
  function updateToggleBtn(){
    $('sidebar-toggle').textContent=sidebar.classList.contains('collapsed')?'▶':'◀';
  }
  $('sidebar-toggle').addEventListener('click',()=>{
    sidebar.classList.toggle('collapsed');
    updateToggleBtn();
    setTimeout(()=>google.maps.event.trigger(map,'resize'),350);
  });
  // オーバーレイタップでサイドバーを閉じる（スマホ）
  $('sidebar-overlay').addEventListener('click',()=>{
    sidebar.classList.add('collapsed');
    updateToggleBtn();
    setTimeout(()=>google.maps.event.trigger(map,'resize'),350);
  });
  if(window.innerWidth<=768){sidebar.classList.add('collapsed');updateToggleBtn();}

  $('loading').classList.add('hidden');
  setTimeout(()=>$('loading').remove(),500);
})();
</script>

<!-- PWA: Service Worker 登録 -->
<script>
  // Service Worker 登録（file://からの直接起動では動かないので保護）
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => {
          console.log('[SW] registered:', reg.scope);
          // 更新検知: 新しいSWが待機状態になったら静かに有効化
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[SW] new version available. Will activate on next page load.');
                // ここで自動リロードすることもできるが、作業中に強制リロードは危険なので
                // 次回リロード時に新SWが効くようにする
              }
            });
          });
        })
        .catch(err => console.warn('[SW] registration failed:', err));
    });
  }
</script>
